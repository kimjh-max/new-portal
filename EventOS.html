  const exportPPTX = () => {
    if (typeof PptxGenJS === "undefined") { toast("PPT 라이브러리 로딩 중... 잠시 후 다시 시도해주세요","warn"); return; }
    const pptx = new PptxGenJS();
    pptx.defineLayout({name:"A4_LAND",width:13.33,height:7.5});
    pptx.layout = "A4_LAND";
    const p = proj || {};
    const docTitle = isPlan ? "운영계획안" : "결과보고서";
    const footerTxt = `${p.name||""} ${docTitle} · (주)에픽스테이지`;
    const HDR_H = 1.0;
    const BODY_TOP = 1.2;
    const MAX_Y = 6.7;
    const ROW_H = 0.32;

    /* ── 페이지 매니저 (자동 분할 핵심) ── */
    function PageMgr(num, title, sub) {
      this.num = num; this.title = title; this.sub = sub; this.page = 0;
      this.sl = null; this.y = BODY_TOP;
      this.newSlide = () => {
        this.page++;
        this.sl = pptx.addSlide();
        this.sl.background = {fill:"FFFFFF"};
        this.sl.addShape(pptx.ShapeType.rect,{x:0,y:0,w:"100%",h:HDR_H,fill:{color:"0F1623"}});
        const lbl = this.page > 1 ? `${this.num} (${this.page})` : this.num;
        this.sl.addText(lbl,{x:0.3,y:0.1,w:1.2,h:0.8,fontSize:36,color:"6366F1",bold:true});
        this.sl.addText(this.title,{x:1.5,y:0.15,w:8,h:0.4,fontSize:20,color:"FFFFFF",bold:true});
        this.sl.addText(this.sub,{x:1.5,y:0.55,w:8,h:0.3,fontSize:9,color:"818CF8"});
        if (this.page > 1) this.sl.addText("continued",{x:10,y:0.55,w:3,h:0.3,fontSize:9,color:"F59E0B",align:"right",italic:true});
        this.sl.addText(footerTxt,{x:0,y:7.1,w:"100%",h:0.3,align:"right",fontSize:8,color:"94A3B8",margin:[0,20,0,0]});
        this.y = BODY_TOP;
        return this.sl;
      };
      this.need = (h) => { if (!this.sl || this.y + h > MAX_Y) this.newSlide(); };
      this.newSlide();
    }

    /* ── 공통 헬퍼 ── */
    const tblHdr = (cols) => cols.map(c=>({text:c,options:{fontSize:9,bold:true,color:"FFFFFF",fill:{color:"0F1623"},align:"center",border:{pt:0.5,color:"E2E8F0"}}}));
    const tblRow = (cells) => cells.map(c=>({text:String(c||""),options:{fontSize:10,color:"1E293B",border:{pt:0.5,color:"E2E8F0"},valign:"middle"}}));

    const pmField = (pm, label, val, w, maxH) => {
      if (!val || !String(val).trim()) return;
      const lines = String(val).split("\n");
      const textH = Math.min(Math.max(lines.length * 0.22, 0.3), maxH||2.0);
      const totalH = 0.25 + textH + 0.1;
      pm.need(totalH);
      pm.sl.addText(label,{x:0.5,y:pm.y,w:w||12.33,h:0.25,fontSize:9,color:"6366F1",bold:true,valign:"top"});
      pm.sl.addText(String(val),{x:0.5,y:pm.y+0.25,w:w||12.33,h:textH,fontSize:11,color:"1E293B",valign:"top",wrap:true,lineSpacingMultiple:1.15});
      pm.y += totalH;
    };

    /* 테이블 자동 분할: 헤더 행 포함하여 페이지에 맞게 나눔 */
    const pmTable = (pm, label, hdrRow, dataRows, colW) => {
      if (!dataRows.length) return;
      pm.need(0.6);
      pm.sl.addText(label,{x:0.5,y:pm.y,w:12.33,h:0.25,fontSize:9,color:"6366F1",bold:true});
      pm.y += 0.3;
      let idx = 0;
      while (idx < dataRows.length) {
        const avail = Math.floor((MAX_Y - pm.y - 0.1) / ROW_H) - 1;
        if (avail < 1) { pm.newSlide(); continue; }
        const chunk = dataRows.slice(idx, idx + avail);
        const rows = [hdrRow, ...chunk];
        pm.sl.addTable(rows,{x:0.5,y:pm.y,w:12.33,colW,fontSize:10,border:{pt:0.5,color:"E2E8F0"},autoPage:false});
        pm.y += ROW_H * rows.length + 0.15;
        idx += chunk.length;
        if (idx < dataRows.length) pm.newSlide();
      }
    };

    /* 이미지 자동 분할 - 각 이미지를 1슬라이드에 가득 채움 */
    const pmImages = (pm, secData) => {
      const imgs = (secData?.images || []);
      if (!imgs.length) return;
      imgs.forEach((img) => {
        try {
          // 새 슬라이드에 이미지를 가득 채움
          const imgSlide = pptx.addSlide();
          imgSlide.addImage({data:img.data, x:0.3, y:0.3, w:12.73, h:6.4, sizing:{type:"contain",w:12.73,h:6.4}});
          if ((img.annotations||[]).length) {
            imgSlide.addText(img.annotations.map(a=>a.text).join(" · "), {x:0.5,y:7.0,w:12.33,h:0.35,fontSize:10,color:"64748B",align:"center"});
          }
          if (img.name) {
            imgSlide.addText(img.name, {x:0.5,y:7.15,w:12.33,h:0.25,fontSize:8,color:"94A3B8",align:"center"});
          }
        } catch(e){ console.error("PPT image error:", e); }
      });
    };

    /* 2열 필드 */
    const pm2Col = (pm, l1, v1, l2, v2, w) => {
      const halfW = w || 6.0, gap = 0.33;
      if (!v1 && !v2) return;
      pm.need(0.65);
      if (l1) pm.sl.addText(l1,{x:0.5,y:pm.y,w:halfW,h:0.22,fontSize:9,color:"6366F1",bold:true});
      if (l2) pm.sl.addText(l2,{x:0.5+halfW+gap,y:pm.y,w:halfW,h:0.22,fontSize:9,color:"6366F1",bold:true});
      pm.y += 0.22;
      if (v1) pm.sl.addText(v1,{x:0.5,y:pm.y,w:halfW,h:0.3,fontSize:11,color:"1E293B"});
      if (v2) pm.sl.addText(v2,{x:0.5+halfW+gap,y:pm.y,w:halfW,h:0.3,fontSize:11,color:"1E293B"});
      pm.y += 0.4;
    };

    const pm2ColBig = (pm, l1, v1, l2, v2, w) => {
      const halfW = w || 6.0, gap = 0.33;
      if (!v1 && !v2) return;
      const l1n = (v1||"").split("\n").length, l2n = (v2||"").split("\n").length;
      const maxH = Math.min(Math.max(l1n, l2n) * 0.22, 2.0);
      pm.need(0.22 + maxH + 0.1);
      if (l1) pm.sl.addText(l1,{x:0.5,y:pm.y,w:halfW,h:0.22,fontSize:9,color:"6366F1",bold:true});
      if (l2) pm.sl.addText(l2,{x:0.5+halfW+gap,y:pm.y,w:halfW,h:0.22,fontSize:9,color:"6366F1",bold:true});
      pm.y += 0.22;
      if (v1) pm.sl.addText(v1,{x:0.5,y:pm.y,w:halfW,h:maxH,fontSize:10,color:"1E293B",valign:"top",wrap:true,lineSpacingMultiple:1.15});
      if (v2) pm.sl.addText(v2,{x:0.5+halfW+gap,y:pm.y,w:halfW,h:maxH,fontSize:10,color:"1E293B",valign:"top",wrap:true,lineSpacingMultiple:1.15});
      pm.y += maxH + 0.1;
    };

    /* ── Cover Slide ── */
    const cover = pptx.addSlide();
    cover.background = {fill:"0F1623"};
    cover.addText(new Date().getFullYear()+" CRS in the Community",{x:0,y:2,w:"100%",h:0.5,align:"center",fontSize:12,color:"818CF8",letterSpacing:4});
    cover.addText(p.name||"행사명",{x:0.5,y:2.8,w:12.33,h:1.2,align:"center",fontSize:32,color:"FFFFFF",bold:true});
    cover.addText(docTitle,{x:0,y:4.2,w:"100%",h:0.5,align:"center",fontSize:16,color:"A5B4FC",bold:true});
    cover.addText((p.client||"")+"  ·  "+(p.eventDate||""),{x:0,y:4.9,w:"100%",h:0.4,align:"center",fontSize:11,color:"94A3B8"});
    cover.addText("(주)에픽스테이지",{x:0,y:5.8,w:"100%",h:0.4,align:"center",fontSize:11,color:"64748B"});

    /* ── 01 Over View ── */
    (() => {
      const d = sd("overview");
      const pm = new PageMgr("01","Over View","행사 개요 | EVENT OVERVIEW");
      pm2Col(pm,"행사명",d.eventName||p.name||"","주최사",d.organizer||p.client||"");
      pm2Col(pm,"일시",d.date||p.eventDate||"","시간",d.time||"");
      pmField(pm,"장소",d.venue||p.taskOrder?.venue,12.33,0.4);
      pmField(pm,"행사 내용",d.content||p.taskOrder?.purpose,12.33,1.5);
      pm2ColBig(pm,"행사 성격",d.character,"지원 사항",d.support);
      pmField(pm,"기타사항",d.extraNotes,12.33,0.8);
      pmImages(pm, d);
    })();

    /* ── 02 Venue ── */
    (() => {
      const d = sd("venue");
      const pm = new PageMgr("02","Venue","장소 안내 | VENUE INFORMATION");
      pm2Col(pm,"장소명",d.venueName||p.taskOrder?.venue||"","수용 인원",d.capacity||p.taskOrder?.attendance||"");
      pm2Col(pm,"주소",d.address||"","층/홀",d.floor||"");
      pmField(pm,"장소 특이사항",d.notes,12.33,0.8);
      pmTable(pm,"장비/시설 목록",tblHdr(["#","장비명","규격","수량","비고"]),
        (d.equipList||[]).filter(e=>e.name).map((e,i)=>tblRow([i+1,e.name,e.spec,e.qty,e.note])),
        [0.5,4,3.5,1.33,3]);
      pmImages(pm, d);
    })();

    /* ── 03 Design ── */
    (() => {
      const d = sd("design");
      const pm = new PageMgr("03","Design","디자인 계획 | DESIGN PLAN");
      pmTable(pm,"현수막/배너 목록",tblHdr(["#","품목명","규격 (mm)","수량"]),
        (d.bannerList||[]).filter(b=>b.name).map((b,i)=>tblRow([i+1,b.name,b.size,b.qty])),
        [0.5,5,4.5,2.33]);
      pm2ColBig(pm,"디지털/영상 계획",d.videoNotes,"인쇄물",d.printNotes);
      pmField(pm,"LED/스크린 계획",d.ledNotes,12.33,1.0);
      if (!isPlan) pmField(pm,"결과 메모",d.resultNotes,12.33,0.8);
      pmImages(pm, d);

      /* ── 03-X 디자인 아이템 개별 슬라이드 ── */
      const _diList = d.designItems || [];
      _diList.forEach((dItem, dIdx) => {
        const itemLetter = String.fromCharCode(65 + dIdx);
        const itemPm = new PageMgr(`03-${itemLetter}`, dItem.itemName||"Design Item", `${dItem.category||"디자인"} | DESIGN ITEM`);
        pm2Col(itemPm,"카테고리",dItem.category||"-","구분",dItem.division||"-");
        pm2Col(itemPm,"규격 / 사이즈",dItem.specs||"-","수량",String(dItem.qty||1));
        if (dItem.notes) pmField(itemPm,"메모",dItem.notes,12.33,0.8);
        // 포트폴리오 스타일 이미지 (크게)
        const dImgs = dItem.images||[];
        dImgs.forEach(img=>{
          itemPm.need(4.0);
          try {
            itemPm.sl.addImage({data:img.data,x:1.5,y:itemPm.y,w:10,h:5.2,rounding:true});
            if ((img.annotations||[]).length)
              itemPm.sl.addText(img.annotations.map(a=>a.text).join(" · "),{x:1.5,y:itemPm.y+5.2,w:10,h:0.3,fontSize:9,color:"64748B",align:"center"});
            itemPm.y+=5.6;
          } catch(e){}
        });
      });
    })();

    /* ── 04 Program ── */
    (() => {
      const d = sd("program");
      const pm = new PageMgr("04","Program","진행 순서 | EVENT PROGRAM");
      pmTable(pm,"타임테이블 / 진행순서",tblHdr(["#","시간","소요(분)","내용","비고"]),
        (d.timeline||[]).filter(t=>t.time||t.content).map((t,i)=>tblRow([i+1,t.time,t.duration,t.content,t.note])),
        [0.5,2,1.2,5.63,3]);
      pmField(pm,"MC / 진행 메모",d.mcInfo,12.33,0.8);
      if (!isPlan) pmField(pm,"프로그램 결과 메모",d.resultNotes,12.33,0.8);
      pmImages(pm, d);
    })();

    /* ── 05 Operation ── */
    (() => {
      const d = sd("operation");
      const pm = new PageMgr("05","Operation","운영 계획 | OPERATION PLAN");
      pm2Col(pm,"MC 이름",d.mcName||"","MC 프로필",d.mcProfile||"");
      pmField(pm,"운영 특이사항",d.notes,12.33,0.8);
      pmTable(pm,"스태프 배치",tblHdr(["#","역할","이름","연락처","비고"]),
        (d.staffList||[]).filter(s=>s.role||s.name).map((s,i)=>tblRow([i+1,s.role,s.name,s.contact,s.note])),
        [0.5,3,2.5,3,3.33]);
      pmTable(pm,"경품 목록",tblHdr(["#","등급","품목","수량","비고"]),
        (d.prizeList||[]).filter(pr=>pr.grade||pr.item).map((pr,i)=>tblRow([i+1,pr.grade,pr.item,pr.qty,pr.note])),
        [0.5,2,4,1.5,4.33]);
      pmImages(pm, d);
    })();

    /* ── 06 Time Line ── */
    (() => {
      const d = sd("timeline");
      const pm = new PageMgr("06","Time Line","일정 계획 | PROJECT TIMELINE");
      const mlList = (d.milestones||[]).filter(m=>m.task);
      const STATUS_CLR = {"완료":"10B981","진행중":"F59E0B","예정":"6366F1"};
      if (mlList.length) {
        pmTable(pm,"타임라인 (간트차트 연동)",tblHdr(["구분","항목","시작일","종료일","진행률","상태"]),
          mlList.map(m=>[
            {text:m.division||"",options:{fontSize:10,color:"1E293B",border:{pt:0.5,color:"E2E8F0"}}},
            {text:m.task||"",options:{fontSize:10,color:m.isSubtask?"64748B":"1E293B",bold:!m.isSubtask,border:{pt:0.5,color:"E2E8F0"}}},
            {text:m.startDate||"",options:{fontSize:9,color:"1E293B",border:{pt:0.5,color:"E2E8F0"},align:"center"}},
            {text:m.endDate||"",options:{fontSize:9,color:"1E293B",border:{pt:0.5,color:"E2E8F0"},align:"center"}},
            {text:(m.progress||0)+"%",options:{fontSize:10,color:"1E293B",border:{pt:0.5,color:"E2E8F0"},align:"center"}},
            {text:m.status||"",options:{fontSize:9,color:STATUS_CLR[m.status]||"1E293B",bold:true,border:{pt:0.5,color:"E2E8F0"},align:"center"}},
          ]), [1.5,3.5,2,2,1.33,2]);
      } else {
        const gantt = p.gantt || [];
        if (gantt.length) {
          const allRows = gantt.flatMap(g => {
            const main = tblRow([g.division||"",g.task||"",g.startDate||"",g.endDate||"",(g.progress||0)+"%"]);
            const subs = (g.subtasks||[]).map(s=>tblRow(["","└ "+s.task,s.startDate||"",s.endDate||"",s.done?"100%":"0%"]));
            return [main,...subs];
          });
          pmTable(pm,"프로젝트 일정",tblHdr(["구분","항목","시작일","종료일","진행률"]),allRows,[2,4,2.33,2.33,1.67]);
        }
      }
      pmField(pm,"특이사항 메모",d.notes,12.33,0.8);
      pmImages(pm, d);
    })();

    pptx.writeFile({fileName:`${p.name||"EventOS"}_${docTitle}_${today}.pptx`})
      .then(()=>toast("PPT 파일이 다운로드됩니다","success"))
      .catch(()=>toast("PPT 생성 중 오류가 발생했습니다","error"));

          </div>

            <textarea className="form-input" rows={2} value={pr.mcInfo||""} onChange={e=>updateDoc("program","mcInfo",e.target.value)} placeholder="MC 진행 관련 특이사항" style={{resize:"vertical"}}/>
          </FG>
          {!isPlan && (
            <FG label="프로그램 결과 메모">
              <textarea className="form-input" rows={2} value={pr.resultNotes||""} onChange={e=>updateDoc("program","resultNotes",e.target.value)} placeholder="실제 진행 결과 메모" style={{resize:"vertical"}}/>
            </FG>
          )}
        </div>
      );
    }

    if (activeSection === "operation") {
      const sfList = getList("operation","staffList",{role:"",name:"",contact:"",note:""});
      const prList = getList("operation","prizeList",{grade:"",item:"",qty:"",note:""});
      return (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:4}}>
            <FG label="MC 이름"><input className="form-input" value={op.mcName||""} onChange={e=>updateDoc("operation","mcName",e.target.value)} placeholder="MC 이름"/></FG>
            <FG label="MC 프로필">
              <textarea className="form-input" rows={2} value={op.mcProfile||""} onChange={e=>updateDoc("operation","mcProfile",e.target.value)} placeholder="방송 경력 등" style={{resize:"vertical"}}/>
            </FG>
          </div>
          <FG label="운영 특이사항">
            <textarea className="form-input" rows={2} value={op.notes||""} onChange={e=>updateDoc("operation","notes",e.target.value)} placeholder="운영 관련 특이사항" style={{resize:"vertical"}}/>
          </FG>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <label className="form-label" style={{margin:0}}>스태프 배치</label>
            <button className="btn btn-ghost" style={{padding:"4px 10px",fontSize:12}} onClick={()=>addListItem("operation","staffList",{role:"",name:"",contact:"",note:""})}>+ 추가</button>
          </div>
          <div style={{overflowX:"auto",marginBottom:16}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"rgba(99,102,241,.1)"}}>
                {["#","역할","이름","연락처","비고",""].map((h,i)=><th key={i} style={{padding:"6px 8px",color:"#818cf8",fontWeight:700,border:"1px solid rgba(255,255,255,.07)",width:i===0?30:i===5?36:undefined}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {sfList.map((item,idx)=>(
                  <tr key={idx}>
                    <td style={{padding:"4px 8px",border:"1px solid rgba(255,255,255,.05)",textAlign:"center",color:"var(--txt3)",fontSize:11}}>{idx+1}</td>
                    {["role","name","contact","note"].map(f=>(
                      <td key={f} style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)"}}><input className="form-input" value={item[f]||""} onChange={e=>updateListItem("operation","staffList",idx,f,e.target.value)} style={{padding:"4px 8px",fontSize:12}} placeholder={{role:"역할",name:"이름",contact:"연락처",note:"비고"}[f]}/></td>
                    ))}
                    <td style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)",textAlign:"center"}}><button onClick={()=>removeListItem("operation","staffList",idx)} style={{background:"rgba(239,68,68,.15)",border:"none",color:"#fca5a5",borderRadius:4,padding:"3px 7px",cursor:"pointer",fontSize:11}}>✕</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <label className="form-label" style={{margin:0}}>경품 목록</label>
            <button className="btn btn-ghost" style={{padding:"4px 10px",fontSize:12}} onClick={()=>addListItem("operation","prizeList",{grade:"",item:"",qty:"",note:""})}>+ 추가</button>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"rgba(99,102,241,.1)"}}>
                {["#","등급","품목","수량","비고",""].map((h,i)=><th key={i} style={{padding:"6px 8px",color:"#818cf8",fontWeight:700,border:"1px solid rgba(255,255,255,.07)",width:i===0?30:i===3?60:i===5?36:undefined}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {prList.map((item,idx)=>(
                  <tr key={idx}>
                    <td style={{padding:"4px 8px",border:"1px solid rgba(255,255,255,.05)",textAlign:"center",color:"var(--txt3)",fontSize:11}}>{idx+1}</td>
                    {["grade","item","qty","note"].map(f=>(
                      <td key={f} style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)"}}><input className="form-input" value={item[f]||""} onChange={e=>updateListItem("operation","prizeList",idx,f,e.target.value)} style={{padding:"4px 8px",fontSize:12,textAlign:f==="qty"?"center":undefined}} placeholder={{grade:"1등",item:"경품명",qty:"0",note:"비고"}[f]}/></td>
                    ))}
                    <td style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)",textAlign:"center"}}><button onClick={()=>removeListItem("operation","prizeList",idx)} style={{background:"rgba(239,68,68,.15)",border:"none",color:"#fca5a5",borderRadius:4,padding:"3px 7px",cursor:"pointer",fontSize:11}}>✕</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    if (activeSection === "timeline") {
      const mlList = sd("timeline").milestones || [];
      const hasGantt = (proj?.gantt||[]).length > 0;

      // 간트차트 → 타임라인 변환 함수
      const importFromGantt = () => {
        const gantt = proj?.gantt || [];
        if (!gantt.length) { toast("간트차트 데이터가 없습니다","warn"); return; }
        const converted = [];
        gantt.forEach(g => {
          converted.push({
            division: g.division || "",
            task: g.task || "",
            startDate: g.startDate || "",
            endDate: g.endDate || "",
            progress: g.progress || 0,
            status: g.progress === 100 ? "완료" : (g.progress||0) > 0 ? "진행중" : "예정",
            color: g.color || "#6366f1",
            isSubtask: false,
          });
          (g.subtasks||[]).forEach(s => {
            converted.push({
              division: "",
              task: `└ ${s.task}`,
              startDate: s.startDate || "",
              endDate: s.endDate || "",
              progress: s.done ? 100 : 0,
              status: s.done ? "완료" : "예정",
              color: g.color || "#6366f1",
              isSubtask: true,
            });
          });
        });
        setList("timeline","milestones", converted);
        toast("✅ 간트차트에서 타임라인을 가져왔습니다","success");
      };

      const STATUS_COLORS_TL = {"완료":"#10b981","진행중":"#f59e0b","예정":"#6366f1"};

      return (
        <div>
          {/* 상단 버튼 바 */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <label className="form-label" style={{margin:0}}>타임라인 (간트차트 연동)</label>
              {hasGantt && (
                <span style={{fontSize:11,color:"#10b981",background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.2)",borderRadius:4,padding:"2px 7px"}}>
                  간트 {(proj?.gantt||[]).length}개 항목 연결됨
                </span>
              )}
            </div>
            <div style={{display:"flex",gap:6}}>
              {hasGantt && (
                <button className="btn btn-ghost" style={{padding:"5px 12px",fontSize:12,borderColor:"rgba(16,185,129,.3)",color:"#34d399"}}
                  onClick={importFromGantt}>
                  🔄 간트에서 가져오기
                </button>
              )}
              <button className="btn btn-ghost" style={{padding:"5px 12px",fontSize:12}}
                onClick={()=>setList("timeline","milestones",[...(sd("timeline").milestones||[]),{division:"",task:"",startDate:"",endDate:"",progress:0,status:"예정",color:"#6366f1",isSubtask:false}])}>
                + 직접 추가
              </button>
            </div>
          </div>

          {/* 간트 없고 목록 비어있을 때 안내 */}
          {!hasGantt && mlList.length===0 && (
            <div style={{background:"rgba(99,102,241,.06)",border:"1px dashed rgba(99,102,241,.2)",borderRadius:8,padding:20,textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:24,marginBottom:8}}>📅</div>
              <div style={{color:"var(--txt3)",fontSize:13}}>간트차트를 먼저 작성하면 자동으로 불러올 수 있습니다.</div>
              <div style={{color:"var(--txt4)",fontSize:12,marginTop:4}}>또는 "직접 추가" 버튼으로 수동 입력하세요.</div>
            </div>
          )}

          {/* 간트 있고 목록 비어있을 때 자동 안내 */}
          {hasGantt && mlList.length===0 && (
            <div style={{background:"rgba(16,185,129,.06)",border:"1px dashed rgba(16,185,129,.25)",borderRadius:8,padding:16,textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:20,marginBottom:6}}>✨</div>
              <div style={{color:"#34d399",fontSize:13,fontWeight:600}}>간트차트 데이터를 불러올 수 있습니다!</div>
              <div style={{color:"var(--txt4)",fontSize:12,marginTop:4}}>상단의 "🔄 간트에서 가져오기" 버튼을 누르세요.</div>
            </div>
          )}

          {/* 타임라인 테이블 */}
          {mlList.length > 0 && (
            <div style={{overflowX:"auto",marginBottom:16}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:640}}>
                <thead>
                  <tr style={{background:"rgba(99,102,241,.1)"}}>
                    {["#","구분","업무","시작일","종료일","진행률","상태",""].map((h,i)=>(
                      <th key={i} style={{padding:"7px 8px",color:"#818cf8",fontWeight:700,border:"1px solid rgba(255,255,255,.07)",
                        width:i===0?28:i===5?70:i===6?76:i===7?32:undefined,whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {mlList.map((item,idx)=>{
                    const sc = STATUS_COLORS_TL[item.status||"예정"]||"#6366f1";
                    const rowBg = item.isSubtask ? "rgba(255,255,255,.015)" : "transparent";
                    return (
                      <tr key={idx} style={{background:rowBg}}>
                        <td style={{padding:"4px 8px",border:"1px solid rgba(255,255,255,.05)",textAlign:"center",color:"var(--txt4)",fontSize:10}}>{idx+1}</td>
                        <td style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)"}}><input className="form-input" value={item.division||""} onChange={e=>updateListItem("timeline","milestones",idx,"division",e.target.value)} style={{padding:"4px 8px",fontSize:11}} placeholder="구분"/></td>
                        <td style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)"}}><input className="form-input" value={item.task||""} onChange={e=>updateListItem("timeline","milestones",idx,"task",e.target.value)} style={{padding:"4px 8px",fontSize:12,paddingLeft:item.isSubtask?"20px":"8px"}} placeholder="업무명"/></td>
                        <td style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)"}}><input className="form-input" value={item.startDate||""} onChange={e=>updateListItem("timeline","milestones",idx,"startDate",e.target.value)} style={{padding:"4px 8px",fontSize:11}} placeholder="YYYY-MM-DD"/></td>
                        <td style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)"}}><input className="form-input" value={item.endDate||""} onChange={e=>updateListItem("timeline","milestones",idx,"endDate",e.target.value)} style={{padding:"4px 8px",fontSize:11}} placeholder="YYYY-MM-DD"/></td>
                        <td style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)"}}>
                          <div style={{display:"flex",alignItems:"center",gap:4}}>
                            <div style={{flex:1,height:5,background:"rgba(255,255,255,.07)",borderRadius:99,overflow:"hidden"}}>
                              <div style={{width:`${item.progress||0}%`,height:"100%",background:sc,borderRadius:99,transition:"width .3s"}}/>
                            </div>
                            <span style={{color:sc,fontSize:10,fontWeight:700,minWidth:28}}>{item.progress||0}%</span>
                          </div>
                        </td>
                        <td style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)"}}><select className="form-input" value={item.status||"예정"} onChange={e=>updateListItem("timeline","milestones",idx,"status",e.target.value)} style={{padding:"4px 6px",fontSize:11,color:sc}}>
                          {["예정","진행중","완료"].map(s=><option key={s} value={s}>{s}</option>)}
                        </select></td>
                        <td style={{padding:"4px",border:"1px solid rgba(255,255,255,.05)",textAlign:"center"}}><button onClick={()=>removeListItem("timeline","milestones",idx)} style={{background:"rgba(239,68,68,.15)",border:"none",color:"#fca5a5",borderRadius:4,padding:"2px 6px",cursor:"pointer",fontSize:10}}>✕</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          <FG label="타임라인 메모">
            <textarea className="form-input" rows={2} value={tl.ganttNotes||""} onChange={e=>updateDoc("timeline","ganttNotes",e.target.value)} placeholder="전체 일정 관련 메모" style={{resize:"vertical"}}/>
          </FG>
        </div>
      );
    }
    return null;
  };

  const curSec = SECTIONS.find(s=>s.id===activeSection);
  const docColor = isPlan ? "#6366f1" : "#10b981";
  const docLabel = isPlan ? "운영계획안" : "결과보고서";

  return (
    <div>
      {/* 헤더 */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:8,background:isPlan?"linear-gradient(135deg,#6366f1,#8b5cf6)":"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{isPlan?"📋":"📊"}</div>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:"var(--txt)"}}>{docLabel}</div>
            <div style={{fontSize:12,color:"var(--txt3)"}}>{isPlan?"행사 사전 운영 계획 문서":"행사 사후 결과 보고 문서"} · PPT/PDF 출력</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginRight:4}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:saveStatus==="saved"?"#10b981":saveStatus==="saving"?"#f59e0b":"#ef4444"}}/>
            <span style={{fontSize:11,color:"var(--txt4)"}}>{saveStatus==="saved"?"저장됨":saveStatus==="saving"?"저장 중...":"변경됨"}</span>
          </div>
          <button onClick={()=>saveVersion()} className="btn" style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.25)",color:"#a5b4fc",padding:"8px 14px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12}}>
            💾 버전 저장
          </button>
          <button onClick={()=>setShowVersions(!showVersions)} className="btn" style={{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.2)",color:"#fbbf24",padding:"8px 14px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12,position:"relative"}}>
            📂 불러오기 {versions.length > 0 && <span style={{background:"#f59e0b",color:"#000",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:800,marginLeft:4}}>{versions.length}</span>}
          </button>
          <div style={{width:1,height:24,background:"var(--border)"}}/>
          <button className="btn btn-primary" onClick={printPDF} style={{background:isPlan?"linear-gradient(135deg,#6366f1,#8b5cf6)":"linear-gradient(135deg,#10b981,#059669)"}}>
            PDF 출력
          </button>
          <button onClick={exportPPTX} className="btn" style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.25)",color:"#fbbf24",padding:"8px 16px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13}}>
            PPT 다운로드
          </button>
        </div>
      </div>

      {/* 버전 관리 패널 */}
      {showVersions && (
        <div className="card" style={{marginBottom:16,border:"1px solid rgba(245,158,11,.2)",background:"rgba(245,158,11,.03)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontWeight:800,fontSize:14,color:"var(--txt)"}}>📂 저장된 버전 ({versions.length}개)</div>
            <button onClick={()=>setShowVersions(false)} style={{background:"none",border:"none",color:"var(--txt4)",cursor:"pointer",fontSize:18}}>×</button>
          </div>
          {versions.length === 0 ? (
            <div style={{textAlign:"center",color:"var(--txt4)",fontSize:13,padding:"20px 0",border:"1px dashed rgba(255,255,255,.08)",borderRadius:8}}>
              저장된 버전이 없습니다. "💾 버전 저장" 버튼을 눌러 현재 상태를 저장하세요.
            </div>
          ) : (
            <div style={{maxHeight:280,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
              {versions.map(ver => (
                <div key={ver.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"rgba(255,255,255,.04)",borderRadius:8,border:"1px solid var(--border)"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:"var(--txt)"}}>{ver.name}</div>
                    <div style={{fontSize:11,color:"var(--txt4)",marginTop:2}}>{new Date(ver.timestamp).toLocaleString("ko-KR")}</div>
                  </div>
                  <button onClick={()=>loadVersion(ver)} style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.25)",color:"#a5b4fc",borderRadius:6,padding:"6px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    불러오기
                  </button>
                  <button onClick={()=>deleteVersion(ver.id)} style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.15)",color:"#f87171",borderRadius:6,padding:"6px 10px",fontSize:11,cursor:"pointer"}}>
                    삭제
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* 섹션 탭 + 편집 영역 */}
      <div style={{display:"flex",gap:16}}>
        {/* 섹션 네비 */}
        <div style={{width:120,flexShrink:0,display:"flex",flexDirection:"column",gap:6}}>
          {SECTIONS.map(sec=>(
            <button key={sec.id} onClick={()=>setActiveSection(sec.id)} style={{
              background: activeSection===sec.id ? (isPlan?"linear-gradient(135deg,#6366f1,#8b5cf6)":"linear-gradient(135deg,#10b981,#059669)") : "rgba(255,255,255,.04)",
              border: activeSection===sec.id ? "none" : "1px solid var(--border)",
              borderRadius:10,padding:"12px 10px",cursor:"pointer",textAlign:"left",
              color: activeSection===sec.id ? "#fff" : "var(--txt3)",
              transition:"all .15s",
            }}>
              <div style={{fontSize:14,marginBottom:4}}>{sec.icon}</div>
              <div style={{fontSize:11,fontWeight:800,letterSpacing:0.5}}>{sec.num}</div>
              <div style={{fontSize:11,lineHeight:1.3,marginTop:2,fontWeight: activeSection===sec.id?700:500}}>{sec.title}</div>
            </button>
          ))}
        </div>

        {/* 편집 영역 */}
        <div style={{flex:1}}>
          <div className="card" style={{position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,paddingBottom:14,borderBottom:"1px solid var(--border)"}}>
              <div style={{width:32,height:32,borderRadius:8,background:isPlan?"rgba(99,102,241,.15)":"rgba(16,185,129,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{curSec?.icon}</div>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:"var(--txt)"}}>{curSec?.num} {curSec?.title}</div>
                <div style={{fontSize:11,color:"var(--txt3)"}}>{docLabel} · {proj?.name||""}</div>
              </div>
              <div style={{marginLeft:"auto",fontSize:11,color:saveStatus==="saved"?"#10b981":"var(--txt4)"}}>{saveStatus==="saved"?"✓ 자동 저장 완료":"수정 내용 자동 저장 중..."}</div>
            </div>
            {renderSection()}
            {(activeSection !== "design" || !activeDesignItem) && (
              <SectionImages sectionId={activeSection} images={sd(activeSection).images} onUpdate={imgs=>updateDoc(activeSection,"images",imgs)}/>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ 메인 앱 ══════════════════════════════════════════════════════════════════ */
// ─ 지출결의 ─────────────────────────────────────────────────────────────────
function ExpensePanel({expenses, setExpenses, projects, users, currentUser}) {
  const BANKS = ["국민은행","신한은행","우리은행","하나은행","농협은행","기업은행","카카오뱅크","토스뱅크","케이뱅크","수협은행","SC제일은행","씨티은행","새마을금고","신협","우체국","기타"];
  const TAX_TYPES = ["부가세별도","부가세포함","면세","기타"];
  const EVIDENCE_TYPES = ["세금계산서","매출전표","현금영수증","기타"];
  const RECEIPT_STATES = ["발행","미발행","불요"];
  const PAY_STATES = ["예정","지급"];
  const EMPTY = {projectId:"",description:"",amount:"",taxType:"부가세별도",bank:"",accountNo:"",accountName:"",evidence:"세금계산서",resolver:"",receiptStatus:"발행",payStatus:"예정",note:""};

  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(EMPTY);
  const [filter, setFilter] = useState("전체");

  // 세금형태별 지급요금액 자동계산
  const calcPayAmt = (amount, taxType) => {
    const amt = parseInt(amount)||0;
    if (taxType==="부가세별도") return Math.round(amt*1.1);
    return amt; // 부가세포함, 면세, 기타
  };
  const calcVAT = (amount, taxType) => {
    const amt = parseInt(amount)||0;
    if (taxType==="부가세별도") return Math.round(amt*0.1);
    if (taxType==="부가세포함") return amt - Math.round(amt/1.1);
    return 0;
  };
  const calcSupply = (amount, taxType) => {
    const amt = parseInt(amount)||0;
    if (taxType==="부가세포함") return Math.round(amt/1.1);
    return amt;
  };

  const submit = () => {
    if (!form.projectId||!form.description.trim()||!form.amount) {
      toast("프로젝트·지출내용·금액은 필수입니다","error"); return;
    }
    const proj = projects.find(p=>p.id===parseInt(form.projectId));
    const nextSeq = (expenses.length>0 ? Math.max(...expenses.map(e=>e.seq||0)) : 0) + 1;
    setExpenses(prev=>[...prev,{
      id:Date.now(), seq:nextSeq, createdAt:today,
      projectId:parseInt(form.projectId), projectName:proj?.name||"",
      description:form.description, amount:parseInt(form.amount)||0,
      taxType:form.taxType, bank:form.bank, accountNo:form.accountNo,
      accountName:form.accountName, evidence:form.evidence,
      resolver:form.resolver, receiptStatus:form.receiptStatus,
      payStatus:form.payStatus, note:form.note,
    }]);
    setForm(EMPTY); setShowForm(false);
    toast("💳 지출결의 등록 완료","success");
  };

  const deleteItem = (id) => setExpenses(prev=>prev.filter(e=>e.id!==id));
  const filtered = filter==="전체" ? expenses : expenses.filter(e=>e.payStatus===filter);

  // 합계
  const totalAmt = filtered.reduce((s,e)=>s+(parseInt(e.amount)||0),0);
  const totalPay = filtered.reduce((s,e)=>s+calcPayAmt(e.amount,e.taxType),0);

  const TH = ({children,w,color}) => (
    <th style={{background:"#1a2235",color:color||"var(--txt3)",fontWeight:700,fontSize:11,
      padding:"7px 8px",whiteSpace:"nowrap",minWidth:w||60,borderBottom:"2px solid rgba(99,102,241,.3)",
      position:"sticky",top:0,zIndex:1,textAlign:"center",border:"1px solid rgba(255,255,255,.06)"}}>
      {children}
    </th>
  );
  const TD = ({children,color,bold,align}) => (
    <td style={{padding:"6px 8px",fontSize:12,color:color||"var(--txt)",fontWeight:bold?"700":"400",
      whiteSpace:"nowrap",textAlign:align||"left",border:"1px solid rgba(255,255,255,.04)",
      verticalAlign:"middle"}}>
      {children}
    </td>
  );

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{color:"var(--txt)",fontSize:20,fontWeight:800,marginBottom:4}}>💳 지출결의</h1>
          <div style={{color:"var(--txt4)",fontSize:12}}>업무 지출 기록 · 세금형태별 지급요금액 자동계산</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowForm(v=>!v)}>+ 지출 등록</button>
      </div>

      {/* 요약 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:16}}>
        {[["전체 건수",expenses.length+"건","#a5b4fc"],
          ["지급 예정",expenses.filter(e=>e.payStatus==="예정").length+"건","#fbbf24"],
          ["지급 완료",expenses.filter(e=>e.payStatus==="지급").length+"건","#34d399"],
          ["지급요금액 합계",totalPay.toLocaleString()+"원","#38bdf8"],
        ].map(([l,v,c])=>(
          <div key={l} className="card-sm" style={{textAlign:"center",padding:"10px"}}>
            <div style={{color:"var(--txt4)",fontSize:10,marginBottom:4}}>{l}</div>
            <div style={{color:c,fontWeight:800,fontSize:14}}>{v}</div>
          </div>
        ))}
      </div>

      {/* 등록 폼 */}
      {showForm && (
        <div className="card-sm" style={{marginBottom:16,border:"1px solid rgba(99,102,241,.3)"}}>
          <div style={{color:"var(--txt2)",fontWeight:700,fontSize:13,marginBottom:12}}>📝 지출결의 등록</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8,marginBottom:10}}>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>프로젝트 *</div>
              <select value={form.projectId} onChange={e=>setForm({...form,projectId:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"6px 8px",fontSize:12}}>
                <option value="">선택</option>
                {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div style={{gridColumn:"span 2"}}>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>지출내용 *</div>
              <input placeholder="예: 스탭 식대, 장비 렌탈비" value={form.description}
                onChange={e=>setForm({...form,description:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>금액 (원) *</div>
              <input type="number" placeholder="0" value={form.amount}
                onChange={e=>setForm({...form,amount:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>세금형태 *</div>
              <select value={form.taxType} onChange={e=>setForm({...form,taxType:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"6px 8px",fontSize:12}}>
                {TAX_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            {form.amount && (
              <div style={{background:"rgba(99,102,241,.08)",borderRadius:6,padding:"6px 10px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <div style={{color:"var(--txt4)",fontSize:10,marginBottom:2}}>지급요금액 (자동)</div>
                <div style={{color:"#a5b4fc",fontWeight:800,fontSize:14}}>{calcPayAmt(form.amount,form.taxType).toLocaleString()}원</div>
                {form.taxType!=="면세"&&form.taxType!=="기타"&&<div style={{color:"var(--txt4)",fontSize:10}}>부가세 {calcVAT(form.amount,form.taxType).toLocaleString()}원</div>}
              </div>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginBottom:10}}>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>지급은행</div>
              <select value={form.bank} onChange={e=>setForm({...form,bank:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"6px 8px",fontSize:12}}>
                <option value="">선택</option>
                {BANKS.map(b=><option key={b}>{b}</option>)}
              </select>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>지급계좌번호</div>
              <input placeholder="- 없이 입력" value={form.accountNo}
                onChange={e=>setForm({...form,accountNo:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>예금주명</div>
              <input placeholder="예금주" value={form.accountName}
                onChange={e=>setForm({...form,accountName:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>증빙</div>
              <select value={form.evidence} onChange={e=>setForm({...form,evidence:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"6px 8px",fontSize:12}}>
                {EVIDENCE_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>결의자</div>
              <input placeholder="결의자 이름" value={form.resolver}
                onChange={e=>setForm({...form,resolver:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>증빙수취</div>
              <select value={form.receiptStatus} onChange={e=>setForm({...form,receiptStatus:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"6px 8px",fontSize:12}}>
                {RECEIPT_STATES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>지급</div>
              <select value={form.payStatus} onChange={e=>setForm({...form,payStatus:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"6px 8px",fontSize:12}}>
                {PAY_STATES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={{gridColumn:"span 2"}}>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>비고</div>
              <input placeholder="메모" value={form.note}
                onChange={e=>setForm({...form,note:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setShowForm(false)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--txt4)",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>취소</button>
            <button onClick={submit} className="btn btn-primary" style={{padding:"6px 18px",fontSize:12}}>등록</button>
          </div>
        </div>
      )}

      {/* 필터 */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        {["전체","예정","지급"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{
            padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",
            background:filter===f?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,.05)",
            color:filter===f?"#fff":"var(--txt3)",
          }}>{f} {f!=="전체"&&`(${expenses.filter(e=>e.payStatus===f).length})`}</button>
        ))}
        <span style={{marginLeft:"auto",color:"var(--txt4)",fontSize:11}}>
          조회 {filtered.length}건 · 금액합계 {totalAmt.toLocaleString()}원 · 지급요금액 {totalPay.toLocaleString()}원
        </span>
      </div>

      {/* 테이블 */}
      <div style={{overflowX:"auto",borderRadius:8,border:"1px solid rgba(255,255,255,.07)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:1100}}>
          <thead>
            <tr>
              <TH w={36}>연번</TH>
              <TH w={130}>프로젝트명</TH>
              <TH w={140}>지출내용</TH>
              <TH w={90}>금액</TH>
              <TH w={90}>세금형태</TH>
              <TH w={90} color="#34d399">공급가액</TH>
              <TH w={80} color="#34d399">부가세</TH>
              <TH w={100} color="#a5b4fc">지급요금액</TH>
              <TH w={80}>지급은행</TH>
              <TH w={120}>계좌번호</TH>
              <TH w={70}>예금주</TH>
              <TH w={90}>증빙</TH>
              <TH w={60}>결의자</TH>
              <TH w={70}>증빙수취</TH>
              <TH w={60}>지급</TH>
              <TH w={100}>비고</TH>
              <TH w={36}></TH>
            </tr>
          </thead>
          <tbody>
            {filtered.length===0 && (
              <tr><td colSpan={17} style={{textAlign:"center",color:"var(--txt4)",padding:"32px",fontSize:13}}>등록된 지출결의 내역이 없습니다</td></tr>
            )}
            {filtered.map((e,i)=>{
              const supply = calcSupply(e.amount,e.taxType);
              const vat = calcVAT(e.amount,e.taxType);
              const payAmt = calcPayAmt(e.amount,e.taxType);
              const rowBg = i%2===0?"transparent":"rgba(255,255,255,.015)";
              return (
                <tr key={e.id} style={{background:rowBg}}>
                  <TD align="center" color="#6366f1" bold>{e.seq||i+1}</TD>
                  <TD><span style={{color:"#a5b4fc",fontSize:11}}>{e.projectName||"-"}</span></TD>
                  <TD>{e.description}</TD>
                  <TD align="right" bold>{(e.amount||0).toLocaleString()}</TD>
                  <TD align="center">
                    <span style={{background:
                      e.taxType==="부가세별도"?"rgba(99,102,241,.12)":
                      e.taxType==="부가세포함"?"rgba(6,182,212,.12)":
                      e.taxType==="면세"?"rgba(16,185,129,.12)":"rgba(100,116,139,.12)",
                      color:e.taxType==="부가세별도"?"#a5b4fc":e.taxType==="부가세포함"?"#38bdf8":e.taxType==="면세"?"#34d399":"#94a3b8",
                      borderRadius:4,padding:"2px 6px",fontSize:11,fontWeight:600}}>
                      {e.taxType}
                    </span>
                  </TD>
                  <TD align="right" color="#34d399">{supply.toLocaleString()}</TD>
                  <TD align="right" color="#34d399">{vat.toLocaleString()}</TD>
                  <TD align="right" bold color="#a5b4fc">{payAmt.toLocaleString()}</TD>
                  <TD>{e.bank||"-"}</TD>
                  <TD><span style={{fontFamily:"monospace",fontSize:11}}>{e.accountNo||"-"}</span></TD>
                  <TD>{e.accountName||"-"}</TD>
                  <TD align="center"><span style={{fontSize:11,color:"var(--txt3)"}}>{e.evidence}</span></TD>
                  <TD align="center">{e.resolver||"-"}</TD>
                  <TD align="center">
                    <span style={{
                      color:e.receiptStatus==="발행"?"#34d399":e.receiptStatus==="미발행"?"#fbbf24":"#94a3b8",
                      fontSize:11,fontWeight:600}}>
                      {e.receiptStatus}
                    </span>
                  </TD>
                  <TD align="center">
                    <span style={{
                      background:e.payStatus==="지급"?"rgba(16,185,129,.15)":"rgba(245,158,11,.12)",
                      color:e.payStatus==="지급"?"#34d399":"#fbbf24",
                      borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:700}}>
                      {e.payStatus}
                    </span>
                  </TD>
                  <TD color="var(--txt4)">{e.note||""}</TD>
                  <td style={{padding:"4px",textAlign:"center",border:"1px solid rgba(255,255,255,.04)"}}>
                    <button onClick={()=>deleteItem(e.id)}
                      style={{background:"transparent",border:"none",color:"#fca5a5",fontSize:13,cursor:"pointer",padding:0,lineHeight:1}}>×</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
          {filtered.length>0 && (
            <tfoot>
              <tr style={{background:"rgba(99,102,241,.08)"}}>
                <td colSpan={3} style={{padding:"7px 8px",color:"#a5b4fc",fontWeight:700,fontSize:12,borderTop:"2px solid rgba(99,102,241,.3)"}}>합계</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:"var(--txt)",fontWeight:800,fontSize:12,borderTop:"2px solid rgba(99,102,241,.3)"}}>{totalAmt.toLocaleString()}</td>
                <td style={{borderTop:"2px solid rgba(99,102,241,.3)"}}/>
                <td style={{padding:"7px 8px",textAlign:"right",color:"#34d399",fontWeight:700,fontSize:12,borderTop:"2px solid rgba(99,102,241,.3)"}}>{filtered.reduce((s,e)=>s+calcSupply(e.amount,e.taxType),0).toLocaleString()}</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:"#34d399",fontWeight:700,fontSize:12,borderTop:"2px solid rgba(99,102,241,.3)"}}>{filtered.reduce((s,e)=>s+calcVAT(e.amount,e.taxType),0).toLocaleString()}</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:"#a5b4fc",fontWeight:800,fontSize:13,borderTop:"2px solid rgba(99,102,241,.3)"}}>{totalPay.toLocaleString()}</td>
                <td colSpan={9} style={{borderTop:"2px solid rgba(99,102,241,.3)"}}/>
              </tr>
            </tfoot>
          )}
        </table>
      </div>
    </div>
  );
}

// ─ 인건비 ──────────────────────────────────────────────────────────────────
function LaborPanel({laborCosts, setLaborCosts, projects, users, currentUser}) {
  const BANKS = ["국민은행","신한은행","우리은행","하나은행","농협은행","기업은행","카카오뱅크","토스뱅크","케이뱅크","수협은행","SC제일은행","씨티은행","새마을금고","신협","우체국","기타"];
  const TAX_TYPES = ["사업소득","기타소득"];
  const PAY_STATES = ["예정","지급"];
  const EMPTY = {projectId:"",description:"",amount:"",taxType:"사업소득",idNumber:"",bank:"",accountNo:"",accountName:"",resolver:"",reportDate:today,payStatus:"예정",note:""};

  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(EMPTY);
  const [filter, setFilter] = useState("전체");

  // 세금형태별 원천세 계산
  // 사업소득: 3.3% (소득세 3% + 지방소득세 0.3%)
  // 기타소득: 22% (소득세 20% + 지방소득세 2%)
  const calcTax = (amount, taxType) => {
    const amt = parseInt(amount)||0;
    if (taxType==="사업소득") {
      const incomeTax = Math.round(amt*0.03);
      const localTax = Math.round(amt*0.003);
      return { incomeTax, localTax, total: incomeTax+localTax, netPay: amt-(incomeTax+localTax) };
    } else { // 기타소득
      const incomeTax = Math.round(amt*0.20);
      const localTax = Math.round(amt*0.02);
      return { incomeTax, localTax, total: incomeTax+localTax, netPay: amt-(incomeTax+localTax) };
    }
  };

  const submit = () => {
    if (!form.projectId||!form.description.trim()||!form.amount) {
      toast("프로젝트·지출내용·금액은 필수입니다","error"); return;
    }
    const proj = projects.find(p=>p.id===parseInt(form.projectId));
    const nextSeq = (laborCosts.length>0 ? Math.max(...laborCosts.map(e=>e.seq||0)) : 0) + 1;
    setLaborCosts(prev=>[...prev,{
      id:Date.now(), seq:nextSeq, createdAt:today,
      projectId:parseInt(form.projectId), projectName:proj?.name||"",
      description:form.description, amount:parseInt(form.amount)||0,
      taxType:form.taxType, idNumber:form.idNumber,
      bank:form.bank, accountNo:form.accountNo, accountName:form.accountName,
      resolver:form.resolver, reportDate:form.reportDate,
      payStatus:form.payStatus, note:form.note,
    }]);
    setForm(EMPTY); setShowForm(false);
    toast("👤 인건비 등록 완료","success");
  };

  const deleteItem = (id) => setLaborCosts(prev=>prev.filter(e=>e.id!==id));
  const filtered = filter==="전체" ? laborCosts : filter==="사업소득"||filter==="기타소득"
    ? laborCosts.filter(e=>e.taxType===filter)
    : laborCosts.filter(e=>e.payStatus===filter);

  const totalAmt = filtered.reduce((s,e)=>s+(parseInt(e.amount)||0),0);
  const totalTax = filtered.reduce((s,e)=>s+calcTax(e.amount,e.taxType).total,0);
  const totalNet = filtered.reduce((s,e)=>s+calcTax(e.amount,e.taxType).netPay,0);

        </div>
        <button className="btn btn-primary" onClick={()=>setShowForm(v=>!v)}>+ 인건비 등록</button>
      </div>

      {/* 요약 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:16}}>
        {[["전체 건수",laborCosts.length+"건","#a5b4fc"],
          ["사업소득",laborCosts.filter(e=>e.taxType==="사업소득").length+"건","#6366f1"],
          ["기타소득",laborCosts.filter(e=>e.taxType==="기타소득").length+"건","#ec4899"],
          ["세액합계",filtered.reduce((s,e)=>s+calcTax(e.amount,e.taxType).total,0).toLocaleString()+"원","#f59e0b"],
          ["실지급합계",totalNet.toLocaleString()+"원","#34d399"],
        ].map(([l,v,c])=>(
          <div key={l} className="card-sm" style={{textAlign:"center",padding:"10px"}}>
            <div style={{color:"var(--txt4)",fontSize:10,marginBottom:4}}>{l}</div>
            <div style={{color:c,fontWeight:800,fontSize:13}}>{v}</div>
          </div>
        ))}
      </div>

      {/* 등록 폼 */}
      {showForm && (
        <div className="card-sm" style={{marginBottom:16,border:"1px solid rgba(99,102,241,.3)"}}>
          <div style={{color:"var(--txt2)",fontWeight:700,fontSize:13,marginBottom:12}}>📝 인건비 등록</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8,marginBottom:10}}>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>프로젝트 *</div>
              <select value={form.projectId} onChange={e=>setForm({...form,projectId:e.target.value})}

                <option value="">선택</option>
                {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}

            </div>
            <div style={{gridColumn:"span 2"}}>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>지출내용 *</div>
              <input placeholder="예: 프로듀서(홍길동), 강사료, 스태프 인건비" value={form.description}
                onChange={e=>setForm({...form,description:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>금액 (원) *</div>
              <input type="number" placeholder="0" value={form.amount}

                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>세금형태 *</div>
              <select value={form.taxType} onChange={e=>setForm({...form,taxType:e.target.value})}

              </select>
            </div>
            {previewTax && (

                <div style={{color:"var(--txt4)",fontSize:10,marginBottom:4}}>

                  <div><span style={{color:"var(--txt4)",fontSize:10}}>공제합계 </span><span style={{color:"#f59e0b",fontWeight:700,fontSize:12}}>{previewTax.total.toLocaleString()}원</span></div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginBottom:10}}>

            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>지급은행</div>
              <select value={form.bank} onChange={e=>setForm({...form,bank:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"6px 8px",fontSize:12}}>

            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>계좌번호</div>

            <div>

// ─ Urgent Tasks Panel (긴급건 알림) ─
function UrgentTasksPanel({project, onUpdate}) {
  const todayStr = new Date().toISOString().slice(0,10);
  const d3 = new Date(Date.now()+3*86400000).toISOString().slice(0,10);
  const gantt = project.gantt||[];
  // 세부 과업(subtask)만 노출 — 구분 항목(main task) 제외
  const urgents = [];
  gantt.forEach((t,gi)=>{
    (t.subtasks||[]).forEach((s,si)=>{
      if(s.endDate && s.endDate>=todayStr && s.endDate<=d3 && !s.done)
        urgents.push({name:`${t.task} › ${s.task}`, assignee:s.assignee||t.assignee||"", endDate:s.endDate, progress:s.done?100:0, color:t.color||"#6366f1", type:"sub", ganttIdx:gi, subIdx:si});
    });
  });
  // 이미 지난 과업(endDate < today)도 미완료이면 추가 — subtask만
  gantt.forEach((t,gi)=>{
    (t.subtasks||[]).forEach((s,si)=>{
      if(s.endDate && s.endDate<todayStr && !s.done)
        urgents.push({name:`${t.task} › ${s.task}`, assignee:s.assignee||t.assignee||"", endDate:s.endDate, progress:0, color:t.color||"#ef4444", type:"overdue", ganttIdx:gi, subIdx:si});
    });
  });
  urgents.sort((a,b)=>a.endDate.localeCompare(b.endDate));
  if(!urgents.length) return null;
  const getDday = (d) => { const diff=Math.ceil((new Date(d)-new Date(todayStr))/(86400000)); return diff===0?"오늘":diff<0?`D+${Math.abs(diff)}`:`D-${diff}`; };

  // ✅ 세부 과업 완료 처리 → 간트차트 자동 반영
  const handleComplete = (u) => {
    const newGantt = [...gantt];
    const parentTask = {...newGantt[u.ganttIdx]};
    const newSubtasks = [...(parentTask.subtasks||[])];
    newSubtasks[u.subIdx] = {...newSubtasks[u.subIdx], done: true};
    parentTask.subtasks = newSubtasks;
    // 부모 task progress 자동 계산 (완료된 subtask 비율)
    const total = newSubtasks.length;
    const doneCount = newSubtasks.filter(s=>s.done).length;
    parentTask.progress = total > 0 ? Math.round((doneCount / total) * 100) : 0;
    newGantt[u.ganttIdx] = parentTask;
    onUpdate({...project, gantt: newGantt});
    toast(`✅ "${u.name}" 완료 처리됨`,"success");
  };

  return (
    <div style={{background:"linear-gradient(135deg,rgba(239,68,68,.08),rgba(249,115,22,.06))",
      border:"1px solid rgba(239,68,68,.25)",borderRadius:12,padding:"14px 18px",marginBottom:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:16}}>🚨</span>
        <span style={{color:"#ef4444",fontWeight:700,fontSize:14}}>긴급 과업</span>
        <span style={{background:"rgba(239,68,68,.15)",color:"#ef4444",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{urgents.length}건</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {urgents.map((u,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",
            background:u.type==="overdue"?"rgba(239,68,68,.08)":"rgba(249,115,22,.06)",
            borderRadius:8,border:`1px solid ${u.type==="overdue"?"rgba(239,68,68,.2)":"rgba(249,115,22,.15)"}`}}>
            {/* 완료 버튼 */}
            <button onClick={()=>handleComplete(u)} title="완료 처리" style={{
              width:22,height:22,borderRadius:6,border:"2px solid rgba(16,185,129,.5)",background:"transparent",
              cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
              fontSize:12,color:"#10b981",transition:"all .15s",padding:0,
            }} onMouseEnter={e=>{e.target.style.background="rgba(16,185,129,.15)";e.target.textContent="✓";}}
               onMouseLeave={e=>{e.target.style.background="transparent";e.target.textContent="";}}>
            </button>
            <span style={{width:4,height:24,borderRadius:2,background:u.color,flexShrink:0}}/>
            <span style={{flex:1,fontSize:12,color:"var(--txt)",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}</span>
            {u.assignee&&<span style={{fontSize:10,color:"var(--txt3)",flexShrink:0}}>👤 {u.assignee}</span>}
            <span style={{fontSize:11,fontWeight:700,flexShrink:0,
              color:u.type==="overdue"?"#ef4444":getDday(u.endDate)==="오늘"?"#f59e0b":"#fb923c"}}>{getDday(u.endDate)}</span>
            <span style={{fontSize:10,color:"var(--txt4)",flexShrink:0}}>{u.endDate.slice(5)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─ Overview Calendar (월별 달력) ─
function OverviewCalendar({project}) {
  const now = new Date();
  const [viewYear, setViewYear] = useState(now.getFullYear());
  const [viewMonth, setViewMonth] = useState(now.getMonth());
  const todayStr = now.toISOString().slice(0,10);
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const gantt = project.gantt||[];
  const DOW = ["일","월","화","수","목","금","토"];

  const pad = n=>String(n).padStart(2,"0");
  const getDateStr = d=>`${viewYear}-${pad(viewMonth+1)}-${pad(d)}`;

  const getTasksForDate = (dateStr) => {
    const res=[];
    gantt.forEach(t=>{
      if(t.startDate&&t.endDate&&t.startDate<=dateStr&&t.endDate>=dateStr)
        res.push({name:t.task, assignee:t.assignee, color:t.color||DIV_COLORS[t.division]||"#6366f1", endDate:t.endDate, progress:t.progress||0, type:"task"});
      (t.subtasks||[]).forEach(s=>{
        if(s.startDate&&s.endDate&&s.startDate<=dateStr&&s.endDate>=dateStr)
          res.push({name:s.task, assignee:s.assignee||t.assignee, color:t.color||"#6366f1", endDate:s.endDate, progress:s.done?100:0, type:"sub"});
      });
    });
    return res;
  };

  const d3 = new Date(Date.now()+3*86400000).toISOString().slice(0,10);
  const isUrgent = (t) => t.endDate>=todayStr && t.endDate<=d3 && t.progress<100;

  const prevMonth = () => { if(viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);} else setViewMonth(m=>m-1); };
  const nextMonth = () => { if(viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);} else setViewMonth(m=>m+1); };
  const goToday = () => { setViewYear(now.getFullYear()); setViewMonth(now.getMonth()); };

  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  return (
    <div className="card-sm" style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:15}}>📆</span>
          <span style={{color:"var(--txt)",fontWeight:700,fontSize:14}}>{viewYear}년 {viewMonth+1}월 업무 달력</span>
        </div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={prevMonth} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--txt3)",borderRadius:4,padding:"2px 8px",fontSize:12,cursor:"pointer"}}>◀</button>
          <button onClick={goToday} style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.3)",color:"#a5b4fc",borderRadius:4,padding:"2px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>오늘</button>
          <button onClick={nextMonth} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--txt3)",borderRadius:4,padding:"2px 8px",fontSize:12,cursor:"pointer"}}>▶</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"var(--border)",borderRadius:8,overflow:"hidden"}}>
        {DOW.map((d,i)=>(
          <div key={d} style={{background:"rgba(99,102,241,.08)",padding:"6px 0",textAlign:"center",
            fontSize:11,fontWeight:700,color:i===0?"#ef4444":i===6?"#3b82f6":"var(--txt3)"}}>{d}</div>
        ))}
        {cells.map((day,i)=>{
          if(day===null) return <div key={`e${i}`} style={{background:"var(--bg)",minHeight:72}}/>;
          const dateStr=getDateStr(day);
          const isToday=dateStr===todayStr;
          const dayTasks=getTasksForDate(dateStr);
          const dow=i%7;
          return (
            <div key={day} style={{background:isToday?"rgba(59,130,246,.08)":"var(--bg)",minHeight:72,padding:3,position:"relative",
              borderLeft:isToday?"2px solid #3b82f6":"none"}}>
              <div style={{fontSize:11,fontWeight:isToday?800:500,
                color:isToday?"#60a5fa":dow===0?"#ef4444":dow===6?"#3b82f6":"var(--txt3)",
                marginBottom:2,textAlign:"right",paddingRight:2}}>
                {day}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:1}}>
                {dayTasks.slice(0,3).map((t,ti)=>(
                  <div key={ti} style={{fontSize:9,padding:"1px 4px",borderRadius:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                    background:isUrgent(t)?`rgba(239,68,68,.15)`:`${t.color}22`,
                    color:isUrgent(t)?"#ef4444":"var(--txt2)",
                    border:isUrgent(t)?"1px solid rgba(239,68,68,.3)":`1px solid ${t.color}33`,
                    fontWeight:isUrgent(t)?700:400}}>
                    {t.name}{t.assignee?` · ${t.assignee}`:""}
                  </div>
                ))}
                {dayTasks.length>3&&<div style={{fontSize:8,color:"var(--txt4)",textAlign:"center"}}>+{dayTasks.length-3}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─ WorkLog ─
function WorkLog({project, onUpdate, users, currentUser}) {
  const [mode, setMode]               = useState("comment"); // "comment" | "delegation"
  const [newLog, setNewLog]           = useState("");
  const [delegateTask, setDelegateTask] = useState("");
  const [delegateTo, setDelegateTo]   = useState("");

  // 위임 가능한 멤버 (승인된 계정 중 본인 제외)
  const assignableUsers = (users||[]).filter(u =>
    u.approved && u.id !== (currentUser?.id)
  );

  const addComment = () => {
    if (!newLog.trim()) return;
    onUpdate({...project, logs:[...project.logs,{
      id:Date.now(), date:today,
      author: currentUser?.name || "사용자",
      type:"comment", content:newLog,
    }]});
    setNewLog("");
    toast("💬 코멘트가 기록되었습니다","success");
  };

  const addDelegation = () => {
    if (!delegateTask.trim() || !delegateTo) {
      toast("과업명과 위임 대상을 모두 선택해주세요","error"); return;
    }
    const target = (users||[]).find(u => u.id === delegateTo);
    onUpdate({...project, logs:[...project.logs,{
      id:Date.now(), date:today,
      author: currentUser?.name || "사용자",
      type: "delegation",
      content: newLog.trim() || `[${delegateTask}] 과업을 위임합니다.`,
      taskName: delegateTask,
      delegateTo:   target?.name || delegateTo,
      delegateToId: delegateTo,
    }]});
    setDelegateTask(""); setDelegateTo(""); setNewLog("");
    toast(`📋 ${target?.name}에게 과업이 위임되었습니다`,"success");
  };

  return (
    <div>

// helper to use CSS vars in inline styles
function var_(name) { return `var(--${name})`; }

// 유효한 참조값인지 확인 (NONE, null, undefined, 빈값 필터링)
const isValidRef = (val) => !!val && val !== "NONE" && val !== "null" && val !== "undefined";

// ─ File Manager (Google Drive 연동 파일 관리) ─
function FileManager({project, onUpdate, onUploadStateChange}) {
  const [uploading, setUploading] = useState(false);
  const [uploadProgress, setUploadProgress] = useState("");
  const [driveFiles, setDriveFiles] = useState([]);
  const [loadingFiles, setLoadingFiles] = useState(false);
  const fileInputRef = useRef(null);
  const reuploadInputRef = useRef(null);
  const [reuploadTarget, setReuploadTarget] = useState(null); // 재업로드 대상 파일명
  const [deleteTarget, setDeleteTarget] = useState(null);     // 단건 삭제 확인 대상
  const [selectedFiles, setSelectedFiles] = useState(new Set()); // 체크박스 선택
  const [bulkDeleteConfirm, setBulkDeleteConfirm] = useState(false); // 일괄 삭제 확인
  const [drivePending, setDrivePending] = useState(new Set()); // Drive 백그라운드 동기화 중인 파일명
  const [uploadStats, setUploadStats] = useState({current:0, total:0}); // 업로드 진행 통계

  // Drive에서 파일 목록 로드
  useEffect(() => {
    if (!DRIVE_CONFIG.ENABLED) return;
    setLoadingFiles(true);
    SyncManager.listFiles(project.name).then(files => {
      setDriveFiles(files);
      setLoadingFiles(false);
    });
  }, [project.name]);

  // ⚡ R2-first 병렬 업로드 핸들러 (속도 최적화)
  const handleFiles = async (fileList) => {
    if (!fileList || !fileList.length) return;
    onUploadStateChange?.(true);
    setUploading(true);

    const files = Array.from(fileList);
    const total = files.length;
    let completedCount = 0;
    const totalSizeMB = files.reduce((s,f)=>s+f.size, 0) / 1048576;
    const batchStart = Date.now();
    setUploadStats({current: 0, total});
    setUploadProgress(`파일 준비 중... (0/${total}, ${totalSizeMB.toFixed(1)}MB)`);

    // 단일 파일 업로드 함수
    const uploadOne = async (file, idx) => {
      const fileSizeMB = (file.size / 1048576).toFixed(1);
      setUploadStats(prev => ({...prev, current: idx + 1}));
      setUploadProgress(`"${file.name}" 업로드 중... (${idx+1}/${total}, ${fileSizeMB}MB)`);

      if (file.size > 100 * 1024 * 1024) {
        toast(`⏳ "${file.name}" 대용량(${Math.round(file.size/1048576)}MB) 업로드 시작`, "warn");
      }

      // ⚡ R2-first 업로드 — 바이너리 직접 전송 (base64 변환 생략 → 33% 빠름)
      if (CLOUD_CONFIG.ENABLED || DRIVE_CONFIG.ENABLED) {
        const result = await SyncManager.uploadFileR2First(
          project.name, file.name, file, file.type,
          (pct) => setUploadProgress(`"${file.name}" 전송 중... (${idx+1}/${total}, ${pct}%)`)
        );
        if (result && (result.ok || result.success)) {
          completedCount++;
          const elapsed = ((Date.now() - batchStart) / 1000).toFixed(1);
          const fileEntry = {
            name: file.name,
            driveFileId: result.fileId || result.id || "",
            mimeType: file.type,
            size: file.size,
            uploadedAt: new Date().toISOString(),
            url: result.r2Url || result.url || "",
            r2Key: result.r2Key || result.key || "",
          };
          const updatedFiles = [...(project.files||[]).filter(f => (typeof f==="string" ? f : f.name) !== file.name), fileEntry];
          onUpdate({...project, files: updatedFiles});
          setDriveFiles(prev => [...prev.filter(f=>f.name!==file.name), { fileId: fileEntry.driveFileId, name: file.name, mimeType: file.type, size: file.size, url: fileEntry.url, lastUpdated: new Date().toISOString() }]);
          toast(`⚡ "${file.name}" 완료 (${fileSizeMB}MB, ${elapsed}s)`, "success");

          // Drive 백그라운드 동기화 처리
          if (result.drivePromise) {
            setDrivePending(prev => new Set(prev).add(file.name));
            result.drivePromise.then(driveResult => {
              if (driveResult && (driveResult.fileId || driveResult.id)) {
                const driveId = driveResult.fileId || driveResult.id;
                try {
                  const allProjects = JSON.parse(localStorage.getItem("eventos_projects") || "[]");
                  const curProj = allProjects.find(p => p.id === project.id);
                  if (curProj) {
                    const updFiles = (curProj.files||[]).map(f =>
                      (typeof f === "object" && f.name === file.name) ? {...f, driveFileId: driveId} : f
                    );
                    onUpdate({...curProj, files: updFiles});
                  }
                } catch(e) { console.error("[Drive] bg update err:", e); }
                console.log(`[Drive] ✅ bg sync done: ${file.name} → ${driveId}`);
              }
              setDrivePending(prev => { const n = new Set(prev); n.delete(file.name); return n; });
            }).catch(() => {
              setDrivePending(prev => { const n = new Set(prev); n.delete(file.name); return n; });
            });
          }
        } else {
          // 클라우드 실패 → base64 로컬 보관 (파일 유실 방지, 지연 변환)
          const base64 = await SyncManager._fileToBase64(file);
          const fileEntry = {
            name: file.name, mimeType: file.type, size: file.size,
            uploadedAt: new Date().toISOString(),
            base64: base64, pendingUpload: true,
          };
          const updatedFiles = [...(project.files||[]).filter(f => (typeof f==="string" ? f : f.name) !== file.name), fileEntry];
          onUpdate({...project, files: updatedFiles});
          toast(`⚠️ "${file.name}" 로컬 저장됨 (클라우드 재시도 예정)`, "warn");
        }
      } else {
        // 클라우드 전혀 미연결: base64 로컬 보관 (지연 변환)
        const base64 = await SyncManager._fileToBase64(file);
        const fileEntry = {
          name: file.name, mimeType: file.type, size: file.size,
          uploadedAt: new Date().toISOString(),
          base64: base64, pendingUpload: true,
        };
        const updatedFiles = [...(project.files||[]).filter(f => (typeof f==="string" ? f : f.name) !== file.name), fileEntry];
        onUpdate({...project, files: updatedFiles});
        toast(`📁 "${file.name}" 로컬 저장 (클라우드 연결 시 자동 업로드)`, "warn");
      }
    };

    // 🔥 병렬 업로드 (최대 5개 동시 — 속도 최적화)
    const CONCURRENCY = 5;
    for (let i = 0; i < files.length; i += CONCURRENCY) {
      const batch = files.slice(i, i + CONCURRENCY);
      await Promise.allSettled(batch.map((file, j) => uploadOne(file, i + j)));
    }

    const totalElapsed = ((Date.now() - batchStart) / 1000).toFixed(1);
    setUploading(false);
    setUploadProgress("");
    setUploadStats({current: 0, total: 0});
    onUploadStateChange?.(false);
    if (fileInputRef.current) fileInputRef.current.value = "";
    toast(`✅ ${completedCount}/${total}개 업로드 완료 (${totalSizeMB.toFixed(1)}MB, ${totalElapsed}s)`, "success");
  };

  const handleDrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
  const handleDragOver = (e) => { e.preventDefault(); };

  // 파일 다운로드 (Google Drive 우선 → R2 폴백 → base64 로컬 폴백)
  const handleDownload = async (file) => {
    // 1) Google Drive 우선 (사용자 요청) — "NONE" 등 무효값 필터
    if (isValidRef(file.driveFileId) && DRIVE_CONFIG.ENABLED) {
      try {
        const res = await fetch(`${DRIVE_CONFIG.GAS_URL}?action=downloadFile&fileId=${file.driveFileId}`, {redirect:"follow"});
        const data = await res.json();
        if (data.webViewLink) { window.open(data.webViewLink, "_blank"); return; }
        if (data.downloadUrl) { window.open(data.downloadUrl, "_blank"); return; }
      } catch (err) { console.error("[DriveSync] download error:", err); }
    }
    // 2) Cloudflare R2 URL 폴백 — "NONE" 등 무효값 필터
    if (isValidRef(file.url)) { window.open(file.url, "_blank"); return; }
    // 3) 로컬 base64 폴백 (파일 유실 방지) — "NONE" 등 무효값 필터
    if (isValidRef(file.base64)) {
      try {
        const byteChars = atob(file.base64);
        const byteArr = new Uint8Array(byteChars.length);
        for (let i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
        const blob = new Blob([byteArr], {type: file.mimeType || "application/octet-stream"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = file.name; document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        toast(`📥 "${file.name}" 로컬 다운로드`, "success");
        return;
      } catch (err) { console.error("[Local] download error:", err); }
    }
    // 4) 클라우드에 파일이 없음 → 재업로드 안내
    toast(`⚠️ "${file.name}" 클라우드 저장소에 없습니다. '재업로드' 버튼으로 다시 업로드해주세요.`, "warn");
  };

  // 레거시 파일 재업로드: 사용자가 파일을 다시 선택하면 듀얼 업로드 후 fileEntry 업데이트
  const handleReupload = async (fileList) => {
    if (!fileList || !fileList.length || !reuploadTarget) return;
    const file = fileList[0];
    const targetName = reuploadTarget;
    const fileSizeMB = (file.size / 1048576).toFixed(1);
    setReuploadTarget(null);

    setUploading(true);
    setUploadProgress(`"${targetName}" 재업로드 중... (${fileSizeMB}MB)`);

    // ⚡ 바이너리 직접 전송 (base64 변환 생략)
    if (CLOUD_CONFIG.ENABLED || DRIVE_CONFIG.ENABLED) {
      const startTime = Date.now();
      const result = await SyncManager.uploadFileR2First(
        project.name, targetName, file, file.type,
        (pct) => setUploadProgress(`"${targetName}" 전송 중... (${pct}%)`)
      );
      if (result && (result.ok || result.success)) {
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        const fileEntry = {
          name: targetName,
          driveFileId: result.fileId || result.id || "",
          mimeType: file.type,
          size: file.size,
          uploadedAt: new Date().toISOString(),
          url: result.r2Url || result.url || "",
          r2Key: result.r2Key || result.key || "",
        };
        const updatedFiles = [...(project.files||[]).filter(f => (typeof f==="string" ? f : f.name) !== targetName), fileEntry];
        onUpdate({...project, files: updatedFiles});
        setDriveFiles(prev => [...prev.filter(f=>f.name!==targetName), { fileId: fileEntry.driveFileId, name: targetName, mimeType: file.type, size: file.size, url: fileEntry.url, lastUpdated: new Date().toISOString() }]);
        toast(`⚡ "${targetName}" 재업로드 완료 (${fileSizeMB}MB, ${elapsed}s)`, "success");

        // Drive 백그라운드 동기화 처리
        if (result.drivePromise) {
          setDrivePending(prev => new Set(prev).add(targetName));
          result.drivePromise.then(driveResult => {
            if (driveResult && (driveResult.fileId || driveResult.id)) {
              const driveId = driveResult.fileId || driveResult.id;
              try {
                const allProjects = JSON.parse(localStorage.getItem("eventos_projects") || "[]");
                const curProj = allProjects.find(p => p.id === project.id);
                if (curProj) {
                  const updFiles = (curProj.files||[]).map(f =>
                    (typeof f === "object" && f.name === targetName) ? {...f, driveFileId: driveId} : f
                  );
                  onUpdate({...curProj, files: updFiles});
                }
              } catch(e) { console.error("[Drive] bg update err:", e); }
              console.log(`[Drive] ✅ bg sync done: ${targetName} → ${driveId}`);
            }
            setDrivePending(prev => { const n = new Set(prev); n.delete(targetName); return n; });
          }).catch(() => {
            setDrivePending(prev => { const n = new Set(prev); n.delete(targetName); return n; });
          });
        }
      } else {
        // 클라우드 실패 → base64 로컬 보관 (지연 변환)
        const base64 = await SyncManager._fileToBase64(file);
        const fileEntry = {
          name: targetName, mimeType: file.type, size: file.size,
          uploadedAt: new Date().toISOString(),
          base64: base64, pendingUpload: true,
        };
        const updatedFiles = [...(project.files||[]).filter(f => (typeof f==="string" ? f : f.name) !== targetName), fileEntry];
        onUpdate({...project, files: updatedFiles});
        toast(`⚠️ "${targetName}" 로컬 저장됨 (클라우드 재시도 예정)`, "warn");
      }
    }
    setUploading(false);
    setUploadProgress("");
    if (reuploadInputRef.current) reuploadInputRef.current.value = "";
  };

  // 파일 삭제 (양쪽 저장소 모두 삭제)
  const handleDelete = async (file) => {
    const fileName = typeof file === "string" ? file : file.name;
    // 1. localStorage에서 제거
    const updatedFiles = (project.files||[]).filter(f => (typeof f==="string" ? f : f.name) !== fileName);
    onUpdate({...project, files: updatedFiles});
    // 2. Google Drive에서 삭제 — "NONE" 등 무효값 필터
    if (isValidRef(file.driveFileId) && DRIVE_CONFIG.ENABLED) {
      try {
        await fetch(DRIVE_CONFIG.GAS_URL, {
          method:"POST", headers:{"Content-Type":"text/plain"},
          body: JSON.stringify({action:"deleteFile", fileId: file.driveFileId}), redirect:"follow",
        });
        console.log("[DriveSync] 🗑️ deleted:", fileName);
      } catch (err) { console.error("[DriveSync] delete error:", err); }
    }
    // 3. Cloudflare R2에서 삭제 — "NONE" 등 무효값 필터
    if (isValidRef(file.r2Key) && CLOUD_CONFIG.ENABLED) {
      try {
        await CloudSync.deleteFile(file.r2Key);
        console.log("[CloudSync] 🗑️ deleted:", fileName);
      } catch (err) { console.error("[CloudSync] delete error:", err); }
    }
    // 즉시 UI 반영 (optimistic)
    setDriveFiles(prev => prev.filter(f=>f.name!==fileName));
    toast(`🗑️ "${fileName}" 삭제됨 (모든 저장소에서 제거)`);
    // 서버에서 최신 파일 목록 재로드 (auto-refresh)
    if (DRIVE_CONFIG.ENABLED || CLOUD_CONFIG.ENABLED) {
      try {
        const freshFiles = await SyncManager.listFiles(project.name);
        setDriveFiles(freshFiles);
      } catch (err) { console.error("[FileManager] post-delete refresh:", err); }
    }
  };

  // files 배열 통합 (기존 string[] + 새 object[])
  const allFiles = useMemo(() => {
    const projectFiles = (project.files||[]).map(f => typeof f === "string" ? { name: f, legacy: true } : f);
    // driveFiles에만 있는 파일 추가 (이름 없는 고스트 엔트리 필터링)
    const projNames = new Set(projectFiles.map(f=>f.name));
    const extra = driveFiles.filter(df => df.name && !projNames.has(df.name));
    return [...projectFiles, ...extra];
  }, [project.files, driveFiles]);

  const fmtSize = (s) => s ? (s > 1048576 ? (s/1048576).toFixed(1)+"MB" : (s/1024).toFixed(0)+"KB") : "";

  // 체크박스 선택 헬퍼
  const toggleSelect = (name) => setSelectedFiles(prev => {
    const n = new Set(prev); n.has(name) ? n.delete(name) : n.add(name); return n;
  });
  const toggleSelectAll = () => setSelectedFiles(
    selectedFiles.size === allFiles.length ? new Set() : new Set(allFiles.map(f=>f.name))
  );
  const isAllSelected = allFiles.length > 0 && selectedFiles.size === allFiles.length;

  // 일괄 다운로드
  const handleBulkDownload = async () => {
    const sel = allFiles.filter(f => selectedFiles.has(f.name));
    for (const f of sel) await handleDownload(f);
    toast(`📥 ${sel.length}개 파일 다운로드 시작`, "success");
  };
  // 일괄 삭제
  const handleBulkDelete = async () => {
    const sel = allFiles.filter(f => selectedFiles.has(f.name));
    setBulkDeleteConfirm(false);
    for (const f of sel) await handleDelete(f);
    setSelectedFiles(new Set());
    toast(`🗑️ ${sel.length}개 파일 삭제 완료`, "success");
  };

  return (
    <div>
      <div style={{color:"var(--txt)",fontWeight:700,marginBottom:14,fontSize:14}}>📁 파일 & 공유 드라이브</div>

      {/* 재업로드용 숨겨진 파일 인풋 */}
      <input ref={reuploadInputRef} type="file" style={{display:"none"}} onChange={e=>handleReupload(e.target.files)}/>
      {/* 업로드 드롭존 */}
      <input ref={fileInputRef} type="file" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
      <div className="drop-zone" onClick={()=>fileInputRef.current?.click()} onDrop={handleDrop} onDragOver={handleDragOver}
        style={uploading?{borderColor:"#6366f1",background:"rgba(99,102,241,.06)"}:{}}>
        {uploading ? (
          <>
            <div style={{fontSize:32,marginBottom:10,animation:"spin 1s linear infinite"}}>⚡</div>
            <div style={{color:"#a5b4fc",marginBottom:6,fontWeight:600}}>{uploadProgress}</div>
            {/* 프로그레스 바 */}
            {uploadStats.total > 0 && (
              <div style={{width:"80%",maxWidth:300,margin:"8px auto 0"}}>
                <div style={{background:"rgba(255,255,255,.08)",borderRadius:6,height:8,overflow:"hidden"}}>
                  <div style={{
                    width:`${Math.round((uploadStats.current / uploadStats.total) * 100)}%`,
                    height:"100%",borderRadius:6,transition:"width .3s",
                    background:"linear-gradient(90deg,#6366f1,#a855f7)",
                  }}/>
                </div>
                <div style={{color:"var(--txt4)",fontSize:10,marginTop:4,textAlign:"center"}}>
                  {uploadStats.current}/{uploadStats.total} 파일 · R2 고속 업로드
                </div>
              </div>
            )}
          </>
        ) : (
          <>
            <div style={{fontSize:32,marginBottom:10}}>☁️</div>
            <div style={{color:"#94a3b8",marginBottom:6}}>파일 드래그 또는 클릭하여 업로드</div>
            <div style={{color:"var(--txt4)",fontSize:12}}>
              {DRIVE_CONFIG.ENABLED ? "⚡ R2 고속 업로드 + Google Drive 자동 백업" : "Google Drive 연결 후 클라우드 동기화 가능"}
            </div>
          </>
        )}
      </div>

      {/* 파일 목록 */}
      <div className="card-sm" style={{marginTop:14}}>
        <div className="flex-between" style={{marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {allFiles.length > 0 && (
              <input type="checkbox" checked={isAllSelected} onChange={toggleSelectAll}
                style={{width:16,height:16,cursor:"pointer",accentColor:"#6366f1"}}/>
            )}
            <span style={{color:"var(--txt3)",fontSize:12}}>📂 Google Drive: /{project.name}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            {selectedFiles.size > 0 && (
              <>
                <span style={{color:"#a5b4fc",fontSize:11,fontWeight:600}}>{selectedFiles.size}개 선택</span>
                <button className="btn btn-ghost" style={{padding:"2px 8px",fontSize:10}}
                  onClick={handleBulkDownload}>📥 일괄 다운로드</button>
                <button className="btn btn-ghost" style={{padding:"2px 8px",fontSize:10,color:"#fca5a5",borderColor:"rgba(239,68,68,.2)"}}
                  onClick={()=>setBulkDeleteConfirm(true)}>🗑️ 일괄 삭제</button>
              </>
            )}
            {drivePending.size > 0 && (
              <span style={{color:"#a5b4fc",fontSize:10,background:"rgba(99,102,241,.1)",padding:"2px 8px",borderRadius:10,display:"flex",alignItems:"center",gap:3}}>
                <span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>🔄</span>
                Drive 백그라운드 동기화 {drivePending.size}개
              </span>
            )}
            {loadingFiles && <span style={{color:"var(--txt4)",fontSize:11}}>로딩 중...</span>}
            {DRIVE_CONFIG.ENABLED && !loadingFiles && (
              <button className="btn btn-ghost" style={{padding:"2px 8px",fontSize:10}}
                onClick={()=>{setLoadingFiles(true);SyncManager.listFiles(project.name).then(f=>{setDriveFiles(f);setLoadingFiles(false)})}}>
                🔄 새로고침
              </button>
            )}
          </div>
        </div>

        {allFiles.length === 0 && (
          <div style={{textAlign:"center",color:"var(--txt4)",padding:20,fontSize:13}}>등록된 파일이 없습니다</div>
        )}

        {allFiles.map((f, i) => (
          <div key={f.name+i} className="flex-between" style={{padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.04)",flexWrap:"wrap",gap:6}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
              <input type="checkbox" checked={selectedFiles.has(f.name)} onChange={()=>toggleSelect(f.name)}
                style={{width:16,height:16,cursor:"pointer",accentColor:"#6366f1",flexShrink:0}}/>
              <span style={{fontSize:16,flexShrink:0}}>{
                f.mimeType?.includes("pdf") ? "📄" :
                f.mimeType?.includes("image") ? "🖼️" :
                f.mimeType?.includes("video") ? "🎬" :
                f.mimeType?.includes("zip") || f.mimeType?.includes("compressed") ? "📦" :
                f.mimeType?.includes("presentation") || f.name?.endsWith(".pptx") ? "📊" : "📎"
              }</span>
              <div style={{minWidth:0}}>
                <div style={{color:"var(--txt2)",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                {(f.size || f.uploadedAt) && (
                  <div style={{color:"var(--txt4)",fontSize:10}}>
                    {fmtSize(f.size)} {f.uploadedAt ? ` · ${f.uploadedAt.slice(0,10)}` : ""}
                  </div>
                )}
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
              {(isValidRef(f.driveFileId) || isValidRef(f.url)) && !drivePending.has(f.name) && <span style={{color:"#10b981",fontSize:11}}>☁️ 완료</span>}
              {(isValidRef(f.driveFileId) || isValidRef(f.url)) && drivePending.has(f.name) && (
                <span style={{color:"#a5b4fc",fontSize:10,display:"flex",alignItems:"center",gap:3}}>
                  <span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>🔄</span> Drive 동기화 중
                </span>
              )}
              {f.pendingUpload && <span style={{color:"#f59e0b",fontSize:10}}>⏳ 대기</span>}
              {!isValidRef(f.driveFileId) && !isValidRef(f.url) && !isValidRef(f.base64) && !f.pendingUpload && (
                <span style={{color:"#ef4444",fontSize:10}}>⚠️ 미연결</span>
              )}
              {!isValidRef(f.driveFileId) && !isValidRef(f.url) && !isValidRef(f.base64) && (
                <button className="btn btn-ghost" style={{padding:"3px 10px",fontSize:11,color:"#f59e0b",borderColor:"rgba(245,158,11,.3)"}}
                  onClick={()=>{setReuploadTarget(f.name);reuploadInputRef.current?.click();}}>
                  🔄 재업로드
                </button>
              )}
              <button className="btn btn-ghost" style={{padding:"3px 10px",fontSize:11}}
                onClick={()=>handleDownload(f)}>
                {isValidRef(f.driveFileId) || isValidRef(f.url) ? "열기" : "다운로드"}
              </button>
              <button className="btn btn-ghost" style={{padding:"3px 8px",fontSize:11,color:"#fca5a5",borderColor:"rgba(239,68,68,.2)"}}
                onClick={()=>setDeleteTarget(f)}>삭제</button>
            </div>
          </div>
        ))}
      </div>

      {/* 단건 삭제 확인 모달 */}
      {deleteTarget && (
        <div className="modal-overlay" onClick={e=>e.target.classList.contains("modal-overlay")&&setDeleteTarget(null)}>
          <div className="modal-box" style={{maxWidth:400}}>
            <div className="modal-title">🗑️ 파일 삭제 확인</div>
            <div style={{color:"var(--txt2)",fontSize:14,marginBottom:18,lineHeight:1.6}}>
              <strong style={{color:"#fca5a5"}}>{deleteTarget.name}</strong> 파일을 삭제하시겠습니까?<br/>
              <span style={{color:"var(--txt4)",fontSize:12}}>모든 저장소(Google Drive, Cloudflare R2)에서 완전히 삭제됩니다.</span>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setDeleteTarget(null)}>취소</button>
              <button className="btn" style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff"}}
                onClick={async()=>{const f=deleteTarget;setDeleteTarget(null);await handleDelete(f);}}>삭제 확인</button>
            </div>
          </div>
        </div>
      )}

      {/* 일괄 삭제 확인 모달 */}
      {bulkDeleteConfirm && (
        <div className="modal-overlay" onClick={e=>e.target.classList.contains("modal-overlay")&&setBulkDeleteConfirm(false)}>
          <div className="modal-box" style={{maxWidth:400}}>
            <div className="modal-title">🗑️ 일괄 삭제 확인</div>
            <div style={{color:"var(--txt2)",fontSize:14,marginBottom:18,lineHeight:1.6}}>
              선택된 <strong style={{color:"#fca5a5"}}>{selectedFiles.size}개</strong> 파일을 삭제하시겠습니까?<br/>
              <span style={{color:"var(--txt4)",fontSize:12}}>모든 저장소에서 완전히 삭제되며 복구할 수 없습니다.</span>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setBulkDeleteConfirm(false)}>취소</button>
              <button className="btn" style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff"}}
                onClick={handleBulkDelete}>삭제 확인</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─ 견적 이력 카드 (세부항목 포함) ─
function QuoteHistoryCard({snap, snapNum, snapDivs, snapCalc, onPrintSnapshot}) {

  const divEntries = Object.entries(snapDivs);
  const itemCount = (snap.items||[]).length;
  return (
    <div style={{
      background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",
      borderRadius:8,marginBottom:8,overflow:"hidden",
    }}>
      {/* 헤더 - 항상 보임 */}
      <div style={{padding:"10px 12px",cursor:"pointer"}} onClick={()=>setExpanded(e=>!e)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <span style={{color:"var(--txt3)",fontSize:11}}>
            <span style={{color:"#a5b4fc",fontWeight:700}}>#{snapNum}</span>
            &nbsp;·&nbsp;{snap.date}&nbsp;·&nbsp;{snap.author}&nbsp;·&nbsp;
            <span style={{color:snap.quoteType==="공공기관"?"#a5b4fc":"#38bdf8"}}>{snap.quoteType}</span>
            <span style={{color:"var(--txt4)",marginLeft:6,fontSize:10}}>({itemCount}개 항목)</span>
          </span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"#a5b4fc",fontWeight:700,fontSize:13}}>
              {snap.totalFinal?.toLocaleString()}원
            </span>
            <span style={{color:"var(--txt4)",fontSize:11,transition:"transform .2s",transform:expanded?"rotate(180deg)":"rotate(0deg)"}}>▼</span>
          </div>
        </div>
        {snap.note&&<div style={{color:"var(--txt4)",fontSize:11}}>📝 {snap.note}</div>}
        {/* 요약 바: 구분별 소계 가로 바 */}
        {!expanded && divEntries.length>0 && (
          <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
            {divEntries.map(([div,data])=>(
              <span key={div} style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.15)",
                borderRadius:4,padding:"2px 7px",fontSize:10,color:"#a5b4fc"}}>
                {div} {data.subtotal.toLocaleString()}
              </span>
            ))}
          </div>
        )}
      </div>

      {/* 확장: 세부 항목 테이블 */}
      {expanded && (
        <div style={{borderTop:"1px solid rgba(255,255,255,.06)",padding:"0 12px 12px"}}>
          {divEntries.map(([div,data])=>(
            <div key={div} style={{marginTop:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{color:"#818cf8",fontSize:11,fontWeight:700}}>{div}</span>
                <span style={{color:"var(--txt4)",fontSize:10}}>소계 {data.subtotal.toLocaleString()}원</span>
              </div>
              <div style={{borderRadius:6,overflow:"hidden",border:"1px solid rgba(255,255,255,.06)"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>

      )}

}

// ─ Project Detail ─
function ProjectDetail({project, onBack, onUpdate, currentUser, users}) {

    {id:"overview",label:"개요"},
    {id:"checklist",label:"체크/견적"},

    {id:"logs",label:"업무 로그"},
    {id:"reports",label:"보고서"},

      {/* 헤더 */}
      <div style={{marginBottom:24}}>

        </div>
        <div style={{color:"var(--txt3)",fontSize:13}}>{project.client} · 프로듀서 {project.producer} · 행사일 {project.eventDate}</div>

      {/* KPI */}
      <div className="grid-3" style={{marginBottom:24}}>
        {[
          {label:"진행률",value:`${project.progress}%`,color:"#a5b4fc"},
          {label:"수익률",value:`${profit}%`,color:profit>20?"#10b981":"#f59e0b"},
          {label:"계약금액",value:`${(project.budget/10000000).toFixed(1)}억`,color:"#f59e0b"},

            <div style={{color:k.color,fontSize:22,fontWeight:800}}>{k.value}</div>

      <div className="tab-bar">

          <OverviewCalendar project={project}/>
          {/* 과업지시서 — 상단 배치 */}

          <div className="grid-2">
            {/* 일정 현황 — 인라인 편집 */}

              <div style={{color:"var(--txt3)",fontSize:12,marginBottom:10}}>📅 일정 현황 <span style={{color:"var(--txt4)",fontSize:10}}>(클릭하여 수정)</span></div>
              {[["시작일","startDate"],["행사일","eventDate"],["종료일","endDate"]].map(([label,key])=>(
                <div key={label} className="flex-between" style={{marginBottom:8}}>
                  <span style={{color:"var(--txt3)",fontSize:13}}>{label}</span>
                  <input type="date" value={project[key]||""}
                    onChange={e=>{onUpdate({...project,[key]:e.target.value});}}
                    style={{background:"transparent",border:"1px solid var(--border)",borderRadius:4,padding:"2px 6px",
                      color:"var(--txt)",fontSize:13,fontWeight:600,textAlign:"right",cursor:"pointer",
                      outline:"none",maxWidth:150}}/>
                </div>
              ))}
            </div>
            {/* 예산 현황 — 인라인 편집 */}

              <div style={{color:"var(--txt3)",fontSize:12,marginBottom:10}}>💵 예산 현황 <span style={{color:"var(--txt4)",fontSize:10}}>(클릭하여 수정)</span></div>
              <div className="flex-between" style={{marginBottom:8}}>
                <span style={{color:"var(--txt3)",fontSize:13}}>계약금액</span>
                <input type="text" value={(project.budget||0).toLocaleString()}
                  onChange={e=>{const v=parseInt(e.target.value.replace(/[^0-9]/g,""))||0;onUpdate({...project,budget:v});}}
                  style={{background:"transparent",border:"1px solid var(--border)",borderRadius:4,padding:"2px 6px",
                    color:"#a5b4fc",fontSize:13,fontWeight:700,textAlign:"right",cursor:"pointer",
                    outline:"none",maxWidth:150}}/>
              </div>
              {[
                ["예상원가",fmt(project.cost),"var(--txt)"],
                ["예상수익",fmt(project.budget-project.cost),profit>0?"#10b981":"#ef4444"],
              ].map(([l,v,c])=>(
                <div key={l} className="flex-between" style={{marginBottom:8}}>
                  <span style={{color:"var(--txt3)",fontSize:13}}>{l}</span>
                  <span style={{color:c,fontSize:13,fontWeight:600}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
          <WorkLog project={project} onUpdate={onUpdate} users={users} currentUser={currentUser}/>
        </div>
      )}
      {tab==="checklist"&&<ChecklistPanel project={project} onUpdate={onUpdate} currentUser={currentUser}/>}
      {tab==="gantt"&&<GanttChart project={project} onUpdate={onUpdate} users={users}/>}
      {tab==="logs"&&<WorkLog project={project} onUpdate={onUpdate} users={users} currentUser={currentUser}/>}
      {tab==="reports"&&<ReportsTabWrapper project={project}/>}
      {/* FileManager는 항상 마운트 — 업로드 중 탭 이동해도 끊기지 않도록 display:none으로 숨김 */}
      <div style={{display: tab==="files" ? "block" : "none"}}>
        <FileManager project={project} onUpdate={onUpdate} onUploadStateChange={setFileUploading}/>
      </div>
    </div>
  );
}

// ─ New Project Modal ─
function NewProjectModal({onClose, onSave, priceList}) {
  const [form, setForm] = useState({
    name:"",client:"",producer:"김지현",budget:"",eventDate:"",
    status:"준비중",tags:"",
  });
  const save = () => {
    if (!form.name||!form.client) { toast("프로젝트명과 클라이언트는 필수입니다","error"); return; }
    const budget = parseInt(form.budget)||0;
    const proj = {
      id:Date.now(), name:form.name, client:form.client, producer:form.producer,
      status:form.status, progress:0, budget:budget, cost:0,
      startDate:today, eventDate:form.eventDate||today, endDate:form.eventDate||today,
      tags:form.tags?form.tags.split(",").map(t=>t.trim()).filter(Boolean):[],
      taskOrder:{sender:"",receivedDate:today,purpose:"",venue:"",attendance:"",tasks:"",requirements:"",notes:""},
      checklist: (priceList||INIT_PRICE_LIST).map((t,i)=>({id:i+1, division:t.division||"기획", category:t.category, item:t.item, done:false, unitPrice:t.unitPrice||0, qty:t.qty||1, days:t.days||1, note:""})),
      logs:[{id:1,date:today,author:"시스템",type:"auto",content:`프로젝트 "${form.name}" 생성됨. 클라이언트: ${form.client}, 담당: ${form.producer}`}],
      customItems:[],
      quoteHistory:[],
      files:[],
      dateMemos:{},
      gantt:[
        {id:1, division:"기획", task:"기획/과업정의", startDate:today, endDate:form.eventDate||today, color:"#6366f1", progress:0, subtasks:[]},
        {id:2, division:"제작", task:"제작/시공", startDate:today, endDate:form.eventDate||today, color:"#06b6d4", progress:0, subtasks:[]},
        {id:3, division:"테크니컬", task:"행사 운영", startDate:form.eventDate||today, endDate:form.eventDate||today, color:"#ec4899", progress:0, subtasks:[]},
      ],
    };
    onSave(proj);
    onClose();
    toast(`✅ "${form.name}" 프로젝트가 생성되었습니다`,"success");
  };
  return (
    <div className="modal-overlay" onClick={e=>e.target.classList.contains("modal-overlay")&&onClose()}>
      <div className="modal-box">
        <div className="modal-title">🎪 새 프로젝트 생성</div>
        {[
          {label:"프로젝트명 *",key:"name",placeholder:"예: 2026 삼성전자 런칭 이벤트"},
          {label:"클라이언트 *",key:"client",placeholder:"고객사명"},
          {label:"담당 프로듀서",key:"producer",placeholder:""},
          {label:"계약 금액 (원)",key:"budget",placeholder:"예: 50000000",type:"number"},
          {label:"행사일",key:"eventDate",type:"date"},
          {label:"태그 (쉼표 구분)",key:"tags",placeholder:"예: 전시, B2B"},
        ].map(f=>(
          <div key={f.key} className="form-group">
            <label className="form-label">{f.label}</label>
            <input className="form-input" type={f.type||"text"} placeholder={f.placeholder} value={form[f.key]}
              onChange={e=>setForm({...form,[f.key]:e.target.value})}/>
          </div>
        ))}
        <div className="form-group">
          <label className="form-label">상태</label>
          <select className="form-input" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
            {["준비중","진행중","보류"].map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>취소</button>
          <button className="btn btn-primary" onClick={save}>생성하기</button>
        </div>
      </div>
    </div>
  );
}

// ─ Dashboard ─
function Dashboard({projects, setPage, setDetail}) {
  const totalBudget = projects.reduce((s,p)=>s+p.budget,0);
  const totalCost = projects.reduce((s,p)=>s+p.cost,0);
  const avgProfit = totalBudget>0?((totalBudget-totalCost)/totalBudget*100).toFixed(1):"0.0";
  const allLogs = projects.flatMap(p=>p.logs.map(l=>({...l,projectName:p.name})))
    .sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);

  return (
    <div>
      <div style={{marginBottom:24}}>
        <h1 style={{color:"var(--txt)",fontSize:22,fontWeight:800,marginBottom:4}}>대시보드</h1>
        <div style={{color:"var(--txt4)",fontSize:13}}>전체 프로젝트 현황 · {today}</div>
      </div>
      {/* KPI */}
      <div className="grid-4" style={{marginBottom:24}}>
        <StatCard label="전체 프로젝트" value={projects.length} sub={`진행중 ${projects.filter(p=>p.status==="진행중").length}건`}/>
        <StatCard label="총 계약금액" value={`${(totalBudget/100000000).toFixed(1)}억`} sub={totalBudget.toLocaleString()+"원"} accent="#a5b4fc"/>
        <StatCard label="평균 수익률" value={`${avgProfit}%`} sub="목표: 30%" accent="#10b981"/>
        <StatCard label="완료 프로젝트" value={projects.filter(p=>p.status==="완료").length} sub="이번 시즌" accent="#f59e0b"/>
      </div>
      {/* 진행중 */}
      <div style={{marginBottom:24}}>
        <div className="flex-between" style={{marginBottom:14}}>
          <span style={{color:"var(--txt2)",fontSize:13,fontWeight:700}}>진행 중인 프로젝트</span>
          <button onClick={()=>setPage("projects")} style={{background:"transparent",border:"none",color:"#6366f1",fontSize:12,cursor:"pointer"}}>전체 보기 →</button>
        </div>
        <div className="grid-3">
          {projects.filter(p=>p.status!=="완료").map(p=>(
            <ProjectCard key={p.id} project={p} onClick={()=>{setDetail(p);setPage("detail");}}/>
          ))}
        </div>
      </div>
      {/* 최근 로그 */}
      <div>
        <div style={{color:"var(--txt2)",fontSize:13,fontWeight:700,marginBottom:14}}>🤖 최근 업무 자동 기록</div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {allLogs.map((log,i)=>(
            <div key={i} style={{
              display:"flex",alignItems:"center",gap:12,padding:"10px 14px",
              background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:8,
              flexWrap:"wrap",gap:8,
            }}>
              <span style={{fontSize:15}}>{log.type==="auto"?"🤖":"💬"}</span>
              <span style={{color:"#6366f1",fontSize:12,fontWeight:600,minWidth:120}}>{log.projectName}</span>
              <span style={{color:"var(--txt2)",fontSize:12,flex:1,minWidth:100}}>{log.content.slice(0,60)}{log.content.length>60?"...":""}</span>
              <span style={{color:"var(--txt4)",fontSize:11,flexShrink:0}}>{log.date}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─ Projects Page ─
function ProjectsPage({projects, setDetail, setPage, onAddProject, onDeleteProject, priceList, currentUser}) {
  const [search, setSearch] = useState("");
  const [status, setStatus] = useState("전체");
  const [showModal, setShowModal] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const isAdmin = currentUser?.isAdmin || false;
  const filtered = projects
    .filter(p=>status==="전체"||p.status===status)
    .filter(p=>!search||p.name.includes(search)||p.client.includes(search)||p.producer.includes(search));

  const handleDelete = () => {
    if (deleteTarget && onDeleteProject) {
      onDeleteProject(deleteTarget.id);
      toast(`"${deleteTarget.name}" 프로젝트가 삭제되었습니다`, "default");
      setDeleteTarget(null);
    }
  };

  return (
    <div>
      <div className="flex-between" style={{marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{color:"var(--txt)",fontSize:20,fontWeight:800}}>전체 프로젝트</h1>
          <div style={{color:"var(--txt4)",fontSize:13}}>총 {projects.length}건</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>➕ 새 프로젝트</button>
      </div>
      {/* 필터 */}
      <div className="flex-row" style={{marginBottom:18,flexWrap:"wrap",gap:8}}>
        <input className="form-input" placeholder="🔍 프로젝트명, 클라이언트 검색"
          value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:160,maxWidth:300}}/>
        {["전체","진행중","준비중","완료","보류"].map(s=>(
          <button key={s} onClick={()=>setStatus(s)} className="btn btn-ghost"
            style={status===s?{background:"var(--primary-dim)",borderColor:"var(--primary-border)",color:"#a5b4fc"}:{}}>
            {s}
          </button>
        ))}
      </div>
      <div className="grid-3">
        {filtered.map(p=>(
          <div key={p.id} style={{position:"relative"}}>
            <ProjectCard project={p} onClick={()=>{setDetail(p);setPage("detail");}}/>
            {isAdmin && (
              <button
                onClick={(e)=>{e.stopPropagation();setDeleteTarget(p);}}
                title="프로젝트 삭제"
                style={{
                  position:"absolute",top:12,right:12,zIndex:2,
                  background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",
                  borderRadius:6,padding:"4px 8px",cursor:"pointer",
                  color:"#f87171",fontSize:12,fontWeight:600,
                  transition:"all .15s",
                }}
                onMouseEnter={e=>{e.target.style.background="rgba(239,68,68,.2)";}}
                onMouseLeave={e=>{e.target.style.background="rgba(239,68,68,.1)";}}
              >🗑</button>
            )}
          </div>
        ))}
        {filtered.length===0&&(
          <div style={{gridColumn:"1/-1",textAlign:"center",color:"var(--txt4)",padding:40}}>검색 결과가 없습니다</div>
        )}
      </div>
      {showModal&&<NewProjectModal onClose={()=>setShowModal(false)} onSave={onAddProject} priceList={priceList}/>}
      {/* 삭제 확인 모달 */}
      {deleteTarget && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}
          onClick={()=>setDeleteTarget(null)}>
          <div className="card-sm" style={{maxWidth:420,width:"100%",padding:28}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:10}}>⚠️</div>
              <div style={{color:"var(--txt)",fontSize:17,fontWeight:700,marginBottom:6}}>프로젝트 삭제</div>
              <div style={{color:"var(--txt3)",fontSize:13,lineHeight:1.6}}>
                <strong style={{color:"#f87171"}}>"{deleteTarget.name}"</strong> 프로젝트를 삭제하시겠습니까?<br/>
                체크리스트, 업무로그, 파일 등 모든 데이터가 삭제됩니다.<br/>
                <span style={{color:"#f87171",fontWeight:600}}>이 작업은 되돌릴 수 없습니다.</span>
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button className="btn btn-ghost" onClick={()=>setDeleteTarget(null)} style={{padding:"8px 24px"}}>취소</button>
              <button className="btn" onClick={handleDelete}
                style={{padding:"8px 24px",background:"#ef4444",color:"#fff",border:"1px solid #dc2626",fontWeight:700}}>
                삭제 확인
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─ My Work ─
function MyWork({projects, user, users, setDetail, setPage, expenses=[], laborCosts=[], purchases=[]}) {
  const myProjects = user?.producer
    ? projects.filter(p=>p.producer===user.producer)
    : projects; // 관리자는 전체 보기
  // 간트차트 subtask 기준 미완료 과업 (데드라인 정렬)
  const todayStr = new Date().toISOString().slice(0,10);
  const myTasks = myProjects.flatMap(p=>
    (p.gantt||[]).flatMap(g=>
      (g.subtasks||[]).filter(s=>!s.done).map(s=>({
        ...s,
        parentTask: g.task,
        division: g.division,
        color: g.color || "#6366f1",
        projectName: p.name,
        projectId: p.id,
      }))
    )
  ).sort((a,b)=>(a.endDate||"9999").localeCompare(b.endDate||"9999")).slice(0,20);
  const getDday = (d) => {
    if(!d) return null;
    const diff = Math.ceil((new Date(d)-new Date(todayStr))/(86400000));
    return diff===0 ? "오늘" : diff<0 ? `D+${Math.abs(diff)}` : `D-${diff}`;
  };
  const getDdayColor = (d) => {
    if(!d) return "var(--txt4)";
    const diff = Math.ceil((new Date(d)-new Date(todayStr))/(86400000));
    return diff<0 ? "#ef4444" : diff<=3 ? "#f59e0b" : "var(--txt3)";
  };

  // 나에게 위임된 과업: 모든 프로젝트의 logs에서 delegation + delegateToId === user.id
  const delegatedToMe = projects.flatMap(p=>
    (p.logs||[])
      .filter(l => l.type==="delegation" && l.delegateToId === user?.id)
      .map(l => ({...l, projectName:p.name, projectId:p.id}))
  ).sort((a,b)=> b.date.localeCompare(a.date));

  // 내가 승인해야 할 지출결의/인건비
  const myPendingExpenses = expenses.filter(e=>e.approverId===user?.id && e.status==="신청중");
  const myPendingLabor = laborCosts.filter(e=>e.approverId===user?.id && e.status==="신청중");
  // 내가 구매해야 할 구매요청
  const myPendingPurchases = purchases.filter(p=>p.buyerId===user?.id && p.status==="요청중");
  const urgentPurchases = myPendingPurchases.filter(p=>p.deadline && p.deadline<=new Date(Date.now()+3*86400000).toISOString().slice(0,10));

  return (
    <div>
      <h1 style={{color:"var(--txt)",fontSize:20,fontWeight:800,marginBottom:4}}>내 업무</h1>
      <div style={{color:"var(--txt4)",fontSize:13,marginBottom:24}}>
        {user?.producer ? `담당 프로젝트 · ${user.name} ${user.role}` : `전체 프로젝트 (관리자 모드) · ${user?.name}`}
      </div>

      {/* 나에게 위임된 과업 (배지) */}
      {delegatedToMe.length > 0 && (
        <div style={{marginBottom:28}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <span style={{color:"#fbbf24",fontSize:13,fontWeight:700}}>📋 나에게 위임된 과업</span>
            <span style={{background:"rgba(245,158,11,.2)",color:"#fbbf24",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{delegatedToMe.length}</span>
          </div>
          {delegatedToMe.map((log,i)=>{
            const proj = projects.find(p=>p.id===log.projectId);
            return (
              <div key={i} style={{
                display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",
                background:"rgba(245,158,11,.05)",border:"1px solid rgba(245,158,11,.2)",
                borderLeft:"3px solid #f59e0b",borderRadius:8,marginBottom:6,
              }}>
                <span style={{fontSize:20,flexShrink:0,marginTop:2}}>📋</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#fbbf24",fontWeight:700,fontSize:13,marginBottom:3}}>
                    {log.taskName}
                  </div>
                  <div style={{color:"var(--txt2)",fontSize:12,marginBottom:4,lineHeight:1.5}}>{log.content}</div>
                  <div style={{color:"var(--txt4)",fontSize:11}}>
                    {log.projectName} &nbsp;·&nbsp;
                    <span style={{color:"#818cf8"}}>{log.author}</span>가 위임 &nbsp;·&nbsp; {log.date}
                  </div>
                </div>
                <button onClick={()=>{if(proj){setDetail(proj);setPage("detail");}}}
                  style={{background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.25)",
                    color:"#a5b4fc",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:600,cursor:"pointer",flexShrink:0}}>
                  프로젝트 보기 →
                </button>
              </div>
            );
          })}
        </div>
      )}

      {/* 승인 대기: 지출결의 */}
      {myPendingExpenses.length > 0 && (
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{color:"#fbbf24",fontSize:13,fontWeight:700}}>💳 승인 대기 · 지출결의</span>
            <span style={{background:"rgba(245,158,11,.2)",color:"#fbbf24",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{myPendingExpenses.length}</span>
          </div>
          {myPendingExpenses.map(e=>(
            <div key={e.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,
              padding:"10px 14px",background:"rgba(245,158,11,.05)",border:"1px solid rgba(245,158,11,.2)",
              borderLeft:"3px solid #f59e0b",borderRadius:8,marginBottom:6,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:"#fbbf24",fontWeight:700,fontSize:13}}>{e.description}</div>
                <div style={{color:"var(--txt4)",fontSize:11,marginTop:2}}>
                  {e.projectName} · {e.category} · 신청: {e.requester} · {e.date}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <span style={{color:"var(--txt)",fontWeight:800,fontSize:13}}>{e.amount.toLocaleString()}원</span>
                <button onClick={()=>setPage("expense")} style={{background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.25)",color:"#a5b4fc",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>처리하기 →</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* 승인 대기: 인건비 */}
      {myPendingLabor.length > 0 && (
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{color:"#a78bfa",fontSize:13,fontWeight:700}}>👤 승인 대기 · 인건비</span>
            <span style={{background:"rgba(167,139,250,.2)",color:"#a78bfa",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{myPendingLabor.length}</span>
          </div>
          {myPendingLabor.map(e=>(
            <div key={e.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,
              padding:"10px 14px",background:"rgba(167,139,250,.05)",border:"1px solid rgba(167,139,250,.2)",
              borderLeft:"3px solid #a78bfa",borderRadius:8,marginBottom:6,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:"#c4b5fd",fontWeight:700,fontSize:13}}>{e.workerName} <span style={{fontWeight:400,color:"var(--txt3)"}}>({e.role})</span></div>
                <div style={{color:"var(--txt4)",fontSize:11,marginTop:2}}>
                  {e.projectName} · {e.unitPrice.toLocaleString()}원 × {e.days}일 · 신청: {e.requester}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <span style={{color:"var(--txt)",fontWeight:800,fontSize:13}}>{e.amount.toLocaleString()}원</span>
                <button onClick={()=>setPage("labor")} style={{background:"rgba(99,102,241,.12)",border:"1px solid rgba(99,102,241,.25)",color:"#a5b4fc",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>처리하기 →</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* 내 구매 요청 */}
      {myPendingPurchases.length > 0 && (
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{color:"#38bdf8",fontSize:13,fontWeight:700}}>🛒 내가 구매해야 할 항목</span>
            <span style={{background:"rgba(56,189,248,.2)",color:"#38bdf8",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{myPendingPurchases.length}</span>
            {urgentPurchases.length>0&&<span style={{background:"rgba(239,68,68,.2)",color:"#fca5a5",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>🔴 긴급 {urgentPurchases.length}건</span>}
          </div>
          {myPendingPurchases.sort((a,b)=>a.deadline.localeCompare(b.deadline)).map(p=>{
            const ddays = p.deadline ? Math.ceil((new Date(p.deadline)-new Date(today))/(1000*60*60*24)) : null;
            const urgent2 = ddays!==null && ddays<=3;
            return (
              <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,
                padding:"10px 14px",
                background:urgent2?"rgba(239,68,68,.05)":"rgba(56,189,248,.04)",
                border:`1px solid ${urgent2?"rgba(239,68,68,.3)":"rgba(56,189,248,.2)"}`,
                borderLeft:`3px solid ${urgent2?"#ef4444":"#38bdf8"}`,
                borderRadius:8,marginBottom:6,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#38bdf8",fontWeight:700,fontSize:13}}>
                    {p.item} {p.spec&&<span style={{fontWeight:400,color:"var(--txt3)",fontSize:12}}>({p.spec})</span>}
                    &nbsp;<span style={{color:"var(--txt3)",fontSize:12,fontWeight:400}}>× {p.qty}개</span>
                  </div>
                  <div style={{color:ddays<=0?"#fca5a5":ddays<=3?"#fbbf24":"var(--txt4)",fontSize:11,marginTop:2,fontWeight:urgent2?700:400}}>
                    {p.projectName} · 마감 {p.deadline} {ddays!==null&&`(D${ddays<=0?ddays:"-"+ddays})`} · 요청: {p.requester}
                  </div>
                  {p.note&&<div style={{color:"var(--txt4)",fontSize:11,marginTop:2}}>📝 {p.note}</div>}
                </div>
                <div style={{display:"flex",gap:5,flexShrink:0,alignItems:"center"}}>
                  {p.purchaseLink&&<a href={p.purchaseLink} target="_blank" rel="noopener noreferrer"
                    style={{background:"rgba(56,189,248,.1)",border:"1px solid rgba(56,189,248,.25)",color:"#38bdf8",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",textDecoration:"none"}}>
                    🔗 구매링크
                  </a>}
                  <button onClick={()=>setPage("purchase")} style={{background:"rgba(56,189,248,.12)",border:"1px solid rgba(56,189,248,.25)",color:"#38bdf8",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>처리하기 →</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 내 프로젝트 */}
      <div style={{marginBottom:28}}>
        <div style={{color:"var(--txt2)",fontSize:13,fontWeight:700,marginBottom:14}}>담당 프로젝트</div>
        <div className="grid-3">
          {myProjects.map(p=>(
            <ProjectCard key={p.id} project={p} onClick={()=>{setDetail(p);setPage("detail");}}/>
          ))}
          {myProjects.length===0&&<div style={{color:"var(--txt4)",gridColumn:"1/-1",padding:20}}>담당 프로젝트가 없습니다</div>}
        </div>
      </div>

      {/* 미완료 과업 — 간트차트 기준 데드라인 */}
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <span style={{color:"var(--txt2)",fontSize:13,fontWeight:700}}>📅 미완료 과업 · 데드라인</span>
          {myTasks.length>0&&<span style={{background:"rgba(239,68,68,.15)",color:"#ef4444",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>{myTasks.length}건</span>}
        </div>
        {myTasks.map((t,i)=>{
          const dday = getDday(t.endDate);
          const ddayCol = getDdayColor(t.endDate);
          const isOverdue = t.endDate && t.endDate < todayStr;
          return (
            <div key={t.id||i} style={{
              display:"flex",alignItems:"center",gap:8,padding:"8px 12px",
              background: isOverdue ? "rgba(239,68,68,.06)" : "rgba(255,255,255,.02)",
              border: `1px solid ${isOverdue ? "rgba(239,68,68,.2)" : "rgba(255,255,255,.05)"}`,
              borderRadius:8,marginBottom:5,
            }}>
              <span style={{width:4,height:28,borderRadius:2,background:t.color,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:"var(--txt)",fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {t.parentTask} › {t.task}
                </div>
                <div style={{color:"var(--txt4)",fontSize:10,marginTop:1}}>
                  {t.projectName}
                  {t.assignee && <span> · 👤 {t.assignee}</span>}
                </div>
              </div>
              <span style={{background:`rgba(99,102,241,.1)`,color:t.color,padding:"2px 8px",borderRadius:4,fontSize:10,flexShrink:0}}>{t.division}</span>
              {dday && <span style={{fontSize:12,fontWeight:700,color:ddayCol,flexShrink:0}}>{dday}</span>}
              {t.endDate && <span style={{fontSize:10,color:"var(--txt4)",flexShrink:0}}>{t.endDate.slice(5)}</span>}
            </div>
          );
        })}
        {myTasks.length===0&&<div style={{color:"var(--txt4)",fontSize:13,padding:20,textAlign:"center",border:"1px dashed rgba(255,255,255,.07)",borderRadius:10}}>🎉 모든 과업이 완료되었습니다!</div>}
      </div>
    </div>
  );
}

// ─ Files Page ─
function FilesPage({projects}) {
  const driveConnected = DRIVE_CONFIG.ENABLED;
  const totalFiles = projects.reduce((s,p)=>(s+(p.files||[]).length),0);

  // 파일 이름 추출 헬퍼
  const getFileName = (f) => typeof f === "string" ? f : f.name;
  const getFileObj = (f) => typeof f === "string" ? { name: f, legacy: true } : f;

  const handleFileOpen = async (file) => {
    const f = getFileObj(file);
    if (f.url) { window.open(f.url, "_blank"); return; }
    if (f.driveFileId && driveConnected) {
      try {
        const res = await fetch(`${DRIVE_CONFIG.GAS_URL}?action=downloadFile&fileId=${f.driveFileId}`, {redirect:"follow"});
        const data = await res.json();
        if (data.webViewLink) window.open(data.webViewLink, "_blank");
      } catch { toast("파일을 열 수 없습니다", "error"); }
    } else {
      toast("파일 미리보기를 사용할 수 없습니다", "warn");
    }
  };

  return (
    <div>
      <h1 style={{color:"var(--txt)",fontSize:20,fontWeight:800,marginBottom:4}}>파일 / 공유 드라이브</h1>
      <div style={{color:"var(--txt4)",fontSize:13,marginBottom:24}}>전체 프로젝트 파일 관리 · {totalFiles}개 파일</div>
      {/* 저장 상태 */}
      <div style={{
        background: "rgba(16,185,129,.08)",
        border: "1px solid rgba(16,185,129,.2)",
        borderRadius:12,padding:18,marginBottom:22,
        display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",
      }}>
        <span style={{fontSize:28}}>💾</span>
        <div>
          <div style={{color:"#34d399",fontWeight:700,fontSize:14}}>
            자동저장 활성화
          </div>
          <div style={{color:"var(--txt4)",fontSize:12}}>
            모든 프로젝트 파일이 브라우저에 자동 저장됩니다 · 상단 📦백업으로 데이터를 내보낼 수 있습니다
          </div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#10b981",boxShadow:"0 0 6px #10b981"}}/>
          <span style={{color:"#10b981",fontSize:13,fontWeight:600}}>
            저장됨
          </span>
        </div>
      </div>
      {/* 프로젝트별 파일 */}
      {projects.map(p=>(
        <div key={p.id} className="card-sm" style={{marginBottom:10}}>
          <div className="flex-between" style={{marginBottom:10}}>
            <div style={{color:"var(--txt)",fontWeight:600,fontSize:14}}>📁 {p.name}</div>
            <span style={{color:"var(--txt4)",fontSize:12}}>{(p.files||[]).length}개 파일</span>
          </div>
          {(p.files||[]).length>0 ? (p.files||[]).map((f,i)=>{
            const fo = getFileObj(f);
            return (
              <div key={fo.name+i} className="flex-between" style={{padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:"var(--txt2)",fontSize:13}}>📄 {fo.name}</span>
                  {fo.size && <span style={{color:"var(--txt4)",fontSize:10}}>({fo.size>1048576?(fo.size/1048576).toFixed(1)+"MB":(fo.size/1024).toFixed(0)+"KB"})</span>}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {(fo.driveFileId||fo.url) && <span style={{color:"#10b981",fontSize:11}}>✓ 저장됨</span>}
                  <button className="btn btn-ghost" style={{padding:"3px 10px",fontSize:11}}
                    onClick={()=>handleFileOpen(f)}>{fo.driveFileId||fo.url?"열기":"다운로드"}</button>
                </div>
              </div>
            );
          }) : <div style={{color:"var(--txt4)",fontSize:12,padding:"8px 0"}}>파일 없음</div>}
        </div>
      ))}
    </div>
  );
}

/* ── Section Image Uploader ────────────────────────────────────────────────── */
function SectionImages({sectionId, images, onUpdate}) {
  const fileRef = useRef(null);
  const [annotating, setAnnotating] = useState(null);
  const [annoText, setAnnoText] = useState("");

  const handleUpload = (files) => {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith("image/")) { toast("이미지 파일만 업로드 가능합니다","error"); return; }
      if (file.size > 10*1024*1024) { toast("10MB 이하 이미지만 가능합니다","error"); return; }
      const reader = new FileReader();
      reader.onload = () => {
        const newImg = { id: Date.now()+Math.random(), name: file.name, data: reader.result, annotations: [] };
        onUpdate([...(images||[]), newImg]);
      };
      reader.readAsDataURL(file);
    });
  };

  const removeImage = (idx) => {
    onUpdate((images||[]).filter((_,i)=>i!==idx));
  };

  const saveAnnotation = (idx) => {
    if (!annoText.trim()) return;
    const updated = [...(images||[])];
    const img = {...updated[idx]};
    img.annotations = [...(img.annotations||[]), {text:annoText, id:Date.now()}];
    updated[idx] = img;
    onUpdate(updated);
    setAnnoText("");
    toast("텍스트 추가됨","success");
  };

  const removeAnnotation = (imgIdx, annoIdx) => {
    const updated = [...(images||[])];
    const img = {...updated[imgIdx]};
    img.annotations = (img.annotations||[]).filter((_,i)=>i!==annoIdx);
    updated[imgIdx] = img;
    onUpdate(updated);
  };

  return (
    <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid var(--border)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <span style={{color:"var(--txt3)",fontSize:12,fontWeight:700}}>섹션 이미지</span>
        <button onClick={()=>fileRef.current?.click()}
          style={{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.2)",color:"#a5b4fc",borderRadius:6,padding:"4px 12px",fontSize:11,cursor:"pointer"}}>
          + 이미지 추가
        </button>
      </div>
      <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handleUpload(e.target.files)}/>

      {(images||[]).length===0 && (
        <div style={{textAlign:"center",color:"var(--txt4)",fontSize:12,padding:"16px 0",border:"1px dashed rgba(255,255,255,.08)",borderRadius:8}}>
          이미지를 추가하면 보고서 PDF/PPT에 포함됩니다
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginTop:8}}>
        {(images||[]).map((img,idx)=>(
          <div key={img.id||idx} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid var(--border)",background:"var(--surface)"}}>
            <img src={img.data} alt={img.name} style={{width:"100%",aspectRatio:"16/9",objectFit:"cover",display:"block"}}/>
            {(img.annotations||[]).length>0 && (
              <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.7)",padding:"4px 6px"}}>
                {(img.annotations||[]).map((a,ai)=>(
                  <div key={a.id||ai} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
                    <span style={{color:"#fff",fontSize:9,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.text}</span>

                )}

        ))}

  );

/* ══ 운영계획안 / 결과보고서 ════════════════════════════════════════════════════ */
function DocEditorPanel({docType, project}) {
  // docType: "plan" | "report"
  const isPlan = docType === "plan";
  const SECTIONS = [
    {id:"overview", num:"01", title:"Over View", icon:"📌"},
    {id:"venue",    num:"02", title:"Venue",     icon:"🏛"},
    {id:"design",   num:"03", title:"Design",    icon:"🎨"},
    {id:"program",  num:"04", title:"Program",   icon:"📋"},
    {id:"operation",num:"05", title:"Operation", icon:"⚙️"},
    {id:"timeline", num:"06", title:"Time Line", icon:"📅"},
  ];

  const [activeSection, setActiveSection] = React.useState("overview");
  const [activeDesignItem, setActiveDesignItem] = React.useState(null);

  const proj = project;
  const docKey = `${proj?.id}_${docType}`;
  const storageKey = `eventos_doc_${docKey}`;
  const versionsKey = `eventos_docVersions_${docKey}`;

  // ── localStorage에서 문서 데이터 로드 ──
  const loadDocFromStorage = () => {
    try {
      const saved = localStorage.getItem(storageKey);
      return saved ? JSON.parse(saved) : {};
    } catch { return {}; }
  };

  const [docData, setDocData] = React.useState(() => loadDocFromStorage());
  const [versions, setVersions] = React.useState(() => {
    try { const v = localStorage.getItem(versionsKey); return v ? JSON.parse(v) : []; } catch { return []; }
  });
  const [showVersions, setShowVersions] = React.useState(false);
  const [saveStatus, setSaveStatus] = React.useState("saved"); // "saved" | "saving" | "unsaved"
  const saveTimerRef = React.useRef(null);

  // ── docKey 변경 시 데이터 리로드 ──
  React.useEffect(() => {
    setDocData(loadDocFromStorage());
    try { const v = localStorage.getItem(versionsKey); setVersions(v ? JSON.parse(v) : []); } catch { setVersions([]); }
  }, [docKey]);

  // ── 변경 시 자동 저장 (디바운스 1초) ──
  React.useEffect(() => {
    if (!docKey || Object.keys(docData).length === 0) return;
    setSaveStatus("unsaved");
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      try {
        localStorage.setItem(storageKey, JSON.stringify(docData));
        setSaveStatus("saved");
      } catch (e) {
        console.error("[DocEditor] localStorage save error:", e);
        setSaveStatus("unsaved");
      }
    }, 1000);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [docData]);

  const updateDoc = (sectionId, field, value) => {
    setDocData(prev => ({
      ...prev,
      [sectionId]: {
        ...(prev[sectionId] || {}),
        [field]: value,
      }
    }));
  };

  const updateDocSection = (sectionId, obj) => {
    setDocData(prev => ({
      ...prev,
      [sectionId]: { ...(prev[sectionId] || {}), ...obj }
    }));
  };

  // ── 버전 저장 ──
  const saveVersion = (label) => {
    const now = new Date();
    const ts = now.toISOString();
    const displayName = label || `v${versions.length + 1} (${now.toLocaleDateString("ko-KR")} ${now.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})})`;
    const newVersion = { id: Date.now(), name: displayName, timestamp: ts, data: JSON.parse(JSON.stringify(docData)) };
    const updated = [newVersion, ...versions].slice(0, 30); // 최대 30개 버전
    setVersions(updated);
    try { localStorage.setItem(versionsKey, JSON.stringify(updated)); } catch {}
    toast(`"${displayName}" 버전 저장 완료`, "success");
  };

  // ── 버전 불러오기 ──
  const loadVersion = (ver) => {
    setDocData(ver.data);
    try { localStorage.setItem(storageKey, JSON.stringify(ver.data)); } catch {}
    setShowVersions(false);
    toast(`"${ver.name}" 버전을 불러왔습니다`, "success");
  };

  // ── 버전 삭제 ──
  const deleteVersion = (verId) => {
    const updated = versions.filter(v => v.id !== verId);
    setVersions(updated);
    try { localStorage.setItem(versionsKey, JSON.stringify(updated)); } catch {}
  };

  // 현재 섹션 데이터
  const sd = (sectionId) => docData[sectionId] || {};

  // 동적 리스트 헬퍼

    const val = sd(sectionId)[field];
    return val && val.length ? val : [defaultItem];
  };

    setList(sectionId, field, [...cur, {...defaultItem, _id: Date.now()}]);

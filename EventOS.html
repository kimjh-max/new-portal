                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>결의자</div>
              <input placeholder="결의자" value={form.resolver}
                onChange={e=>setForm({...form,resolver:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>보고일</div>
              <input type="date" value={form.reportDate}
                onChange={e=>setForm({...form,reportDate:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>지급</div>
              <select value={form.payStatus} onChange={e=>setForm({...form,payStatus:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"6px 8px",fontSize:12}}>
                {PAY_STATES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={{gridColumn:"span 2"}}>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:3}}>비고</div>
              <input placeholder="메모" value={form.note}
                onChange={e=>setForm({...form,note:e.target.value})} className="form-input"
                style={{width:"100%",padding:"6px 10px",fontSize:12}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setShowForm(false)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--txt4)",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>취소</button>
            <button onClick={submit} className="btn btn-primary" style={{padding:"6px 18px",fontSize:12}}>등록</button>
          </div>
        </div>
      )}

      {/* 필터 */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        {["전체","사업소득","기타소득","예정","지급"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{
            padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",
            background:filter===f?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,.05)",
            color:filter===f?"#fff":"var(--txt3)",
          }}>{f}</button>
        ))}
        <span style={{marginLeft:"auto",color:"var(--txt4)",fontSize:11}}>
          조회 {filtered.length}건 · 총금액 {totalAmt.toLocaleString()}원 · 세액 {totalTax.toLocaleString()}원 · 실지급 {totalNet.toLocaleString()}원
        </span>
      </div>

      {/* 테이블 */}
      <div style={{overflowX:"auto",borderRadius:8,border:"1px solid rgba(255,255,255,.07)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:1300}}>
          <thead>
            <tr>
              <TH w={36}>연번</TH>
              <TH w={130}>프로젝트명</TH>
              <TH w={150}>지출내용</TH>
              <TH w={90}>금액</TH>
              <TH w={80}>세금형태</TH>
              <TH w={80} color="#fbbf24">소득세</TH>
              <TH w={80} color="#fbbf24">지방소득세</TH>
              <TH w={90} color="#f59e0b">세액합계</TH>
              <TH w={100} color="#34d399">총지출(실지급)</TH>
              <TH w={120}>주민번호</TH>
              <TH w={80}>지급은행</TH>
              <TH w={120}>계좌번호</TH>
              <TH w={70}>예금주</TH>
              <TH w={60}>결의자</TH>
              <TH w={90}>보고일</TH>
              <TH w={60}>지급</TH>
              <TH w={100}>비고</TH>
              <TH w={36}></TH>
            </tr>
          </thead>
          <tbody>
            {filtered.length===0 && (
              <tr><td colSpan={18} style={{textAlign:"center",color:"var(--txt4)",padding:"32px",fontSize:13}}>등록된 인건비 내역이 없습니다</td></tr>
            )}
            {filtered.map((e,i)=>{
              const tax = calcTax(e.amount,e.taxType);
              const rowBg = i%2===0?"transparent":"rgba(255,255,255,.015)";
              const isSaup = e.taxType==="사업소득";
              return (
                <tr key={e.id} style={{background:rowBg}}>
                  <TD align="center" color="#6366f1" bold>{e.seq||i+1}</TD>
                  <TD><span style={{color:"#a5b4fc",fontSize:11}}>{e.projectName||"-"}</span></TD>
                  <TD>{e.description}</TD>
                  <TD align="right" bold>{(e.amount||0).toLocaleString()}</TD>
                  <TD align="center">
                    <span style={{
                      background:isSaup?"rgba(99,102,241,.12)":"rgba(236,72,153,.12)",
                      color:isSaup?"#a5b4fc":"#f472b6",
                      borderRadius:4,padding:"2px 6px",fontSize:11,fontWeight:600}}>
                      {e.taxType}<br/><span style={{fontSize:10,opacity:.8}}>{isSaup?"3.3%":"22%"}</span>
                    </span>
                  </TD>
                  <TD align="right" color="#fbbf24">{tax.incomeTax.toLocaleString()}</TD>
                  <TD align="right" color="#fbbf24">{tax.localTax.toLocaleString()}</TD>
                  <TD align="right" color="#f59e0b" bold>{tax.total.toLocaleString()}</TD>
                  <TD align="right" bold color="#34d399">{tax.netPay.toLocaleString()}</TD>
                  <TD><span style={{fontFamily:"monospace",fontSize:11,letterSpacing:".04em"}}>
                    {e.idNumber ? e.idNumber.replace(/(\d{6})-?(\d{1})\d+/, "$1-$2••••••") : "-"}
                  </span></TD>
                  <TD>{e.bank||"-"}</TD>
                  <TD><span style={{fontFamily:"monospace",fontSize:11}}>{e.accountNo||"-"}</span></TD>
                  <TD>{e.accountName||"-"}</TD>
                  <TD align="center">{e.resolver||"-"}</TD>
                  <TD align="center" color="var(--txt3)">{e.reportDate||"-"}</TD>
                  <TD align="center">
                    <span style={{
                      background:e.payStatus==="지급"?"rgba(16,185,129,.15)":"rgba(245,158,11,.12)",
                      color:e.payStatus==="지급"?"#34d399":"#fbbf24",
                      borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:700}}>
                      {e.payStatus}
                    </span>
                  </TD>
                  <TD color="var(--txt4)">{e.note||""}</TD>
                  <td style={{padding:"4px",textAlign:"center",border:"1px solid rgba(255,255,255,.04)"}}>
                    <button onClick={()=>deleteItem(e.id)}
                      style={{background:"transparent",border:"none",color:"#fca5a5",fontSize:13,cursor:"pointer",padding:0,lineHeight:1}}>×</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
          {filtered.length>0 && (
            <tfoot>
              <tr style={{background:"rgba(99,102,241,.08)"}}>
                <td colSpan={3} style={{padding:"7px 8px",color:"#a5b4fc",fontWeight:700,fontSize:12,borderTop:"2px solid rgba(99,102,241,.3)"}}>합계</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:"var(--txt)",fontWeight:800,fontSize:12,borderTop:"2px solid rgba(99,102,241,.3)"}}>{totalAmt.toLocaleString()}</td>
                <td style={{borderTop:"2px solid rgba(99,102,241,.3)"}}/>
                <td style={{padding:"7px 8px",textAlign:"right",color:"#fbbf24",fontWeight:700,fontSize:12,borderTop:"2px solid rgba(99,102,241,.3)"}}>{filtered.reduce((s,e)=>s+calcTax(e.amount,e.taxType).incomeTax,0).toLocaleString()}</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:"#fbbf24",fontWeight:700,fontSize:12,borderTop:"2px solid rgba(99,102,241,.3)"}}>{filtered.reduce((s,e)=>s+calcTax(e.amount,e.taxType).localTax,0).toLocaleString()}</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:"#f59e0b",fontWeight:800,fontSize:12,borderTop:"2px solid rgba(99,102,241,.3)"}}>{totalTax.toLocaleString()}</td>
                <td style={{padding:"7px 8px",textAlign:"right",color:"#34d399",fontWeight:800,fontSize:13,borderTop:"2px solid rgba(99,102,241,.3)"}}>{totalNet.toLocaleString()}</td>
                <td colSpan={9} style={{borderTop:"2px solid rgba(99,102,241,.3)"}}/>
              </tr>
            </tfoot>
          )}
        </table>
      </div>
    </div>
  );
}


// ─ 구매요청 ──────────────────────────────────────────────────────────────────
function PurchasePanel({purchases, setPurchases, projects, users, currentUser}) {
  const CATS = ["음향장비","조명장비","영상장비","소품","인쇄물","소모품","기자재","기타"];
  const EMPTY = {requestDate:today,deadline:"",projectId:"",category:"소모품",item:"",spec:"",qty:"1",unitPrice:"",buyerId:"",purchaseLink:"",note:""};
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(EMPTY);
  const [filter, setFilter] = useState("전체");
  const FILTERS = ["전체","요청중","구매완료","취소"];
  const SC = {요청중:{bg:"rgba(56,189,248,.12)",border:"rgba(56,189,248,.3)",text:"#38bdf8"},
    구매완료:{bg:"rgba(16,185,129,.12)",border:"rgba(16,185,129,.3)",text:"#34d399"},
    취소:{bg:"rgba(100,116,139,.12)",border:"rgba(100,116,139,.3)",text:"#94a3b8"}};
  const calcAmt = () => Math.round((parseInt(form.unitPrice)||0)*(parseInt(form.qty)||1));

  const submit = () => {
    if (!form.projectId||!form.item.trim()||!form.deadline||!form.buyerId) {
      toast("프로젝트·품목·마감일·구매담당자는 필수입니다","error"); return;
    }
    const proj = projects.find(p=>p.id===parseInt(form.projectId));
    const buyer = users.find(u=>u.id===form.buyerId);
    setPurchases(prev=>[{
      id:Date.now(), requestDate:form.requestDate, deadline:form.deadline,
      projectId:parseInt(form.projectId), projectName:proj?.name||"",
      category:form.category, item:form.item, spec:form.spec,
      qty:parseInt(form.qty)||1, unitPrice:parseInt(form.unitPrice)||0,
      amount:calcAmt(), buyerId:form.buyerId, buyerName:buyer?.name||"",
      requester:currentUser?.name, requesterId:currentUser?.id,
      status:"요청중", purchaseLink:form.purchaseLink, note:form.note, createdAt:today,
    }, ...prev]);
    setForm(EMPTY); setShowForm(false);
    toast(`🛒 구매 요청 완료 · ${buyer?.name}에게 알림`, "success");
  };

  const confirm = (id) => {
    setPurchases(prev=>prev.map(p=>p.id===id?{...p,status:"구매완료",confirmedAt:today,confirmedBy:currentUser?.name}:p));
    toast("🛒 구매 완료 처리되었습니다","success");
  };
  const cancel = (id) => {
    setPurchases(prev=>prev.map(p=>p.id===id?{...p,status:"취소",cancelledAt:today,cancelledBy:currentUser?.name}:p));
    toast("구매 요청이 취소되었습니다");
  };

  const canConfirm = (p) => p.buyerId===currentUser?.id && p.status==="요청중";
  const canCancel = (p) => (p.requesterId===currentUser?.id || currentUser?.isAdmin) && p.status==="요청중";
  const isUrgent = (p) => p.status==="요청중" && p.deadline && p.deadline <= new Date(Date.now()+3*86400000).toISOString().slice(0,10);
  const filtered = filter==="전체" ? purchases : purchases.filter(p=>p.status===filter);

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{color:"var(--txt)",fontSize:20,fontWeight:800,marginBottom:4}}>🛒 구매요청</h1>
          <div style={{color:"var(--txt4)",fontSize:12}}>행사 물품 구매 요청 및 담당자 관리</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowForm(v=>!v)}>+ 구매 요청</button>
      </div>

      {/* 요약 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:20}}>
        {[["요청중", purchases.filter(p=>p.status==="요청중").length+"건","#38bdf8"],
          ["긴급 (3일 내)", purchases.filter(p=>isUrgent(p)).length+"건","#ef4444"],
          ["구매 완료", purchases.filter(p=>p.status==="구매완료").length+"건","#34d399"],
          ["완료 금액", purchases.filter(p=>p.status==="구매완료").reduce((s,p)=>s+p.amount,0).toLocaleString()+"원","#10b981"],
        ].map(([l,v,c])=>(
          <div key={l} className="card-sm" style={{textAlign:"center"}}>
            <div style={{color:"var(--txt4)",fontSize:11,marginBottom:5}}>{l}</div>
            <div style={{color:c,fontWeight:800,fontSize:15}}>{v}</div>
          </div>
        ))}
      </div>

      {/* 신청 폼 */}
      {showForm && (
        <div className="card-sm" style={{marginBottom:20,border:"1px solid rgba(56,189,248,.3)"}}>
          <div style={{color:"var(--txt2)",fontWeight:700,fontSize:13,marginBottom:14}}>📝 구매 요청서</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8,marginBottom:10}}>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>요청일</div>
              <input type="date" value={form.requestDate} onChange={e=>setForm({...form,requestDate:e.target.value})}
                className="form-input" style={{width:"100%",padding:"7px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>🔴 구매 마감일 *</div>
              <input type="date" value={form.deadline} onChange={e=>setForm({...form,deadline:e.target.value})}
                className="form-input" style={{width:"100%",padding:"7px 10px",fontSize:12,border:"1px solid rgba(239,68,68,.4)"}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>프로젝트 *</div>
              <select value={form.projectId} onChange={e=>setForm({...form,projectId:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"7px 8px",fontSize:12}}>
                <option value="">선택</option>
                {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>구분</div>
              <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"7px 8px",fontSize:12}}>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8,marginBottom:10}}>
            <div style={{gridColumn:"span 2"}}>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>품목명 *</div>
              <input placeholder="예: 블루투스 스피커" value={form.item} onChange={e=>setForm({...form,item:e.target.value})}
                className="form-input" style={{width:"100%",padding:"7px 10px",fontSize:12}}/>
            </div>
            <div style={{gridColumn:"span 2"}}>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>규격/사양</div>
              <input placeholder="예: JBL Charge5, 블랙, 방수" value={form.spec} onChange={e=>setForm({...form,spec:e.target.value})}
                className="form-input" style={{width:"100%",padding:"7px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>수량 *</div>
              <input type="number" min="1" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})}
                className="form-input" style={{width:"100%",padding:"7px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>단가 (원)</div>
              <input type="number" placeholder="0" value={form.unitPrice} onChange={e=>setForm({...form,unitPrice:e.target.value})}
                className="form-input" style={{width:"100%",padding:"7px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>합계 (자동)</div>
              <div style={{color:"#38bdf8",fontWeight:800,fontSize:14,padding:"7px 10px",background:"rgba(56,189,248,.07)",borderRadius:6}}>
                {calcAmt().toLocaleString()}원
              </div>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>구매담당자 *</div>
              <select value={form.buyerId} onChange={e=>setForm({...form,buyerId:e.target.value})}
                style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"var(--txt)",borderRadius:6,padding:"7px 8px",fontSize:12}}>
                <option value="">담당자 선택</option>
                {(users||[]).filter(u=>u.approved||u.id==="admin").map(u=><option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>🔗 구매 링크</div>
              <input placeholder="https://example.com/product (구매자가 바로 클릭해 구매할 수 있는 URL)" value={form.purchaseLink}
                onChange={e=>setForm({...form,purchaseLink:e.target.value})} className="form-input"
                style={{width:"100%",padding:"7px 10px",fontSize:12}}/>
            </div>
            <div>
              <div style={{color:"var(--txt4)",fontSize:11,marginBottom:4}}>비고/요청사항</div>
              <input placeholder="구매처 지정, 색상, 용도 등" value={form.note}
                onChange={e=>setForm({...form,note:e.target.value})} className="form-input"
                style={{width:"100%",padding:"7px 10px",fontSize:12}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setShowForm(false)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--txt4)",borderRadius:6,padding:"7px 16px",fontSize:12,cursor:"pointer"}}>취소</button>
            <button onClick={submit} className="btn btn-primary" style={{padding:"7px 20px",fontSize:12}}>요청하기</button>
          </div>
        </div>
      )}

      {/* 필터 */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {FILTERS.map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{
            padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",
            background:filter===f?"linear-gradient(135deg,#0ea5e9,#38bdf8)":"rgba(255,255,255,.05)",
            color:filter===f?"#fff":"var(--txt3)",
          }}>{f} {f!=="전체"&&<span style={{fontSize:10}}>({purchases.filter(p=>p.status===f).length})</span>}</button>
        ))}
      </div>

      {/* 목록 */}
      {filtered.length===0 && <div style={{color:"var(--txt4)",fontSize:13,textAlign:"center",padding:"40px 0"}}>구매 요청 내역이 없습니다</div>}
      {filtered.map(p=>{
        const urgent = isUrgent(p);
        const ddays = p.deadline ? Math.ceil((new Date(p.deadline)-new Date(today))/(1000*60*60*24)) : null;
        return (
          <div key={p.id} style={{
            background:"rgba(255,255,255,.02)",
            border:`1px solid ${urgent?"rgba(239,68,68,.4)":"rgba(255,255,255,.06)"}`,
            borderLeft:`3px solid ${urgent?"#ef4444":SC[p.status]?.text||"transparent"}`,
            borderRadius:8,padding:"12px 16px",marginBottom:8,
          }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                  <span style={{background:SC[p.status]?.bg,border:`1px solid ${SC[p.status]?.border}`,color:SC[p.status]?.text,
                    borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700}}>{p.status}</span>
                  <span style={{background:"rgba(255,255,255,.05)",color:"var(--txt3)",borderRadius:5,padding:"2px 8px",fontSize:11}}>{p.category}</span>
                  {urgent && <span style={{background:"rgba(239,68,68,.15)",color:"#fca5a5",borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700}}>🔴 긴급</span>}
                  {p.deadline && (
                    <span style={{color:ddays<=0?"#fca5a5":ddays<=3?"#fbbf24":"var(--txt4)",fontSize:11,fontWeight:ddays<=3?700:400}}>
                      마감 {p.deadline} {ddays!==null&&`(D${ddays<=0?ddays:"-"+ddays})`}
                    </span>
                  )}
                </div>
                <div style={{color:"var(--txt)",fontWeight:700,fontSize:13,marginBottom:2}}>
                  {p.item} {p.spec&&<span style={{color:"var(--txt4)",fontWeight:400,fontSize:12}}>· {p.spec}</span>}
                </div>
                <div style={{color:"var(--txt3)",fontSize:12,marginBottom:3}}>
                  {p.qty}개{p.unitPrice>0&&` × ${p.unitPrice.toLocaleString()}원`}
                </div>
                <div style={{color:"var(--txt4)",fontSize:11}}>
                  {p.projectName} &nbsp;·&nbsp; 요청: {p.requester} &nbsp;·&nbsp; 구매담당: <span style={{color:"#38bdf8",fontWeight:600}}>{p.buyerName}</span>
                </div>
                {p.purchaseLink && (
                  <div style={{marginTop:4}}>
                    <a href={p.purchaseLink} target="_blank" rel="noopener noreferrer"
                      style={{display:"inline-flex",alignItems:"center",gap:5,
                        background:"rgba(56,189,248,.1)",border:"1px solid rgba(56,189,248,.25)",
                        color:"#38bdf8",borderRadius:5,padding:"3px 10px",fontSize:11,fontWeight:600,
                        textDecoration:"none",cursor:"pointer"}}>
                      🔗 구매 링크 열기
                    </a>
                  </div>
                )}
                {p.note&&<div style={{color:"var(--txt4)",fontSize:11,marginTop:3}}>📝 {p.note}</div>}
                {p.confirmedAt&&<div style={{color:"#34d399",fontSize:11,marginTop:3}}>✅ {p.confirmedAt} {p.confirmedBy} 구매완료</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                {p.amount>0&&<span style={{color:"var(--txt)",fontWeight:800,fontSize:15}}>{p.amount.toLocaleString()}원</span>}
                <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  {canConfirm(p) && (
                    <button onClick={()=>confirm(p.id)} style={{background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.3)",color:"#34d399",borderRadius:5,padding:"5px 12px",fontSize:11,cursor:"pointer",fontWeight:700}}>
                      🛒 구매완료
                    </button>
                  )}
                  {canCancel(p) && (
                    <button onClick={()=>cancel(p.id)} style={{background:"rgba(100,116,139,.1)",border:"1px solid rgba(100,116,139,.3)",color:"#94a3b8",borderRadius:5,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>
                      취소
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  // ── localStorage 영속화 (새로고침해도 데이터 유지) ──
  const [users, setUsers] = usePersistedState("eventos_users", INIT_USERS);
  const [authedUser, setAuthedUser] = useState(() => {
    try {
      const saved = sessionStorage.getItem("eventos_session");
      if (saved) return JSON.parse(saved);
    } catch {}
    return null;
  });
  const [page, setPage] = useState(() => {
    try {
      const saved = sessionStorage.getItem("eventos_page");
      if (saved) return saved;
    } catch {}
    return "dashboard";
  });
  const [detail, setDetail] = useState(() => {
    try {
      const saved = sessionStorage.getItem("eventos_detail");
      if (saved) return JSON.parse(saved);
    } catch {}
    return null;
  });
  const [projects, setProjects] = usePersistedState("eventos_projects", INIT_PROJECTS);
  const [priceList, setPriceList] = usePersistedState("eventos_priceList", INIT_PRICE_LIST);
  const [expenses, setExpenses] = usePersistedState("eventos_expenses", []);
  const [laborCosts, setLaborCosts] = usePersistedState("eventos_laborCosts", []);
  const [purchases, setPurchases] = usePersistedState("eventos_purchases", []);
  const [driveLoaded, setDriveLoaded] = useState(false);

  // ── 클라우드 동기화: 시스템 데이터 변경 시 저장 (Cloudflare D1 + Drive) ──
  const appDataRef = useRef(null);
  useEffect(() => {
    if (!driveLoaded) return; // 초기 로드 완료 전에는 싱크하지 않음
    const payload = { users, priceList, expenses, laborCosts, purchases };
    // 이전과 같으면 스킵
    const json = JSON.stringify(payload);
    if (appDataRef.current === json) return;
    appDataRef.current = json;
    SyncManager.queueSync("saveAppData", { data: payload });
  }, [users, priceList, expenses, laborCosts, purchases, driveLoaded]);

  // ── 클라우드 동기화: 프로젝트 변경 시 각 프로젝트 개별 저장 ──
  const projectsRef = useRef(null);
  useEffect(() => {
    if (!driveLoaded) return;
    const json = JSON.stringify(projects);
    if (projectsRef.current === json) return;
    projectsRef.current = json;
    projects.forEach(p => {
      SyncManager.queueSync(`saveProject_${p.id}`, { project: p });
    });
  }, [projects, driveLoaded]);

  // ── 클라우드 초기 로드 (Cloudflare D1 우선 → Drive 폴백) + 데이터 무결성 검증 ──
  useEffect(() => {
    (async () => {
      // 1) 데이터 무결성 검증
      const validateData = () => {
        try {
          const p = JSON.parse(localStorage.getItem("eventos_projects") || "[]");
          if (!Array.isArray(p)) throw new Error("projects is not array");
          return true;
        } catch (e) {
          console.error("[EventOS] 데이터 무결성 검증 실패:", e);
          // 자동 백업에서 복구 시도
          try {
            const backups = JSON.parse(localStorage.getItem("eventos_autoBackups") || "[]");
            if (backups.length && backups[0].projects) {
              localStorage.setItem("eventos_projects", JSON.stringify(backups[0].projects));
              if (backups[0].users) localStorage.setItem("eventos_users", JSON.stringify(backups[0].users));
              if (backups[0].priceList) localStorage.setItem("eventos_priceList", JSON.stringify(backups[0].priceList));
              toast("⚠️ 데이터 오류 감지 → 자동 백업에서 복구했습니다", "warn");
              window.location.reload();
              return false;
            }
          } catch {}
          return true; // 복구 불가 시 기본값으로 진행
        }
      };
      validateData();

      // 2) 클라우드 로드 (Cloudflare D1 우선 → Google Drive 폴백)
      const anyCloudEnabled = CLOUD_CONFIG.ENABLED || DRIVE_CONFIG.ENABLED;
      if (!anyCloudEnabled) { setDriveLoaded(true); return; }
      const cloud = await SyncManager.loadFromCloud();
      if (cloud && !cloud.error) {
        if (cloud.users?.length) setUsers(cloud.users);
        if (cloud.priceList?.length) setPriceList(cloud.priceList);
        if (cloud.expenses) setExpenses(cloud.expenses);
        if (cloud.laborCosts) setLaborCosts(cloud.laborCosts);
        if (cloud.purchases) setPurchases(cloud.purchases);
        if (cloud.projects?.length) setProjects(cloud.projects);
        const source = CLOUD_CONFIG.ENABLED ? "Cloudflare D1" : "Google Drive";
        toast(`☁️ ${source}에서 데이터를 불러왔습니다.`, "success");
      }
      setDriveLoaded(true);
    })();
  }, []);

  // ── 30분 자동 백업 시스템 (localStorage + Cloudflare + Drive) ──
  // ⚠️ 중요: dataRef로 최신 상태를 참조 → useEffect 의존성 [] (타이머 리셋 방지)
  const lastBackupRef = useRef(null);
  const backupDataRef = useRef({ projects, users, priceList, expenses, laborCosts, purchases });
  useEffect(() => {
    backupDataRef.current = { projects, users, priceList, expenses, laborCosts, purchases };
  }, [projects, users, priceList, expenses, laborCosts, purchases]);

  useEffect(() => {
    const createAutoBackup = () => {
      const { projects, users, priceList, expenses, laborCosts, purchases } = backupDataRef.current;
      const snapshot = {
        projects, users, priceList, expenses, laborCosts, purchases,
        backupAt: new Date().toISOString(),
        type: "auto"
      };
      // JSON 비교로 변경 없으면 스킵
      const json = JSON.stringify({p:projects,u:users,pl:priceList,e:expenses,l:laborCosts,pu:purchases});
      if (lastBackupRef.current === json) {
        console.log("[EventOS] 자동 백업 스킵 (변경 없음):", new Date().toLocaleTimeString("ko-KR"));
        return;
      }
      lastBackupRef.current = json;

      // localStorage에 최근 N개 백업 보관
      try {
        const backups = JSON.parse(localStorage.getItem("eventos_autoBackups") || "[]");
        backups.unshift(snapshot);
        if (backups.length > DRIVE_CONFIG.MAX_LOCAL_BACKUPS) backups.length = DRIVE_CONFIG.MAX_LOCAL_BACKUPS;
        localStorage.setItem("eventos_autoBackups", JSON.stringify(backups));
      } catch (e) { console.error("[EventOS] 자동 백업 저장 실패:", e); }

      // 클라우드 백업 (Cloudflare D1 + Drive, 둘 다 활성 시 모두 저장)
      if (CLOUD_CONFIG.ENABLED || DRIVE_CONFIG.ENABLED) {
        SyncManager.queueSync("saveBackup", { data: snapshot });
      }
      console.log("[EventOS] ✅ 자동 백업 완료:", new Date().toLocaleTimeString("ko-KR"));
    };

    // 앱 시작 10초 후 첫 백업 + 정확히 30분 간격 반복 (타이머 리셋 없음)
    const initialTimer = setTimeout(createAutoBackup, 10000);
    const intervalTimer = setInterval(createAutoBackup, DRIVE_CONFIG.AUTO_BACKUP_INTERVAL_MS);

    return () => { clearTimeout(initialTimer); clearInterval(intervalTimer); };
  }, []); // 빈 의존성 → 타이머 한 번만 설정, 리셋 없음

  // ── 📧 긴급 과업 이메일 알림 시스템 ──
  // GAS를 통한 이메일 발송 함수
  const sendUrgentTaskEmail = useCallback(async (targetUser, urgentTasks, projectMap) => {
    if (!DRIVE_CONFIG.ENABLED || !targetUser.email) return { success: false, reason: "no_email" };
    const taskRows = urgentTasks.map(t => {
      const diff = Math.ceil((new Date(t.endDate) - new Date(today)) / 86400000);
      const dday = diff === 0 ? "⚠️ 오늘 마감" : diff < 0 ? `🚨 ${Math.abs(diff)}일 초과` : `D-${diff}`;
      return `<tr>
        <td style="padding:8px 12px;border-bottom:1px solid #eee;">${t.projectName||""}</td>
        <td style="padding:8px 12px;border-bottom:1px solid #eee;">${t.parentTask} › ${t.task}</td>
        <td style="padding:8px 12px;border-bottom:1px solid #eee;">${t.endDate}</td>
        <td style="padding:8px 12px;border-bottom:1px solid #eee;font-weight:700;color:${diff<=0?"#dc2626":"#f59e0b"}">${dday}</td>
      </tr>`;
    }).join("");

    const htmlBody = `
      <div style="font-family:'Apple SD Gothic Neo',sans-serif;max-width:600px;margin:0 auto;">
        <div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:24px;border-radius:12px 12px 0 0;">
          <h2 style="color:#fff;margin:0;">🏰 EventOS 긴급 업무 알림</h2>
          <p style="color:rgba(255,255,255,.8);margin:8px 0 0;font-size:14px;">${targetUser.name}님, 3일 이내 처리해야 할 긴급 업무가 ${urgentTasks.length}건 있습니다.</p>
        </div>
        <div style="background:#fff;padding:20px;border:1px solid #e5e7eb;border-top:none;">
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
              <tr style="background:#f8fafc;">
                <th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e5e7eb;">프로젝트</th>
                <th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e5e7eb;">과업</th>
                <th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e5e7eb;">마감일</th>
                <th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e5e7eb;">상태</th>
              </tr>
            </thead>
            <tbody>${taskRows}</tbody>
          </table>
          <div style="margin-top:20px;padding:12px;background:#fef3c7;border-radius:8px;font-size:12px;color:#92400e;">
            💡 EventOS 포털에서 업무 상세 내용을 확인하고 처리해 주세요.
          </div>
        </div>
        <div style="padding:16px;text-align:center;font-size:11px;color:#9ca3af;">
          이 메일은 EventOS 자동 알림 시스템에서 발송되었습니다. (${today})
        </div>
      </div>`;

    try {
      const res = await fetch(DRIVE_CONFIG.GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          action: "sendEmail",
          to: targetUser.email,
          subject: `[EventOS] 🚨 긴급 업무 ${urgentTasks.length}건 - ${targetUser.name}님 확인 필요`,
          htmlBody,
        }),
        redirect: "follow",
      });
      const text = await res.text();
      try { const r = JSON.parse(text); return r.error ? { success:false, reason:r.error } : { success:true }; }
      catch { return { success: true }; }
    } catch (err) {
      console.error("[EmailNotify]", err);
      return { success: false, reason: err.message };
    }
  }, [today]);

  // 긴급 과업 검색: 3일 이내 마감 + 담당자 지정 + 미완료
  const findUrgentTasksByUser = useCallback(() => {
    const d3 = new Date(today); d3.setDate(d3.getDate() + 3);
    const d3Str = d3.toISOString().slice(0,10);
    const tasksByUser = {}; // { userName: [tasks] }

    projects.forEach(p => {
      (p.gantt || []).forEach(g => {
        (g.subtasks || []).forEach(s => {
          if (s.done) return;
          if (!s.endDate || s.endDate > d3Str) return;
          const assignee = s.assignee || g.assignee;
          if (!assignee) return;
          if (!tasksByUser[assignee]) tasksByUser[assignee] = [];
          tasksByUser[assignee].push({
            task: s.task, parentTask: g.task, endDate: s.endDate,
            projectName: p.name, projectId: p.id,
            division: g.division, color: g.color,
          });
        });
      });
    });
    return tasksByUser;
  }, [projects, today]);

  // 전체 긴급 알림 발송 (관리자 수동 or 자동)
  const sendAllUrgentEmails = useCallback(async () => {
    const tasksByUser = findUrgentTasksByUser();
    const userNames = Object.keys(tasksByUser);
    if (!userNames.length) {
      toast("📭 3일 이내 긴급 과업이 없습니다.", "info");
      return { sent: 0, failed: 0, noEmail: 0 };
    }

    let sent = 0, failed = 0, noEmail = 0;
    for (const name of userNames) {
      const targetUser = users.find(u => u.name === name || u.producer === name);
      if (!targetUser || !targetUser.email) { noEmail++; continue; }
      const result = await sendUrgentTaskEmail(targetUser, tasksByUser[name]);
      if (result.success) { sent++; } else { failed++; }
    }

    const msg = `📧 긴급 알림 발송 완료: 성공 ${sent}건` +
      (failed ? `, 실패 ${failed}건` : "") +
      (noEmail ? `, 이메일 미등록 ${noEmail}명` : "");
    toast(msg, sent > 0 ? "success" : "warn");

    // 발송 기록 저장
    try {
      localStorage.setItem("eventos_lastEmailNotify", JSON.stringify({
        date: today, sent, failed, noEmail, at: new Date().toISOString()
      }));
    } catch {}

    console.log(`[EmailNotify] ${msg}`);
    return { sent, failed, noEmail };
  }, [findUrgentTasksByUser, users, sendUrgentTaskEmail, today]);

  // 📧 매일 1회 자동 발송 (앱 로드 시 오늘 미발송이면 실행)
  useEffect(() => {
    if (!DRIVE_CONFIG.ENABLED) return;
    const timer = setTimeout(() => {
      try {
        const last = JSON.parse(localStorage.getItem("eventos_lastEmailNotify") || "{}");
        if (last.date === today) return; // 오늘 이미 발송됨
      } catch {}
      // 자동 발송 실행
      const { projects: p, users: u } = backupDataRef.current;
      if (p?.length && u?.length) {
        console.log("[EmailNotify] 오늘 첫 접속 → 긴급 과업 자동 알림 발송");
        sendAllUrgentEmails();
      }
    }, 15000); // 앱 로드 15초 후 체크
    return () => clearTimeout(timer);
  }, []); // 1회만 실행

  // 로그인
  const handleLogin = (user) => {
    // lastLogin 갱신
    setUsers(prev => prev.map(u => u.id===user.id ? {...u, lastLogin: today} : u));
    const sessionUser = {...user, lastLogin: today};
    setAuthedUser(sessionUser);
    try { sessionStorage.setItem("eventos_session", JSON.stringify(sessionUser)); } catch {}
    toast(`👋 환영합니다, ${user.name}!`, "success");
  };

  // 로그아웃
  const handleLogout = () => {
    setAuthedUser(null);
    setPage("dashboard");
    setDetail(null);
    try {
      sessionStorage.removeItem("eventos_session");
      sessionStorage.removeItem("eventos_page");
      sessionStorage.removeItem("eventos_detail");
    } catch {}
    toast("로그아웃되었습니다.");
  };

  // page/detail 변경 시 sessionStorage 동기화
  useEffect(() => {
    if (!authedUser) return;
    try { sessionStorage.setItem("eventos_page", page); } catch {}
  }, [page, authedUser]);
  useEffect(() => {
    if (!authedUser) return;
    try {
      if (detail) sessionStorage.setItem("eventos_detail", JSON.stringify(detail));
      else sessionStorage.removeItem("eventos_detail");
    } catch {}
  }, [detail, authedUser]);

  // users 변경 시 authedUser도 동기화 (자기 자신이 차단된 경우 로그아웃)
  useEffect(() => {
    if (!authedUser) return;
    const latest = users.find(u => u.id === authedUser.id);
    if (!latest) { handleLogout(); return; }
    if (authedUser.id !== "admin" && !latest.approved) {
      toast("🚫 관리자에 의해 접근이 차단되었습니다.", "error");
      handleLogout();
    }
  }, [users]);

  // 페이지 title 동적 업데이트
  useEffect(() => {
    const PAGE_TITLES = {dashboard:"대시보드",projects:"프로젝트",mywork:"내 업무",expense:"지출결의",labor:"인건비",purchase:"구매요청",files:"자료실",admin:"관리자 설정"};
    const suffix = authedUser ? (page === "detail" && detail ? detail.name : (PAGE_TITLES[page] || "")) : "로그인";
    document.title = `EpicStage EventOS – ${suffix}`;
  }, [page, detail, authedUser]);

  const updateProject = useCallback((updated) => {
    setProjects(prev => prev.map(p=>p.id===updated.id?updated:p));
    if (detail?.id===updated.id) setDetail(updated);
  }, [detail]);

  const addProject = useCallback((proj) => {
    setProjects(prev=>[proj,...prev]);
  }, []);

  const deleteProject = useCallback((projectId) => {
    setProjects(prev => prev.filter(p => p.id !== projectId));
    if (detail?.id === projectId) { setDetail(null); setPage("projects"); }
  }, [detail]);

  // ── 로그인 전: 로그인 페이지 ──
  if (!authedUser) {
    return <LoginPage onLogin={handleLogin} users={users}/>;
  }

  // ProjectDetail은 renderPage 밖에서 display:none으로 유지
  // → 사이드바로 다른 페이지 이동해도 업로드 끊기지 않음
  const liveDetail = detail ? (projects.find(p=>p.id===detail.id)||detail) : null;

  const renderPage = () => {
    if (page==="detail"&&detail) return null; // ProjectDetail은 아래에서 별도 렌더링
    if (page==="dashboard") return <Dashboard projects={projects} setPage={setPage} setDetail={setDetail}/>;
    if (page==="projects") return <ProjectsPage projects={projects} setDetail={setDetail} setPage={setPage} onAddProject={addProject} onDeleteProject={deleteProject} priceList={priceList} currentUser={authedUser}/>;
    if (page==="mywork") return <MyWork projects={projects} user={authedUser} users={users} setDetail={setDetail} setPage={setPage} expenses={expenses} laborCosts={laborCosts} purchases={purchases}/>;
    if (page==="expense") return <ExpensePanel expenses={expenses} setExpenses={setExpenses} projects={projects} users={users} currentUser={authedUser}/>;
    if (page==="labor") return <LaborPanel laborCosts={laborCosts} setLaborCosts={setLaborCosts} projects={projects} users={users} currentUser={authedUser}/>;
    if (page==="purchase") return <PurchasePanel purchases={purchases} setPurchases={setPurchases} projects={projects} users={users} currentUser={authedUser}/>;
    if (page==="files") return <FilesPage projects={projects}/>;
    // 관리자 전용
    if (page==="admin") {
      if (!authedUser.isAdmin) { setPage("dashboard"); return null; }
      return <AdminPanel users={users} onUsersChange={setUsers} priceList={priceList} onPriceListChange={setPriceList}
        onSendUrgentEmails={sendAllUrgentEmails} findUrgentTasksByUser={findUrgentTasksByUser}/>;
    }
    return null;
  };

  // 데이터 내보내기
  const exportData = () => {
    const data = { projects, users, priceList, expenses, laborCosts, purchases, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `EventOS_backup_${today}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast("📦 데이터가 다운로드되었습니다", "success");
  };

  // 데이터 가져오기
  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.projects) setProjects(data.projects);
        if (data.users) setUsers(data.users);
        if (data.priceList) setPriceList(data.priceList);
        if (data.expenses) setExpenses(data.expenses);
        if (data.laborCosts) setLaborCosts(data.laborCosts);
        if (data.purchases) setPurchases(data.purchases);
        toast("✅ 데이터를 성공적으로 불러왔습니다!", "success");
      } catch { toast("❌ 파일을 읽을 수 없습니다", "error"); }
    };
    reader.readAsText(file);
  };

  return (
    <>
      <Topbar page={page} setPage={setPage} user={authedUser} onLogout={handleLogout}
        onExport={exportData} onImport={importData}/>
      <BottomNav page={page} setPage={setPage} user={authedUser}/>
      <div id="main">
        {renderPage()}
        {/* ProjectDetail: 업로드 중 페이지 이동해도 끊기지 않도록 display:none으로 유지 */}
        {liveDetail && (
          <div style={{display: page==="detail" ? "block" : "none"}}>
            <ProjectDetail project={liveDetail} onBack={()=>setPage("projects")} onUpdate={updateProject} currentUser={authedUser} users={users}/>
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b14;--surface:#0f1623;--card:#141d2e;--border:rgba(255,255,255,0.07);
  --primary:#6366f1;--primary-dim:rgba(99,102,241,0.15);--primary-border:rgba(99,102,241,0.3);
  --accent:#ec4899;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;--txt4:#475569;
  --radius:12px;--radius-sm:8px;--sidebar:240px;--topbar:56px;--bottomnav:60px;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:99px}
button{font-family:inherit;cursor:pointer}input,textarea,select{font-family:inherit}
/* ─ Topbar ─ */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar);background:rgba(8,11,20,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:200}
#topbar .logo{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:16px}
#topbar .logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
#topbar .logo-text{color:var(--txt);font-weight:800;font-size:15px;white-space:nowrap}
#topbar nav{display:flex;gap:2px;flex:1}
#topbar nav button{background:transparent;border:none;color:var(--txt3);padding:6px 12px;border-radius:6px;font-size:13px;transition:all .15s;white-space:nowrap}
#topbar nav button.active{background:var(--primary-dim);color:#a5b4fc;font-weight:600}
#topbar nav button:hover:not(.active){background:rgba(255,255,255,.04);color:var(--txt2)}
#topbar .user{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
#topbar .user-badge{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#ec4899);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
#topbar .user-name{font-size:13px;color:var(--txt2)}
/* ─ Bottom Nav (mobile) ─ */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottomnav);background:rgba(8,11,20,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);z-index:200;justify-content:space-around;align-items:center;padding:0 8px}
#bottom-nav button{background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:8px;transition:all .15s;min-width:54px}
#bottom-nav button span.icon{font-size:20px}
#bottom-nav button span.label{font-size:10px;color:var(--txt3);font-weight:500}
#bottom-nav button.active span.icon{filter:drop-shadow(0 0 6px #6366f1)}
#bottom-nav button.active span.label{color:#a5b4fc;font-weight:700}
/* ─ Main ─ */
#main{margin-top:var(--topbar);padding:24px 24px 40px;max-width:1280px;margin-left:auto;margin-right:auto}
/* ─ Cards ─ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-sm{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px}
/* ─ Status badge ─ */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
/* ─ Buttons ─ */
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--txt2)}
.btn-ghost:hover{border-color:var(--primary-border);color:var(--txt)}
.btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
/* ─ Form ─ */
.form-input{width:100%;background:#1e293b;border:1.5px solid #334155;color:var(--txt);border-radius:8px;padding:10px 14px;font-size:13px;outline:none;transition:border-color .18s}
.form-input:focus{border-color:var(--primary)}
.form-label{font-size:12px;font-weight:600;color:var(--txt3);margin-bottom:5px;display:block}
.form-group{margin-bottom:14px}
/* ─ Progress ─ */
.prog-track{height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .8s cubic-bezier(.4,0,.2,1)}
/* ─ Tab bar ─ */
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--txt3);padding:8px 14px;font-size:13px;white-space:nowrap;transition:all .15s;margin-bottom:-1px}
.tab-btn.active{border-bottom-color:var(--primary);color:#a5b4fc;font-weight:600}
/* ─ Toast ─ */
#toasts{position:fixed;bottom:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:rgba(15,22,35,.96);backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--txt);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastIn .2s ease;pointer-events:all}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ─ Modal ─ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:540px;padding:24px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:16px;font-weight:800;color:var(--txt);margin-bottom:18px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
/* ─ Grid utilities ─ */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.flex-row{display:flex;align-items:center;gap:10px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
/* ─ Gantt ─ */
.gantt-row{display:flex;align-items:center;margin-bottom:5px}
.gantt-label{color:var(--txt2);font-size:11px;text-align:right;padding-right:10px;flex-shrink:0;width:130px}
.gantt-track{flex:1;position:relative;height:22px;background:rgba(255,255,255,.03);border-radius:3px}
.gantt-bar{position:absolute;top:1px;height:20px;border-radius:3px;display:flex;align-items:center;padding-left:8px}
.gantt-bar span{font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
/* ─ Log ─ */
.log-item{display:flex;gap:10px;padding:10px;border-radius:8px;margin-bottom:6px}
.log-auto{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.12)}
.log-comment{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12)}
.log-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
/* ─ Checklist ─ */
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:3px}
.cl-done{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.12)}
.cl-undone{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)}
/* ─ Stat card ─ */
.stat-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-label{color:var(--txt3);font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.stat-value{color:var(--txt);font-size:26px;font-weight:800;line-height:1}
.stat-sub{color:var(--txt4);font-size:12px;margin-top:6px}
/* ─ Project card ─ */
.proj-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .2s}
.proj-card:hover{border-color:var(--primary-border);background:rgba(99,102,241,.04)}
/* ─ File zone ─ */
.drop-zone{border:2px dashed rgba(99,102,241,.3);border-radius:var(--radius);padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover{border-color:var(--primary);background:var(--primary-dim)}
/* ══ ADMIN PANEL ══ */
.admin-user-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.02);margin-bottom:8px;flex-wrap:wrap}
.admin-user-row.approved{border-left:3px solid #10b981}
.admin-user-row.pending{border-left:3px solid #f59e0b}
.admin-user-row.blocked{border-left:3px solid #ef4444}
.status-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.pill-approved{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.pill-pending{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.pill-blocked{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.admin-action-btn{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
/* ══ LOGIN PAGE ══ */
.login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.login-card{position:relative;z-index:1;background:rgba(15,22,35,.85);border:1px solid rgba(99,102,241,.18);border-radius:20px;padding:40px 36px;width:100%;max-width:400px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 24px 80px rgba(0,0,0,.5)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;margin:0 auto 14px}
.login-brand{font-size:22px;font-weight:900;color:var(--txt);letter-spacing:-.5px}
.login-sub{font-size:13px;color:var(--txt4);margin-top:4px}
.login-divider{height:1px;background:var(--border);margin:20px 0}
.login-field{position:relative;margin-bottom:14px}
.login-field-label{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;display:block}
.login-field input{width:100%;background:#0e1520;border:1.5px solid #1e2d42;color:var(--txt);border-radius:10px;padding:12px 14px 12px 42px;font-size:14px;outline:none;transition:all .18s}
.login-field input:focus{border-color:#6366f1;background:#111925;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.login-field .field-icon{position:absolute;left:14px;bottom:12px;font-size:16px;color:var(--txt4);pointer-events:none}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .18s;letter-spacing:.02em}
.login-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.35)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:10px 14px;color:#fca5a5;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.login-notice{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.12);border-radius:10px;padding:12px 14px;margin-top:20px;text-align:center}
.login-notice-txt{color:var(--txt4);font-size:12px;line-height:1.6}
.login-attempts{font-size:11px;color:var(--txt4);text-align:center;margin-top:10px}
/* show-pw toggle */
.pw-toggle{position:absolute;right:12px;bottom:10px;background:transparent;border:none;color:var(--txt4);font-size:18px;cursor:pointer;padding:2px 4px;transition:color .15s}
.pw-toggle:hover{color:var(--txt2)}
/* ─ Report preview ─ */
.report-preview{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:16px;max-height:280px;overflow-y:auto}
.report-preview pre{color:var(--txt2);font-size:13px;line-height:1.7;white-space:pre-wrap;font-family:inherit}
/* ─ AI panel ─ */
.ai-panel{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.08));border:1px solid rgba(99,102,241,.2);border-radius:var(--radius);padding:16px}

/* ─ Sync spinner ─ */
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ══ RESPONSIVE ══ */
@media(max-width:768px){
  #topbar nav{display:none}
  #topbar .user-name{display:none}
  #bottom-nav{display:flex}
  #main{padding:16px 14px calc(var(--bottomnav) + 16px)}
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  .gantt-label{width:90px;font-size:10px}
  .modal-box{max-height:95vh}
}
@media(min-width:769px) and (max-width:1100px){
  .grid-4{grid-template-columns:repeat(2,1fr)}
}
@media(min-width:769px){
  .modal-overlay{align-items:center;padding:20px}
  .modal-box{border-radius:var(--radius);animation:fadeScale .22s ease}
  @keyframes fadeScale{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  #toasts{bottom:24px}
}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ══ 팀 계정 (EpicStage 전용) ══════════════════════════════════════════════
   approved 값은 admin이 승인해야만 로그인 가능.

/* ══ Google Drive 연동 설정 ══════════════════════════════════════════════════
   Google Apps Script Web App URL을 아래에 설정하세요.
   설정 방법: https://script.google.com 에서 Code.gs 배포 후 URL 복사
═══════════════════════════════════════════════════════════════════════════ */
const DRIVE_CONFIG = {
  GAS_URL: "https://script.google.com/macros/s/AKfycbxV6A4oEtkrBN6RIguTiQN44d6MOQlpoZOUZn2tI-pXQFlyw-QEfWA0S-b_RqgzQs20OA/exec",

  SYNC_DEBOUNCE_MS: 3000,
  AUTO_BACKUP_INTERVAL_MS: 30 * 60 * 1000, // 30분 자동 백업
  MAX_LOCAL_BACKUPS: 3,  // localStorage에 최근 3개 백업 보관
  ENABLED: false, // GAS_URL 설정 시 자동 활성화
};
// GAS_URL이 있으면 자동 활성화
if (DRIVE_CONFIG.GAS_URL) DRIVE_CONFIG.ENABLED = true;

/* ══ Cloudflare D1 + R2 클라우드 설정 ══════════════════════════════════════════
   Cloudflare Worker 배포 후 URL을 아래에 입력하세요.
   배포 방법: cd worker && wrangler deploy → URL 복사
═══════════════════════════════════════════════════════════════════════════ */
const CLOUD_CONFIG = {
  WORKER_URL: "https://eventos-worker.kimjh-c7c.workers.dev",
  SYNC_DEBOUNCE_MS: 3000,
  ENABLED: false,
};
if (CLOUD_CONFIG.WORKER_URL) CLOUD_CONFIG.ENABLED = true;

// CloudSync: Cloudflare Workers API 호출 모듈
const CloudSync = {
  _baseUrl: () => CLOUD_CONFIG.WORKER_URL.replace(/\/$/, ""),

  // 전체 데이터 로드 (앱 시작 시)
  async loadAll() {
    if (!CLOUD_CONFIG.ENABLED) return null;
    try {
      const res = await fetch(`${this._baseUrl()}/api/data`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error || "Load failed");
      return data;
    } catch (err) {
      console.error("[CloudSync] loadAll:", err);
      return null;
    }
  },

  // 시스템 데이터 저장 (users, priceList 등)
  async saveAppData(payload) {
    if (!CLOUD_CONFIG.ENABLED) return null;
    try {
      const res = await fetch(`${this._baseUrl()}/api/data`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: payload }),
      });
      return await res.json();
    } catch (err) {
      console.error("[CloudSync] saveAppData:", err);
      return null;
    }
  },

  // 프로젝트 개별 저장
  async saveProject(project) {
    if (!CLOUD_CONFIG.ENABLED) return null;
    try {
      const res = await fetch(`${this._baseUrl()}/api/project`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ project }),
      });
      return await res.json();
    } catch (err) {
      console.error("[CloudSync] saveProject:", err);
      return null;
    }
  },

  // 자동 백업 생성
  async createBackup(snapshot) {
    if (!CLOUD_CONFIG.ENABLED) return null;
    try {
      const res = await fetch(`${this._baseUrl()}/api/backup`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: snapshot, type: "auto" }),
      });
      return await res.json();
    } catch (err) {
      console.error("[CloudSync] createBackup:", err);
      return null;
    }
  },

  // 백업 이력 조회
  async listBackups() {
    if (!CLOUD_CONFIG.ENABLED) return [];
    try {
      const res = await fetch(`${this._baseUrl()}/api/backups`);
      const data = await res.json();
      return data.success ? data.backups : [];
    } catch (err) {
      console.error("[CloudSync] listBackups:", err);
      return [];
    }
  },

  // 백업 복원
  async restoreBackup(id) {
    if (!CLOUD_CONFIG.ENABLED) return null;
    try {
      const res = await fetch(`${this._baseUrl()}/api/backup/${id}/restore`, {
        method: "POST",
      });
      const data = await res.json();
      return data.success ? data.data : null;
    } catch (err) {
      console.error("[CloudSync] restoreBackup:", err);
      return null;
    }
  },

  // R2 파일 업로드 (base64 — 폴백용)
  async uploadFile(projectId, fileName, base64Data, mimeType, uploadedBy) {
    if (!CLOUD_CONFIG.ENABLED) return null;
    try {
      const res = await fetch(`${this._baseUrl()}/api/files/upload`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ projectId, fileName, base64Data, mimeType, uploadedBy }),
      });
      return await res.json();
    } catch (err) {
      console.error("[CloudSync] uploadFile:", err);
      return null;
    }
  },

  // 🚀 R2 파일 업로드 (FormData 바이너리 — base64 변환 불필요, 33% 빠름)
  _binarySupported: null, // null=미확인, true/false=캐시
  async uploadFileBinary(projectId, file, uploadedBy, onProgress) {
    if (!CLOUD_CONFIG.ENABLED) return null;
    if (this._binarySupported === false) return null; // 바이너리 미지원 확인됨 → 스킵
    try {
      const formData = new FormData();
      formData.append('file', file, file.name);
      formData.append('fileName', file.name);
      formData.append('mimeType', file.type || 'application/octet-stream');
      if (projectId) formData.append('projectId', projectId);
      if (uploadedBy) formData.append('uploadedBy', uploadedBy);

      return new Promise((resolve) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", `${this._baseUrl()}/api/files/upload`);
        xhr.timeout = 300000; // 5분
        if (onProgress) {
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
          };
        }
        xhr.onload = () => {
          try {
            const result = JSON.parse(xhr.responseText);
            if (result && result.success) { this._binarySupported = true; }
            else { this._binarySupported = false; }
            resolve(result);
          } catch { this._binarySupported = false; resolve(null); }
        };
        xhr.onerror = () => { this._binarySupported = false; resolve(null); };
        xhr.ontimeout = () => resolve(null);
        xhr.send(formData);
      });
    } catch (err) {
      console.error("[CloudSync] uploadFileBinary:", err);
      this._binarySupported = false;
      return null;
    }
  },

  // R2 파일 다운로드 URL
  getFileUrl(key) {
    return `${this._baseUrl()}/api/files/${encodeURIComponent(key)}`;
  },

  // R2 파일 삭제
  async deleteFile(key) {
    if (!CLOUD_CONFIG.ENABLED) return null;
    try {
      const res = await fetch(`${this._baseUrl()}/api/files/${encodeURIComponent(key)}`, {
        method: "DELETE",
      });
      return await res.json();
    } catch (err) {
      console.error("[CloudSync] deleteFile:", err);
      return null;
    }
  },

  // R2 파일 목록
  async listFiles(projectId) {
    if (!CLOUD_CONFIG.ENABLED) return [];
    try {
      const url = projectId
        ? `${this._baseUrl()}/api/files?projectId=${projectId}`
        : `${this._baseUrl()}/api/files`;
      const res = await fetch(url);
      const data = await res.json();
      return data.success ? data.files : [];
    } catch (err) {
      console.error("[CloudSync] listFiles:", err);
      return [];
    }
  },
};

/* ── localStorage 영속화 + Google Drive 동기화 모듈 ────────────────────────── */

// SyncManager: 디바운스 동기화 큐 (Cloudflare 우선 → Google Drive 폴백)
const SyncManager = {
  _timers: {},
  _status: "idle", // "idle" | "syncing" | "success" | "error" | "offline"
  _listeners: new Set(),
  _lastSyncTime: null,
  _syncTarget: "none", // "cloudflare" | "drive" | "both" | "none"

  subscribe(fn) { this._listeners.add(fn); return () => this._listeners.delete(fn); },
  _notify() { this._listeners.forEach(fn => fn(this._status, this._lastSyncTime)); },

  setStatus(s) { this._status = s; this._notify(); },
  getStatus() { return this._status; },

  // 현재 동기화 대상 결정
  _getTarget() {
    const cf = CLOUD_CONFIG.ENABLED;
    const dr = DRIVE_CONFIG.ENABLED;
    if (cf && dr) return "both";
    if (cf) return "cloudflare";
    if (dr) return "drive";
    return "none";
  },

  // 통합 동기화 (디바운스) — Cloudflare 우선, Drive 폴백
  queueSync(action, data) {
    const target = this._getTarget();
    if (target === "none") return;
    if (!navigator.onLine) { this.setStatus("offline"); return; }

    const debounceMs = CLOUD_CONFIG.ENABLED ? CLOUD_CONFIG.SYNC_DEBOUNCE_MS : DRIVE_CONFIG.SYNC_DEBOUNCE_MS;

    clearTimeout(this._timers[action]);
    this._timers[action] = setTimeout(async () => {
      this.setStatus("syncing");
      let success = false;

      // 1) Cloudflare D1 (우선)
      if (CLOUD_CONFIG.ENABLED) {
        try {
          if (action === "saveAppData") {
            await CloudSync.saveAppData(data.data);
          } else if (action.startsWith("saveProject_")) {
            await CloudSync.saveProject(data.project);
          } else if (action === "saveBackup") {
            await CloudSync.createBackup(data.data);
          }
          success = true;
          console.log("[CloudSync] ✅", action);
        } catch (err) {
          console.error("[CloudSync]", action, err);
        }
      }

      // 2) Google Drive GAS (폴백 또는 동시 백업)
      if (DRIVE_CONFIG.ENABLED) {
        try {
          const res = await fetch(DRIVE_CONFIG.GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action, ...data }),
            redirect: "follow",
          });
          const text = await res.text();
          let result;
          try { result = JSON.parse(text); } catch { result = { ok: true }; }
          if (result.error) throw new Error(result.error);
          success = true;
          console.log("[DriveSync] ✅", action);
        } catch (err) {
          console.error("[DriveSync]", action, err);
        }
      }

      if (success) {
        this._lastSyncTime = new Date();
        this.setStatus("success");
      } else {
        this.setStatus("error");
      }
    }, debounceMs);
  },

  // 전체 데이터 로드 (Cloudflare 우선 → GAS 폴백)
  async loadFromCloud() {
    const target = this._getTarget();
    if (target === "none") return null;
    if (!navigator.onLine) { this.setStatus("offline"); return null; }
    this.setStatus("syncing");

    // 1) Cloudflare D1 우선 시도
    if (CLOUD_CONFIG.ENABLED) {
      try {
        const data = await CloudSync.loadAll();
        if (data && data.success) {
          this._lastSyncTime = new Date();
          this.setStatus("success");
          console.log("[CloudSync] ✅ loadAll from Cloudflare D1");
          return data;
        }
      } catch (err) {
        console.error("[CloudSync] loadAll fallback to Drive:", err);
      }
    }

    // 2) Google Drive GAS 폴백
    if (DRIVE_CONFIG.ENABLED) {
      try {
        const res = await fetch(`${DRIVE_CONFIG.GAS_URL}?action=loadAll`, { redirect: "follow" });
        const text = await res.text();
        const data = JSON.parse(text);
        if (data.error) throw new Error(data.error);
        this._lastSyncTime = new Date();
        this.setStatus("success");
        console.log("[DriveSync] ✅ loadAll from Google Drive");
        return data;
      } catch (err) {
        console.error("[DriveSync] loadAll error:", err);
      }
    }

    this.setStatus("error");
    return null;
  },

  // 파일 업로드 (Google Drive + Cloudflare R2 동시 듀얼 업로드)
  async uploadFile(projectName, fileName, base64Data, mimeType) {
    const target = this._getTarget();
    if (target === "none") { toast("클라우드 스토리지가 연결되지 않았습니다.", "error"); return null; }
    this.setStatus("syncing");

    let driveResult = null, cloudResult = null;
    const promises = [];

    // 1) Google Drive 업로드
    if (DRIVE_CONFIG.ENABLED) {
      promises.push(
        fetch(DRIVE_CONFIG.GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "uploadFile", projectName, fileName, base64Data, mimeType }),
          redirect: "follow",
        }).then(r => r.text()).then(t => { driveResult = JSON.parse(t); console.log("[DriveSync] ✅ uploadFile:", fileName); })
          .catch(err => { console.error("[DriveSync] uploadFile:", err); })
      );
    }

    // 2) Cloudflare R2 업로드
    if (CLOUD_CONFIG.ENABLED) {
      promises.push(
        CloudSync.uploadFile(null, fileName, base64Data, mimeType)
          .then(r => { cloudResult = r; console.log("[CloudSync] ✅ uploadFile:", fileName); })
          .catch(err => { console.error("[CloudSync] uploadFile:", err); })
      );
    }

    // 동시 실행 → 모두 완료될 때까지 대기
    await Promise.allSettled(promises);

    // 3) Google Drive 결과 우선 반환 (다운로드가 Drive 기반)
    if (driveResult && !driveResult.error) {
      this._lastSyncTime = new Date();
      this.setStatus("success");
      if (cloudResult && cloudResult.success) {
        driveResult.r2Url = cloudResult.url;
        driveResult.r2Key = cloudResult.key;
      }
      return driveResult;
    }
    // 4) R2만 성공 시 폴백
    if (cloudResult && cloudResult.success) {
      this._lastSyncTime = new Date();
      this.setStatus("success");
      return cloudResult;
    }

    this.setStatus("error");
    return null;
  },

  // 파일 → base64 변환 유틸리티 (Drive 전용, 지연 변환)
  _fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  },

  // ⚡ R2-first 고속 업로드 v2: 바이너리 우선 → base64 폴백 → Drive 백그라운드
  async uploadFileR2First(projectName, fileName, fileOrBase64, mimeType, onProgress) {
    this.setStatus("syncing");
    let r2Result = null;
    const isRawFile = (typeof File !== 'undefined' && fileOrBase64 instanceof File) ||
                      (typeof Blob !== 'undefined' && fileOrBase64 instanceof Blob);
    const startTime = Date.now();

    // 1) R2 먼저 — 바이너리 FormData 시도 (33% 빠름) → base64 폴백
    if (CLOUD_CONFIG.ENABLED) {
      try {
        if (isRawFile) {
          // 🚀 바이너리 직접 전송 (base64 변환 없이 33% 데이터 절감)
          r2Result = await CloudSync.uploadFileBinary(null, fileOrBase64, null, onProgress);
        }
        if (!r2Result || !r2Result.success) {
          // base64 폴백 (Worker가 FormData 미지원 시)
          if (onProgress) onProgress(0);
          const base64 = isRawFile ? await this._fileToBase64(fileOrBase64) : fileOrBase64;
          r2Result = await CloudSync.uploadFile(null, fileName, base64, mimeType);
          if (onProgress) onProgress(100);
        }
        if (r2Result && r2Result.success) {
          const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
          const sizeMB = isRawFile ? (fileOrBase64.size / 1048576).toFixed(1) : "?";
          console.log(`[CloudSync] ⚡ ${fileName} (${sizeMB}MB) → ${elapsed}s`);
        }
      } catch (err) { console.error("[CloudSync] upload:", err); }
    }

    // 2) Drive 백그라운드 (base64 지연 변환 — R2 완료 후 시작)
    let drivePromise = null;
    if (DRIVE_CONFIG.ENABLED) {
      const getBase64 = isRawFile ? this._fileToBase64(fileOrBase64) : Promise.resolve(fileOrBase64);
      drivePromise = getBase64.then(base64 =>
        fetch(DRIVE_CONFIG.GAS_URL, {
          method: "POST", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "uploadFile", projectName, fileName, base64Data: base64, mimeType }),
          redirect: "follow",
        }).then(r => r.text()).then(t => {
          try { const d = JSON.parse(t); return (d && !d.error) ? d : null; } catch { return null; }
        })
      ).catch(err => { console.error("[DriveSync] bg:", err); return null; });
    }

    // 3) R2 성공 → 즉시 반환 (Drive는 백그라운드)
    if (r2Result && r2Result.success) {
      this._lastSyncTime = new Date();
      this.setStatus("success");
      return {
        success: true,
        r2Url: r2Result.url || "", r2Key: r2Result.key || "",
        url: r2Result.url || "", key: r2Result.key || "",
        drivePromise,
      };
    }

    // 4) R2 실패 → Drive 결과 기다림
    if (drivePromise) {
      const driveResult = await drivePromise;
      if (driveResult) {
        this._lastSyncTime = new Date();
        this.setStatus("success");
        return { ok: true, ...driveResult };
      }
    }

    this.setStatus("error");
    return null;
  },

  // 파일 목록 조회 (Cloudflare 우선)
  async listFiles(projectName) {
    // Cloudflare R2 우선
    if (CLOUD_CONFIG.ENABLED) {
      try {
        const files = await CloudSync.listFiles();
        if (files.length) return files;
      } catch {}
    }
    // GAS 폴백
    if (DRIVE_CONFIG.ENABLED) {
      try {
        const res = await fetch(`${DRIVE_CONFIG.GAS_URL}?action=listFiles&projectName=${encodeURIComponent(projectName)}`, { redirect: "follow" });
        const text = await res.text();
        const result = JSON.parse(text);
        return result.files || [];
      } catch (err) {
        console.error("[DriveSync] listFiles error:", err);
      }
    }
    return [];
  },
};

// 온라인/오프라인 감지
if (typeof window !== "undefined") {
  window.addEventListener("online", () => { if (SyncManager._status === "offline") SyncManager.setStatus("idle"); });
  window.addEventListener("offline", () => SyncManager.setStatus("offline"));
}

// usePersistedState: useState + localStorage 자동 동기화
function usePersistedState(key, defaultValue) {
  const [state, setState] = useState(() => {
    try {
      const saved = localStorage.getItem(key);
      if (saved !== null) return JSON.parse(saved);
    } catch {}
    return defaultValue;
  });

  const setPersistedState = useCallback((valOrFn) => {
    setState(prev => {
      const next = typeof valOrFn === "function" ? valOrFn(prev) : valOrFn;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);

  return [state, setPersistedState];
}

// useSyncStatus: SyncManager 상태를 React 상태로 연결
function useSyncStatus() {
  const [status, setStatus] = useState(SyncManager.getStatus());
  const [lastSync, setLastSync] = useState(SyncManager._lastSyncTime);
  useEffect(() => {
    return SyncManager.subscribe((s, t) => { setStatus(s); setLastSync(t); });
  }, []);
  return { status, lastSync };
}

// SyncStatusBar 컴포넌트: Topbar에 표시되는 저장 상태 + 자동 백업 시간
function SyncStatusBar() {
  const { status, lastSync } = useSyncStatus();
  const [lastBackup, setLastBackup] = React.useState(null);
  const [showBackupPanel, setShowBackupPanel] = React.useState(false);

  React.useEffect(() => {
    const check = () => {
      try {
        const backups = JSON.parse(localStorage.getItem("eventos_autoBackups") || "[]");
        if (backups.length && backups[0].backupAt) setLastBackup(new Date(backups[0].backupAt));
      } catch {}
    };
    check();
    const t = setInterval(check, 60000);
    return () => clearInterval(t);
  }, []);

  const backupTimeStr = lastBackup
    ? lastBackup.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})
    : null;

  // 클라우드 미연결 시 localStorage 저장 + 백업 상태 표시
  const cloudLabel = CLOUD_CONFIG.ENABLED && DRIVE_CONFIG.ENABLED ? "D1+Drive"
    : CLOUD_CONFIG.ENABLED ? "Cloudflare"
    : DRIVE_CONFIG.ENABLED ? "Drive" : null;

  if (!DRIVE_CONFIG.ENABLED && !CLOUD_CONFIG.ENABLED) {
    return (
      <div style={{position:"relative"}}>
        <div onClick={()=>setShowBackupPanel(!showBackupPanel)}
          style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:6,
          background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.2)",fontSize:11,color:"#34d399",whiteSpace:"nowrap",cursor:"pointer"}}>
          <span>💾</span>
          <span>자동저장{backupTimeStr ? ` · 백업 ${backupTimeStr}` : ""}</span>
        </div>
        {showBackupPanel && <BackupPanel onClose={()=>setShowBackupPanel(false)}/>}
      </div>
    );
  }
  const configs = {
    idle:    { icon:"☁️", text:"대기", bg:"rgba(255,255,255,.04)", border:"var(--border)", color:"var(--txt4)" },
    syncing: { icon:"🔄", text:"저장 중...", bg:"rgba(99,102,241,.1)", border:"rgba(99,102,241,.2)", color:"#a5b4fc" },
    success: { icon:"✅", text: lastSync ? `${lastSync.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})} ${cloudLabel || ""} 동기화` : "동기화됨", bg:"rgba(16,185,129,.08)", border:"rgba(16,185,129,.2)", color:"#34d399" },
    error:   { icon:"⚠️", text:"동기화 실패", bg:"rgba(239,68,68,.08)", border:"rgba(239,68,68,.2)", color:"#fca5a5" },
    offline: { icon:"📴", text:"오프라인", bg:"rgba(107,114,128,.1)", border:"rgba(107,114,128,.2)", color:"#9ca3af" },
  };
  const c = configs[status] || configs.idle;
  return (
    <div style={{position:"relative"}}>
      <div onClick={()=>setShowBackupPanel(!showBackupPanel)}
        style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:6,
        background:c.bg,border:`1px solid ${c.border}`,fontSize:11,color:c.color,whiteSpace:"nowrap",
        transition:"all .3s",cursor:"pointer"}}>
        <span style={status==="syncing"?{animation:"spin 1s linear infinite"}:{}}>{c.icon}</span>
        <span>{c.text}{backupTimeStr ? ` · 백업 ${backupTimeStr}` : ""}</span>
      </div>
      {showBackupPanel && <BackupPanel onClose={()=>setShowBackupPanel(false)}/>}
    </div>
  );
}

// 백업 이력 패널 (SyncStatusBar 클릭 시 표시)
function BackupPanel({onClose}) {
  const [backups, setBackups] = React.useState([]);
  const [restoring, setRestoring] = React.useState(false);
  React.useEffect(() => {
    try {
      const b = JSON.parse(localStorage.getItem("eventos_autoBackups") || "[]");
      setBackups(b);
    } catch {}
  }, []);

  const restoreBackup = (idx) => {
    if (!window.confirm(`이 백업(${new Date(backups[idx].backupAt).toLocaleString("ko-KR")})으로 복원하시겠습니까?\n현재 데이터를 덮어씁니다.`)) return;
    setRestoring(true);
    const b = backups[idx];
    try {
      if (b.projects) localStorage.setItem("eventos_projects", JSON.stringify(b.projects));
      if (b.users) localStorage.setItem("eventos_users", JSON.stringify(b.users));
      if (b.priceList) localStorage.setItem("eventos_priceList", JSON.stringify(b.priceList));
      if (b.expenses) localStorage.setItem("eventos_expenses", JSON.stringify(b.expenses));
      if (b.laborCosts) localStorage.setItem("eventos_laborCosts", JSON.stringify(b.laborCosts));
      if (b.purchases) localStorage.setItem("eventos_purchases", JSON.stringify(b.purchases));
      window.location.reload();
    } catch (e) {
      setRestoring(false);
      alert("복원 실패: " + e.message);
    }
  };

  return (
    <div style={{position:"absolute",top:"100%",right:0,marginTop:8,width:320,background:"var(--card)",

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:800,color:"var(--txt)"}}>🔄 자동 백업 이력</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:"var(--txt3)",cursor:"pointer",fontSize:16}}>✕</button>
      </div>
      <div style={{fontSize:11,color:"var(--txt4)",marginBottom:10}}>30분마다 자동 백업됩니다. 최근 {DRIVE_CONFIG.MAX_LOCAL_BACKUPS}개 보관.</div>
      {backups.length === 0 ? (
        <div style={{textAlign:"center",padding:20,color:"var(--txt4)",fontSize:12}}>아직 자동 백업이 없습니다</div>
      ) : backups.map((b,i)=>{
        const dt = new Date(b.backupAt);
        const projCount = (b.projects||[]).length;
        return (
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",marginBottom:6}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"var(--txt)"}}>{dt.toLocaleDateString("ko-KR")} {dt.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</div>
              <div style={{fontSize:10,color:"var(--txt4)"}}>프로젝트 {projCount}개 · {b.type==="auto"?"자동":"수동"}</div>
            </div>
            <button onClick={()=>restoreBackup(i)} disabled={restoring}
              style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(99,102,241,.3)",
                background:"rgba(99,102,241,.1)",color:"#818cf8",fontSize:11,fontWeight:600,cursor:"pointer"}}>
              복원
            </button>
          </div>
        );
      })}
      {DRIVE_CONFIG.ENABLED && (
        <div style={{marginTop:8,padding:"6px 10px",borderRadius:6,background:"rgba(16,185,129,.06)",
          border:"1px solid rgba(16,185,129,.15)",fontSize:11,color:"#34d399"}}>
          ☁️ Google Drive에도 백업이 저장됩니다 (최근 48개)
        </div>
      )}
    </div>
  );
}

/* ── 로그인 페이지 ─────────────────────────────────────────────────────────── */
function LoginPage({ onLogin, users }) {
  const [uid, setUid] = useState("");
  const [pw, setPw] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState("");
  const [errorType, setErrorType] = useState("default"); // "default" | "not_approved" | "blocked"
  const [attempts, setAttempts] = useState(0);
  const [locked, setLocked] = useState(false);
  const [lockEnd, setLockEnd] = useState(null);
  const [lockRemain, setLockRemain] = useState(0);
  const [loading, setLoading] = useState(false);
  const pwRef = useRef(null);

  // 잠금 카운트다운
  useEffect(() => {
    if (!locked || !lockEnd) return;
    const tick = setInterval(() => {
      const remain = Math.ceil((lockEnd - Date.now()) / 1000);
      if (remain <= 0) { setLocked(false); setAttempts(0); setLockEnd(null); clearInterval(tick); }
      else setLockRemain(remain);
    }, 1000);
    return () => clearInterval(tick);
  }, [locked, lockEnd]);

  const handleLogin = async () => {
    if (locked) return;
    setError(""); setErrorType("default");
    if (!uid.trim() || !pw) { setError("아이디와 비밀번호를 모두 입력해 주세요."); return; }
    setLoading(true);
    await new Promise(r => setTimeout(r, 700));
    // 현재 최신 users 목록에서 확인
    const matchId = users.find(u => u.id === uid.trim().toLowerCase());
    const matchFull = matchId && matchId.pw === pw;
    setLoading(false);

    if (matchFull) {
      // admin은 항상 통과, 나머지는 approved 체크
      if (matchId.id === "admin" || matchId.approved) {
        setAttempts(0);
        onLogin(matchId);
      } else {
        // 계정 존재하지만 미승인 → 잠금 카운트 안 함
        setErrorType("not_approved");
        setError(`"${matchId.name}" 계정은 아직 관리자 승인이 필요합니다.\n접근 승인 요청: kimjh@epicstage.co.kr`);
        setPw("");
      }
    } else {
      const next = attempts + 1;
      setAttempts(next);
      if (next >= MAX_ATTEMPTS) {
        setLocked(true);
        const end = Date.now() + LOCK_MINUTES * 60 * 1000;
        setLockEnd(end);
        setLockRemain(LOCK_MINUTES * 60);
        setErrorType("default");
        setError(`로그인 시도 ${MAX_ATTEMPTS}회 초과. ${LOCK_MINUTES}분간 잠금됩니다.`);
      } else {
        setErrorType("default");
        setError(`아이디 또는 비밀번호가 올바르지 않습니다. (${next}/${MAX_ATTEMPTS}회)`);
      }
      setPw("");
    }
  };

  const lockMin = Math.floor(lockRemain / 60);
  const lockSec = lockRemain % 60;

  return (
    <div className="login-wrap">
      <div className="login-bg-orb" style={{width:500,height:500,background:"rgba(99,102,241,.10)",top:-150,right:-100}}/>
      <div className="login-bg-orb" style={{width:350,height:350,background:"rgba(236,72,153,.07)",bottom:-100,left:-80}}/>
      <div className="login-bg-orb" style={{width:200,height:200,background:"rgba(16,185,129,.05)",top:"40%",left:"10%"}}/>

      <div className="login-card">
        {/* 로고 */}
        <div className="login-logo">
          <div className="login-logo-icon">E</div>
          <div className="login-brand">EpicStage EventOS</div>
          <div className="login-sub">행사 기획 통합 운영 포털</div>
        </div>

        <div className="login-divider"/>

        {/* 에러/상태 메시지 */}
        {locked && (
          <div className="login-error" style={{background:"rgba(239,68,68,.1)"}}>
            🔒 <span>계정 잠금: {lockMin}분 {lockSec.toString().padStart(2,"0")}초 후 해제됩니다</span>
          </div>
        )}
        {error && !locked && errorType === "not_approved" && (
          <div className="login-error" style={{background:"rgba(245,158,11,.1)",borderColor:"rgba(245,158,11,.3)",color:"#fbbf24",flexDirection:"column",alignItems:"flex-start",gap:6}}>
            <span style={{fontWeight:700}}>🔑 접근 권한 없음</span>
            <span style={{whiteSpace:"pre-line",fontSize:12}}>{error}</span>
          </div>
        )}
        {error && !locked && errorType === "default" && (
          <div className="login-error">⚠️ <span>{error}</span></div>
        )}

        {/* 아이디 */}
        <div className="login-field">
          <label className="login-field-label">사번 / 아이디</label>
          <span className="field-icon">👤</span>
          <input
            type="text" placeholder="아이디 입력" value={uid} autoComplete="username"
            onChange={e => { setUid(e.target.value); setError(""); setErrorType("default"); }}
            onKeyDown={e => e.key === "Enter" && pwRef.current?.focus()}
            disabled={locked}
          />
        </div>

        {/* 비밀번호 */}
        <div className="login-field">
          <label className="login-field-label">비밀번호</label>
          <span className="field-icon">🔑</span>
          <input
            ref={pwRef} type={showPw ? "text" : "password"}
            placeholder="비밀번호 입력" value={pw} autoComplete="current-password"
            onChange={e => { setPw(e.target.value); setError(""); setErrorType("default"); }}
            onKeyDown={e => e.key === "Enter" && !locked && handleLogin()}
            disabled={locked} style={{paddingRight:44}}
          />
          <button className="pw-toggle" tabIndex={-1} onClick={() => setShowPw(v => !v)}>
            {showPw ? "🙈" : "👁️"}
          </button>
        </div>

        <button className="login-btn" onClick={handleLogin} disabled={locked || loading}>
          {loading ? "인증 중..." : locked ? `🔒 잠금 중 (${lockMin}:${lockSec.toString().padStart(2,"0")})` : "로그인"}
        </button>

        {attempts > 0 && !locked && errorType === "default" && (
          <div className="login-attempts">남은 시도 횟수: {MAX_ATTEMPTS - attempts}회</div>
        )}

        <div className="login-notice">
          <div className="login-notice-txt">
            🔒 본 포털은 <strong style={{color:"#818cf8"}}>EpicStage 임직원 전용</strong>입니다<br/>
            계정 신청 · 승인 문의: <strong style={{color:"#818cf8"}}>kimjh@epicstage.co.kr</strong>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── 관리자 패널 ─────────────────────────────────────────────────────────── */
function AdminPanel({ users, onUsersChange, priceList, onPriceListChange, onSendUrgentEmails, findUrgentTasksByUser }) {
  const [adminTab, setAdminTab] = useState("users"); // "users" | "prices" | "email"
  const [showAdd, setShowAdd] = useState(false);
  const [newUser, setNewUser] = useState({ id:"", pw:"", name:"", role:"", producer:"", email:"", isAdmin:false });
  const [confirmRevoke, setConfirmRevoke] = useState(null);
  const [editingUser, setEditingUser] = useState(null); // { id, name, role, pw, producer, isAdmin }
  const [search, setSearch] = useState("");
  // 기준 금액 관리
  const [editingPrice, setEditingPrice] = useState(null); // { id, item, division, category, unitPrice, qty, days }
  const [newPrice, setNewPrice] = useState({division:"기획", category:"기획", item:"", baseAmount:"", qty:"1", days:"1"});
  const [showNewPrice, setShowNewPrice] = useState(false);
  const [priceSearch, setPriceSearch] = useState("");

  // 승인 토글
  const toggleApprove = (userId) => {
    if (userId === "admin") return; // admin은 항상 유지
    const target = users.find(u => u.id === userId);
    const willApprove = !target.approved;
    if (!willApprove) {
      setConfirmRevoke(userId);
      return;
    }
    onUsersChange(users.map(u =>
      u.id === userId
        ? { ...u, approved: true }
        : u
    ));
    toast(`✅ ${target.name} 계정이 승인되었습니다.`, "success");
  };

  const doRevoke = () => {
    const target = users.find(u => u.id === confirmRevoke);
    onUsersChange(users.map(u =>
      u.id === confirmRevoke ? { ...u, approved: false } : u
    ));
    toast(`🚫 ${target.name} 계정 접근이 차단되었습니다.`, "warn");
    setConfirmRevoke(null);
  };

  // 신규 계정 추가
  const addUser = () => {
    if (!newUser.id || !newUser.pw || !newUser.name || !newUser.role) {
      toast("모든 항목을 입력해 주세요.", "error"); return;
    }
    if (users.find(u => u.id === newUser.id.trim().toLowerCase())) {
      toast("이미 존재하는 아이디입니다.", "error"); return;
    }
    const idx = users.length % USER_COLORS.length;
    const u = {
      id: newUser.id.trim().toLowerCase(),
      pw: newUser.pw,
      name: newUser.name,
      role: newUser.role,
      color: USER_COLORS[idx],
      initial: newUser.name.charAt(0),
      producer: newUser.producer || null,
      email: newUser.email || "",
      isAdmin: newUser.isAdmin || false,
      approved: newUser.isAdmin ? true : false, // 관리자는 자동 승인
      createdAt: today,
      lastLogin: null,
    };
    onUsersChange([...users, u]);
    setNewUser({ id:"", pw:"", name:"", role:"", producer:"", email:"", isAdmin:false });
    setShowAdd(false);
    const msg = u.isAdmin
      ? `✅ 관리자 계정 "${u.name}"이 생성되었습니다.`
      : `👤 "${u.name}" 계정이 생성되었습니다. 승인 후 로그인 가능합니다.`;
    toast(msg, "success");
  };

  // 계정 수정 저장
  const saveUserEdit = () => {
    if (!editingUser.name || !editingUser.role) { toast("이름과 직책은 필수입니다","error"); return; }
    onUsersChange(users.map(u => u.id === editingUser.id ? {
      ...u,
      name:     editingUser.name,
      role:     editingUser.role,
      pw:       editingUser.pw || u.pw,
      producer: editingUser.producer || null,
      email:    editingUser.email || u.email || "",
      isAdmin:  editingUser.isAdmin,
      initial:  editingUser.name.charAt(0),
      // 관리자 권한 부여 시 자동 승인 처리
      approved: editingUser.isAdmin ? true : u.approved,
    } : u));
    toast(`✅ ${editingUser.name} 계정 정보가 수정되었습니다`, "success");
    setEditingUser(null);
  };

  // 계정 삭제
  const deleteUser = (userId) => {
    if (userId === "admin") return;
    const target = users.find(u => u.id === userId);
    onUsersChange(users.filter(u => u.id !== userId));
    toast(`🗑️ "${target.name}" 계정이 삭제되었습니다.`);
  };

  const filtered = users.filter(u =>
    !search || u.name.includes(search) || u.id.includes(search) || u.role.includes(search)
  );
  const approved = users.filter(u => u.approved).length;
  const pending  = users.filter(u => !u.approved).length;

  // 기준 금액 핸들러 (신규 구조: unitPrice 기준)
  const savePriceEdit = (id) => {
    if (!editingPrice.item?.trim()) { toast("항목명을 입력해 주세요","error"); return; }

    onPriceListChange(priceList.map(p => p.id===id ? {
      ...p,
      item:      editingPrice.item.trim(),
      division:  editingPrice.division,
      category:  editingPrice.category,
      unitPrice: val,
      qty:       parseInt(editingPrice.qty)||1,
      days:      parseInt(editingPrice.days)||1,

    setEditingPrice(null);
    toast("✅ 기준 항목이 수정되었습니다","success");
  };
  const deletePrice = (id) => {
    const target = priceList.find(p=>p.id===id);
    onPriceListChange(priceList.filter(p => p.id!==id));
    toast(`🗑️ "${target?.item}" 기준 항목 삭제됨`);
  };
  const addPriceItem = () => {

      id: Date.now(),
      division: newPrice.division||"기획",
      category: newPrice.category,
      item: newPrice.item,
      unitPrice: parseInt(String(newPrice.baseAmount).replace(/,/g,""))||0,
      qty: parseInt(newPrice.qty)||1,
      days: parseInt(newPrice.days)||1,
    };
    onPriceListChange([...priceList, item]);
    setNewPrice({division:"기획", category:"기획", item:"", baseAmount:"", qty:"1", days:"1"});
    setShowNewPrice(false);
    toast(`✅ "${item.item}" 기준 항목이 추가되었습니다`,"success");
  };
  const filteredPrices = priceList.filter(p =>
    !priceSearch || p.item.includes(priceSearch) || p.category.includes(priceSearch) || (p.division||"").includes(priceSearch)
  );

        <div style={{color:"var(--txt4)",fontSize:13}}>관리자 전용 · 권한 관리 및 기준 금액 설정</div>

        <button className={`tab-btn${adminTab==="prices"?" active":""}`} onClick={()=>setAdminTab("prices")}>💰 기준 금액 관리</button>
        <button className={`tab-btn${adminTab==="email"?" active":""}`} onClick={()=>setAdminTab("email")}>📧 이메일 알림</button>
      </div>

      {/* ══ 기준 금액 탭 ══ */}
      {adminTab==="prices" && (
        <div>
          {/* 상단 통계 */}
          <div className="grid-3" style={{marginBottom:20}}>
            <div className="stat-card"><div className="stat-label">기준 항목 수</div><div className="stat-value">{priceList.length}</div></div>

                  <div key={cat} style={{marginBottom:12}}>

// 체크리스트 정렬: 구분(Division) → 카테고리(Category) → sortOrder
const sortChecklist = (items) => {
  const divOrder = {}; DIVISIONS.forEach((d,i)=>divOrder[d]=i);
  const catOrder = {};
  Object.entries(DIV_CATS).forEach(([div,cats])=>{ cats.forEach((c,i)=>{ catOrder[div+"_"+c]=i; }); });
  return [...items].sort((a,b) => {
    const da=divOrder[a.division||"기타"]??99, db=divOrder[b.division||"기타"]??99;
    if(da!==db) return da-db;
    const ca=catOrder[(a.division||"기타")+"_"+a.category]??99, cb=catOrder[(b.division||"기타")+"_"+b.category]??99;
    if(ca!==cb) return ca-cb;
    return (a.sortOrder||0)-(b.sortOrder||0);
  });
};

const fmt = n => n?.toLocaleString("ko-KR")+"원";
const profitRate = (b,c) => b > 0 ? (((b-c)/b)*100).toFixed(1) : "0.0";
const today = new Date().toISOString().slice(0,10);

function toast(msg, type="default") {
  const c = document.getElementById("toasts");
  const t = document.createElement("div");
  t.className = "toast";
  t.style.borderLeftColor = type==="success"?"#10b981":type==="error"?"#ef4444":type==="warn"?"#f59e0b":"transparent";
  t.style.borderLeftWidth = "3px";
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transform="translateY(8px)";t.style.transition=".3s";setTimeout(()=>t.remove(),300)},2500);
}

// ─ Gantt ─
function GanttChart({project, onUpdate, users}) {
  const [tasks, setTasks]           = useState(project.gantt || []);
  const [dateMemos, setDateMemos]   = useState(project.dateMemos || {});
  const [taskMemos, setTaskMemos]   = useState(project.taskMemos || {});
  const [expanded, setExpanded]     = useState({});
  const [showAddTask, setShowAddTask]       = useState(false);
  const [showAddSubtask, setShowAddSubtask] = useState(null);
  const [showMemoModal, setShowMemoModal]   = useState(null);
  const [newTask, setNewTask] = useState({division:"기획", task:"", startDate:"", endDate:"", color:"#6366f1", progress:0, assignee:""});
  const [newSub,  setNewSub]  = useState({task:"", startDate:"", endDate:"", done:false, note:"", assignee:""});
  const [memoText, setMemoText] = useState("");
  const [taskMemoTarget, setTaskMemoTarget] = useState(null); // {taskId, taskName, date}
  const [editTask, setEditTask] = useState(null); // 과업 편집용
  const [editSubTarget, setEditSubTarget] = useState(null); // {parentId, sub} 세부항목 편집

  const eventDate = project.eventDate || today;
  const COL_W = 28;
  const LEFT_W = 190;

  const {dates, dateIdx, months} = useMemo(()=>{
    let minD = eventDate, maxD = eventDate;
    tasks.forEach(t=>{
      if(t.startDate && t.startDate < minD) minD = t.startDate;
      if(t.endDate   && t.endDate   > maxD) maxD = t.endDate;
      (t.subtasks||[]).forEach(s=>{
        if(s.startDate && s.startDate < minD) minD = s.startDate;
        if(s.endDate   && s.endDate   > maxD) maxD = s.endDate;
      });
    });
    const s0 = new Date(minD); s0.setDate(s0.getDate()-7);
    const e0 = new Date(maxD); e0.setDate(e0.getDate()+14);
    const dates=[], dateIdx={};
    let cur=new Date(s0);
    while(cur<=e0){
      const ds=cur.toISOString().slice(0,10);
      dateIdx[ds]=dates.length;
      dates.push(ds);
      cur.setDate(cur.getDate()+1);
    }
    const months=[];
    let curM=null;
    dates.forEach((d,i)=>{
      const m=d.slice(0,7);
      if(m!==curM){months.push({label:d.slice(0,4)+"."+d.slice(5,7),start:i,count:0});curM=m;}
      months[months.length-1].count++;
    });
    return {dates,dateIdx,months};
  },[tasks,eventDate]);

  const totalW = dates.length * COL_W;

  const getDday = ds => {
    const diff = Math.round((new Date(ds)-new Date(eventDate))/86400000);
    if(diff===0) return "D-day";
    return diff<0 ? `D${diff}` : `D+${diff}`;
  };
  const isToday   = ds => ds===today;
  const isDday    = ds => ds===eventDate;
  const isWeekend = ds => { const d=new Date(ds); return d.getDay()===0||d.getDay()===6; };
  const hasMemo   = ds => !!dateMemos[ds];

  const save = (t,m,tm) => {
    onUpdate({...project, gantt:t||tasks, dateMemos:m||dateMemos, taskMemos:tm||taskMemos});
  };

  const addTask = () => {
    if(!newTask.task||!newTask.startDate||!newTask.endDate){toast("과업명, 시작일, 종료일은 필수입니다","error");return;}
    const updated=[...tasks,{...newTask,id:Date.now(),subtasks:[]}];
    setTasks(updated); save(updated,dateMemos);
    setNewTask({division:"기획",task:"",startDate:"",endDate:"",color:"#6366f1",progress:0,assignee:""});
    setShowAddTask(false); toast("✅ 과업 추가됨","success");
  };

  const addSub = pid => {
    if(!newSub.task){toast("세부항목명은 필수입니다","error");return;}
    const updated=tasks.map(t=>t.id===pid?{...t,subtasks:[...(t.subtasks||[]),{...newSub,id:Date.now()}]}:t);
    setTasks(updated); save(updated,dateMemos);
    setNewSub({task:"",startDate:"",endDate:"",done:false,note:"",assignee:""});
    setShowAddSubtask(null); toast("✅ 세부항목 추가됨","success");
  };

  const toggleSub = (pid,sid) => {
    const updated=tasks.map(t=>t.id===pid?{...t,subtasks:(t.subtasks||[]).map(s=>s.id===sid?{...s,done:!s.done}:s)}:t);
    setTasks(updated); save(updated,dateMemos);
  };

  // 과업 수정
  const updateTask = () => {
    if(!editTask) return;
    if(!editTask.task||!editTask.startDate||!editTask.endDate){toast("과업명, 시작일, 종료일은 필수입니다","error");return;}
    const updated=tasks.map(t=>t.id===editTask.id?{...t,...editTask}:t);
    setTasks(updated); save(updated,dateMemos);
    setEditTask(null); toast("✏️ 과업 수정됨","success");
  };
  // 과업 삭제
  const deleteTask = (id) => {
    if(!confirm("이 과업을 삭제하시겠습니까? 세부항목도 함께 삭제됩니다.")) return;
    const updated=tasks.filter(t=>t.id!==id);
    setTasks(updated); save(updated,dateMemos);
    toast("🗑️ 과업 삭제됨");
  };
  // 세부항목 수정
  const updateSub = () => {
    if(!editSubTarget) return;
    const {parentId, sub} = editSubTarget;
    if(!sub.task){toast("세부항목명은 필수입니다","error");return;}
    const updated=tasks.map(t=>t.id===parentId?{...t,subtasks:(t.subtasks||[]).map(s=>s.id===sub.id?{...s,...sub}:s)}:t);
    setTasks(updated); save(updated,dateMemos);
    setEditSubTarget(null); toast("✏️ 세부항목 수정됨","success");
  };
  // 세부항목 삭제
  const deleteSub = (pid,sid) => {
    if(!confirm("이 세부항목을 삭제하시겠습니까?")) return;
    const updated=tasks.map(t=>t.id===pid?{...t,subtasks:(t.subtasks||[]).filter(s=>s.id!==sid)}:t);
    setTasks(updated); save(updated,dateMemos);
    toast("🗑️ 세부항목 삭제됨");
  };

  const saveMemo = () => {
    const nm={...dateMemos};
    if(memoText) nm[showMemoModal]=memoText; else delete nm[showMemoModal];
    setDateMemos(nm); save(tasks,nm);
    setShowMemoModal(null); toast("📝 메모 저장됨","success");
  };

  const saveTaskMemo = () => {
    const nm = {...taskMemos};
    const key = `${taskMemoTarget.taskId}_${taskMemoTarget.date}`;
    if(memoText) nm[key]=memoText; else delete nm[key];
    setTaskMemos(nm); save(tasks,dateMemos,nm);
    setTaskMemoTarget(null); setMemoText(""); toast("📝 항목 메모 저장됨","success");
  };

  const getTaskMemo = (taskId, date) => taskMemos[`${taskId}_${date}`] || "";
  const hasTaskMemo = (taskId, date) => !!taskMemos[`${taskId}_${date}`];

  const importChecklist = () => {
    const existing=new Set(tasks.map(t=>t.task));
    const added=[];
    DIVISIONS.forEach(div=>{
      const items=project.checklist.filter(c=>(c.division||"기타")===div);
      if(items.length>0){
        added.push({
          id:Date.now()+Math.random(),division:div,
          task:div+" 과업",
          startDate:project.startDate||today,endDate:project.eventDate||today,
          color:DIV_COLORS[div]||"#6366f1",progress:0,
          subtasks:items.map((c,i)=>({
            id:Date.now()+i+Math.random(),task:c.item,
            startDate:project.startDate||today,endDate:project.eventDate||today,
            done:c.done,note:c.note||""
          }))
        });
      }
    });
    const updated=[...tasks,...added.filter(a=>!existing.has(a.task))];
    setTasks(updated); save(updated,dateMemos);
    toast(`✅ 체크리스트에서 ${added.length}개 구분을 가져왔습니다`,"success");
  };

  const renderBar = (startDate,endDate,color,progress,label) => {
    const si=dateIdx[startDate], ei=dateIdx[endDate];
    if(si===undefined||ei===undefined) return null;
    const w=(ei-si+1)*COL_W;
    return (
      <div style={{position:"absolute",left:si*COL_W,top:5,height:22,width:w,
        background:`${color}2a`,border:`1px solid ${color}88`,borderRadius:4,overflow:"hidden",
        display:"flex",alignItems:"center"}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${progress}%`,background:`${color}55`}}/>
        <span style={{position:"relative",fontSize:10,color:"#fff",padding:"0 6px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{label}</span>
      </div>
    );
  };

  if(!dates.length) return <div style={{color:"var(--txt4)",padding:20,textAlign:"center"}}>날짜 데이터가 없습니다</div>;

  return (
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius)",overflow:"hidden"}}>
      {/* 툴바 */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:"1px solid var(--border)",flexWrap:"wrap"}}>
        <span style={{fontWeight:700,fontSize:14,color:"var(--txt)"}}>📅 간트차트 · 업무 팔로우업</span>
        <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:"auto",flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:"var(--txt4)"}}>
            <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#3b82f6",marginRight:4}}/>오늘
            <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#ef4444",marginRight:4,marginLeft:8}}/>D-day
            <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#f59e0b",marginRight:4,marginLeft:8}}/>메모
          </span>
          <button onClick={importChecklist}
            style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--txt2)",borderRadius:6,padding:"5px 12px",fontSize:12}}>
            📋 체크리스트 가져오기
          </button>
          <button onClick={()=>setShowAddTask(true)}
            style={{background:"var(--primary-dim)",border:"1px solid var(--primary-border)",color:"#a5b4fc",borderRadius:6,padding:"5px 12px",fontSize:12}}>
            + 과업 추가
          </button>
        </div>
      </div>

      {/* 간트 그리드 */}
      <div style={{overflowX:"auto"}}>
        <div style={{display:"flex",flexDirection:"column",width:LEFT_W+totalW}}>

          {/* 월 헤더 */}
          <div style={{display:"flex",borderBottom:"1px solid var(--border)",background:"rgba(0,0,0,0.3)",flexShrink:0}}>
            <div style={{width:LEFT_W,flexShrink:0,borderRight:"1px solid var(--border)",padding:"5px 12px",fontSize:11,color:"var(--txt3)",fontWeight:700,position:"sticky",left:0,background:"rgba(8,11,20,0.95)",zIndex:10}}>과업 / 세부항목</div>
            <div style={{position:"relative",width:totalW,flexShrink:0,height:26}}>
              {months.map((m,i)=>(
                <div key={i} style={{position:"absolute",left:m.start*COL_W,width:m.count*COL_W,
                  padding:"5px 6px",fontSize:11,color:"var(--txt2)",fontWeight:700,
                  borderRight:"1px solid rgba(255,255,255,0.08)",textAlign:"center",

                      <input type="date" value={newSub.endDate}

                    </div>
                  </div>
                )}
              </React.Fragment>

            {[
              {label:"과업명 *",key:"task",type:"text",placeholder:"예: 무대 설계"},
              {label:"시작일 *",key:"startDate",type:"date"},
              {label:"종료일 *",key:"endDate",type:"date"},

              <div key={f.key} className="form-group">
                <label className="form-label">{f.label}</label>

            <div className="form-group">
              <label className="form-label">구분</label>
              <select className="form-input" value={newTask.division}

            <div className="form-group">
              <label className="form-label">담당자</label>

              </div>

              <button className="btn-primary" onClick={addTask}>추가</button>

          </div>
        </div>

              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
              <button onClick={()=>deleteTask(editTask.id)}
                style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#ef4444",borderRadius:6,padding:"6px 14px",fontSize:13,marginRight:"auto"}}>삭제</button>
              <button className="btn-ghost" onClick={()=>setEditTask(null)}>취소</button>
              <button className="btn-primary" onClick={updateTask}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* 세부항목 편집 모달 */}
      {editSubTarget&&(
        <div className="modal-overlay" onClick={e=>e.target.classList.contains("modal-overlay")&&setEditSubTarget(null)}>
          <div className="modal-box" style={{maxWidth:420}}>
            <div className="modal-title">✏️ 세부항목 편집</div>
            {[
              {label:"세부항목명 *",key:"task",type:"text"},
              {label:"시작일",key:"startDate",type:"date"},
              {label:"종료일",key:"endDate",type:"date"},
            ].map(f=>(
              <div key={f.key} className="form-group">
                <label className="form-label">{f.label}</label>
                <input className="form-input" type={f.type}
                  value={editSubTarget.sub[f.key]||""} onChange={e=>setEditSubTarget(p=>({...p,sub:{...p.sub,[f.key]:e.target.value}}))}/>
              </div>
            ))}
            <div className="form-group">
              <label className="form-label">담당자</label>
              <select className="form-input" value={editSubTarget.sub.assignee||""}
                onChange={e=>setEditSubTarget(p=>({...p,sub:{...p.sub,assignee:e.target.value}}))}>
                <option value="">담당자 선택</option>
                {(users||[]).filter(u=>u.approved||u.id==="admin").map(u=><option key={u.id} value={u.name}>{u.name}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">비고</label>
              <input className="form-input" type="text" placeholder="참고 메모"
                value={editSubTarget.sub.note||""} onChange={e=>setEditSubTarget(p=>({...p,sub:{...p.sub,note:e.target.value}}))}/>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
              <button onClick={()=>{deleteSub(editSubTarget.parentId,editSubTarget.sub.id);setEditSubTarget(null);}}
                style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#ef4444",borderRadius:6,padding:"6px 14px",fontSize:13,marginRight:"auto"}}>삭제</button>
              <button className="btn-ghost" onClick={()=>setEditSubTarget(null)}>취소</button>
              <button className="btn-primary" onClick={updateSub}>저장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─ Checklist & Quote ─
function ChecklistPanel({project, onUpdate, currentUser}) {
  const [quoteType, setQuoteType] = useState("일반기업"); // "일반기업" | "공공기관"
  const [newCL, setNewCL] = useState({division:"기획", category:"기획", item:"", unitPrice:"", qty:"1", days:"1", note:""});
  const [showAddForm, setShowAddForm] = useState(false);
  const [editingItem, setEditingItem] = useState(null);
  const [editValues, setEditValues] = useState({});
  const [newCustom, setNewCustom] = useState({division:"기타", category:"섭외", item:"", unitPrice:"", qty:"1", days:"1", note:""});
  const [editingCustom, setEditingCustom] = useState(null);
  const [showCustomForm, setShowCustomForm] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const [historyNote, setHistoryNote] = useState("");
  const [targetBudget, setTargetBudget] = useState("");

  const customItems = project.customItems || [];
  const priceMult = quoteType === "일반기업" ? 1.15 : 1.0;

  // 금액 계산: 단가 × 수량 × 일자 (일반기업이면 단가 ×1.15)
  const calcAmt = (item) => Math.round((item.unitPrice||0) * priceMult * (item.qty||1) * (item.days||1));

  // 구분별 견적 데이터 (정렬 적용)
  const sortedForQuote = sortChecklist(project.checklist);
  const quoteByDiv = DIVISIONS.map(div => {
    const clItems  = sortedForQuote.filter(c => (c.division||"기타")===div && (c.unitPrice||0) > 0);
    const custItems= customItems.filter(c => (c.division||"기타")===div);
    const subtotal = [...clItems,...custItems].reduce((s,c) => s + calcAmt(c), 0);
    return { div, clItems, custItems, subtotal };
  });
  const custOther = customItems.filter(c => !DIVISIONS.includes(c.division));

  // 견적총액 A (체크리스트 + 추가항목 전체)
  const A = Math.round(quoteByDiv.reduce((s,d)=>s+d.subtotal,0) + custOther.reduce((s,c)=>s+calcAmt(c),0));
  const B = quoteType==="공공기관" ? Math.round(A*0.08) : 0;
  const C = quoteType==="공공기관" ? Math.round((A+B)*0.10) : 0;
  const D = Math.round((A+B+C)*0.10);
  const total = Math.round(A + B + C + D);
  const totalFinal = Math.floor(total/10)*10; // 10원 단위 절사

  // ── 기준 예산 절사 ──
  const budgetTarget = parseInt(targetBudget) || 0;
  const hasBudgetAdj = budgetTarget > 0 && totalFinal > budgetTarget;
  let profitReduction = 0;
  let adjC = C;
  let adjTotalFinal = totalFinal;

  if (hasBudgetAdj) {
    const overAmount = totalFinal - budgetTarget;
    if (quoteType === "공공기관") {
      // 수익(C)에서 감액 후 부가세 재계산 — 모든 중간값 정수 보장
      profitReduction = Math.round(Math.min(C, overAmount));
      adjC = Math.round(C - profitReduction);
      const adjD = Math.round((A + B + adjC) * 0.10);
      const adjTotal = Math.round(A + B + adjC + adjD);
      adjTotalFinal = Math.floor(adjTotal / 10) * 10;
    } else {
      // 일반기업: 마진(15%)에서 감액 — 모든 중간값 정수 보장
      const maxMargin = Math.round(A - Math.round(A / 1.15));
      profitReduction = Math.round(Math.min(maxMargin, overAmount));
      const adjTotal = Math.round(total - profitReduction);
      adjTotalFinal = Math.floor(adjTotal / 10) * 10;
    }
  }

  // 체크리스트 토글
  const toggle = (id) => {
    const updated = project.checklist.map(c => c.id===id ? {...c,done:!c.done} : c);
    const done = updated.filter(c=>c.done).length;
    onUpdate({...project, checklist:updated, progress:Math.round((done/updated.length)*100),
      logs:[...project.logs,{id:Date.now(),date:today,author:"시스템",type:"auto",
        content:`체크리스트 "${project.checklist.find(c=>c.id===id)?.item}" 완료 상태 변경`}]
    });
    toast("✅ 체크리스트 업데이트됨","success");
  };

  // 체크리스트 항목 추가
  // 체크리스트 항목 순서 이동
  const moveItem = (id, dir) => {
    const sorted = sortChecklist(project.checklist);
    const item = sorted.find(c=>c.id===id);
    if (!item) return;
    const group = sorted.filter(c=>c.division===item.division && c.category===item.category);
    const idx = group.findIndex(c=>c.id===id);
    const swapIdx = idx + dir;
    if (swapIdx < 0 || swapIdx >= group.length) return;
    const swapItem = group[swapIdx];
    const myOrder = item.sortOrder||0, theirOrder = swapItem.sortOrder||0;
    const updated = project.checklist.map(c => {
      if (c.id === item.id) return {...c, sortOrder: theirOrder};
      if (c.id === swapItem.id) return {...c, sortOrder: myOrder};
      return c;
    });
    onUpdate({...project, checklist: updated});
  };

  const addCLItem = () => {
    if (!newCL.item.trim()) return;
    const sameGroup = project.checklist.filter(c=>c.division===newCL.division && c.category===newCL.category);
    const maxOrder = sameGroup.reduce((m,c)=>Math.max(m,c.sortOrder||0),0);
    const item = {
      id:Date.now(), division:newCL.division, category:newCL.category,
      item:newCL.item, done:false,
      unitPrice:parseInt(newCL.unitPrice)||0,
      qty:parseInt(newCL.qty)||1, days:parseInt(newCL.days)||1, note:newCL.note||"",
      sortOrder: maxOrder+1,
    };
    onUpdate({...project, checklist:[...project.checklist, item],
      logs:[...project.logs,{id:Date.now()+1,date:today,author:currentUser?.name||"사용자",type:"auto",
        content:`체크리스트 항목 추가: [${newCL.division}] ${newCL.category} - ${newCL.item}`}]
    });
    setNewCL({division:"기획",category:"기획",item:"",unitPrice:"",qty:"1",days:"1",note:""});
    setShowAddForm(false);
    toast("항목이 추가되었습니다","success");
  };

  // 체크리스트 항목 삭제
  const deleteCLItem = (id) => {
    const target = project.checklist.find(c=>c.id===id);
    onUpdate({...project, checklist:project.checklist.filter(c=>c.id!==id),
      logs:[...project.logs,{id:Date.now(),date:today,author:currentUser?.name||"사용자",type:"auto",
        content:`체크리스트 항목 삭제: "${target?.item}"`}]
    });
    toast("항목이 삭제되었습니다");
  };

  // 인라인 편집 시작
  const startEdit = (item) => {
    setEditingItem(item.id);
    setEditValues({unitPrice:item.unitPrice||0, qty:item.qty||1, days:item.days||1, note:item.note||""});
  };
  const saveEdit = (id) => {
    const updated = project.checklist.map(c => c.id===id ? {
      ...c, unitPrice:parseInt(editValues.unitPrice)||0,
      qty:parseInt(editValues.qty)||1, days:parseInt(editValues.days)||1, note:editValues.note||"",
    } : c);
    onUpdate({...project, checklist:updated});
    setEditingItem(null);
    toast("✅ 항목 수정됨","success");
  };

  // 추가 항목 저장
  const saveCustomItem = () => {
    if (!newCustom.item.trim()) { toast("항목명은 필수입니다","error"); return; }
    const item = {
      id:editingCustom||Date.now(), division:newCustom.division, category:newCustom.category,
      item:newCustom.item, unitPrice:parseInt(newCustom.unitPrice)||0,
      qty:parseInt(newCustom.qty)||1, days:parseInt(newCustom.days)||1, note:newCustom.note||"",
    };
    const upd = editingCustom
      ? customItems.map(c=>c.id===editingCustom?item:c)
      : [...customItems, {...item,id:Date.now()}];
    onUpdate({...project, customItems:upd,
      logs:[...project.logs,{id:Date.now()+1,date:today,author:currentUser?.name||"사용자",type:"auto",
        content:`견적 ${editingCustom?"수정":"추가항목 등록"}: "${newCustom.item}"`}]
    });
    setNewCustom({division:"기타",category:"섭외",item:"",unitPrice:"",qty:"1",days:"1",note:""});
    setEditingCustom(null); setShowCustomForm(false);
    toast(editingCustom?"✏️ 수정됨":"➕ 추가 항목 등록됨","success");
  };
  const startEditCustom = (item) => {
    setNewCustom({division:item.division||"기타",category:item.category||"섭외",item:item.item,
      unitPrice:item.unitPrice||0,qty:item.qty||1,days:item.days||1,note:item.note||""});
    setEditingCustom(item.id); setShowCustomForm(true);
  };
  const deleteCustomItem = (id) => {
    const target = customItems.find(c=>c.id===id);
    onUpdate({...project, customItems:customItems.filter(c=>c.id!==id),
      logs:[...project.logs,{id:Date.now(),date:today,author:currentUser?.name||"사용자",type:"auto",
        content:`견적 항목 삭제: "${target?.item}"`}]
    });
    toast("견적 항목 삭제됨");
  };

  // 견적 행 공통 컴포넌트
  const QuoteRow = ({item, isCustom}) => (
    <div style={{
      display:"grid",gridTemplateColumns:"88px 1fr 70px 38px 38px 80px",
      padding:"5px 10px",gap:4,borderBottom:"1px solid rgba(255,255,255,.03)",alignItems:"center",
      transition:"background .1s",
    }}
      onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.025)"}
      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      <div style={{color:isCustom?"#f59e0b":"var(--txt4)",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.category}</div>
      <div style={{color:isCustom?"#fbbf24":"var(--txt)",fontSize:12,overflow:"hidden"}}>
        {item.item}
        {item.note&&<span style={{color:"var(--txt4)",fontSize:10,marginLeft:4}}>({item.note})</span>}
      </div>
      <div style={{color:"var(--txt3)",fontSize:11,textAlign:"right"}}>{Math.round((item.unitPrice||0)*priceMult).toLocaleString()}</div>
      <div style={{color:"var(--txt3)",fontSize:11,textAlign:"center"}}>{item.qty||1}</div>
      <div style={{color:"var(--txt3)",fontSize:11,textAlign:"center"}}>{item.days||1}</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:3}}>
        <span style={{color:isCustom?"#fbbf24":"var(--txt)",fontSize:12,fontWeight:600}}>{calcAmt(item).toLocaleString()}</span>
        {!isCustom && <button onClick={()=>startEdit(item)} style={{background:"transparent",border:"none",color:"var(--txt4)",fontSize:10,cursor:"pointer",padding:0,lineHeight:1}}>✏️</button>}
        {isCustom && <button onClick={()=>startEditCustom(item)} style={{background:"transparent",border:"none",color:"var(--txt4)",fontSize:10,cursor:"pointer",padding:0}}>✏️</button>}
        {isCustom && <button onClick={()=>deleteCustomItem(item.id)} style={{background:"transparent",border:"none",color:"#fca5a5",fontSize:11,cursor:"pointer",padding:0}}>×</button>}
      </div>
    </div>
  );

  // 견적 이력 저장
  const saveQuoteSnapshot = () => {
    // 구분별 소계 기록
    const divSummary = quoteByDiv.filter(d=>d.subtotal>0).map(d=>({div:d.div, subtotal:d.subtotal}));
    const snapshot = {
      id: Date.now(),
      date: today,
      author: currentUser?.name || "사용자",
      quoteType,
      priceMult,
      A, B, C, D, total, totalFinal,
      // 기준 예산 절사 정보
      budgetTarget: budgetTarget || null,
      profitReduction: profitReduction || 0,
      adjC: hasBudgetAdj ? adjC : C,
      adjTotalFinal,
      divSummary,
      note: historyNote,
      items: [
        ...project.checklist.filter(c=>(c.unitPrice||0)>0).map(c=>({division:c.division||"기타",category:c.category,item:c.item,unitPrice:c.unitPrice,qty:c.qty||1,days:c.days||1,note:c.note||""})),
        ...(project.customItems||[]).map(c=>({division:c.division||"기타",category:c.category,item:c.item,unitPrice:c.unitPrice,qty:c.qty||1,days:c.days||1,note:c.note||"",isCustom:true})),
      ],
    };
    onUpdate({
      ...project,
      quoteHistory: [...(project.quoteHistory||[]), snapshot],
      logs: [...project.logs, {
        id: Date.now()+1, date: today,
        author: currentUser?.name || "사용자", type:"auto",
        content: `💾 견적 이력 저장: [${quoteType}] 총 ${adjTotalFinal.toLocaleString()}원${hasBudgetAdj?" (예산절사)":""}${historyNote?" · "+historyNote:""}`,
      }],
    });
    setHistoryNote("");
    toast("💾 견적이 저장되었습니다","success");
  };

  // 견적서 PDF 출력
  const printQuote = () => {
    let rowNum = 0;
    const divRows = quoteByDiv.map(({div, clItems, custItems}) => {
      const allItems = [...clItems, ...custItems];
      if (!allItems.length) return "";
      return allItems.map((item,i) => {
        rowNum++;
        return `
        <tr>
          ${i===0 ? `<td rowspan="${allItems.length}" class="div-cell">${div}</td>` : ""}
          <td class="td-item"><span class="item-cat">${item.category}</span><span class="item-name">${item.item}</span></td>
          <td class="td-right">${Math.round((item.unitPrice||0)*priceMult).toLocaleString()}</td>
          <td class="td-center">${item.qty||1}</td>
          <td class="td-center">${item.days||1}</td>
          <td class="td-right td-bold">${calcAmt(item).toLocaleString()}</td>
          <td class="td-right td-tax">${Math.round(calcAmt(item)*0.1).toLocaleString()}</td>

    const html = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">

                  return (

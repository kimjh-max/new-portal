name = "eventos-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# ── Cloudflare D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "eventos-db"
database_id = "220bc04e-cf97-4a82-b263-7f863761ee2a"

# ── Cloudflare R2 Storage ──
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "eventos-files"
